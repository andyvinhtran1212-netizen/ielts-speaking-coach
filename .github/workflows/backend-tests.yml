name: Tests

# Sprint 4 Phase 7 — backend test suite gate.
# Includes the grammar anchor drift gate (test_anchor_drift.py) which
# fails the PR if feedback-anchor-mapping.yaml references unresolved
# anchors. Prevents broken AI feedback deep-links from shipping.
#
# Trigger: pull_request only (Andy Q4 directive — saves Actions quota,
# matches dev workflow, doesn't miss meaningful gates).
#
# Sprint 5b broadened: frontend/** added so the drift gate runs on
# frontend-only PRs too. The mapping file lives under backend/, but a
# frontend dev with VS Code open at repo root could touch it; more
# importantly, frontend changes that consume the recommendation shape
# (anchor field) want the same gate. Cheap insurance — the job is
# 10 min and runs only on PRs.
#
# Sprint 6.3.1 added the frontend-tests job (Codex audit AMBER #1):
# Sprint 6 introduced node:test contract suites for theme-toggle,
# embedded-mode, vocab-landing, typography-tier1, home (existing) and
# home-redesign. Without this job, a refactor that renamed
# class="av-theme-toggle" → class="theme-toggle" would fail locally
# but ship through the PR gate. The frontend job runs in parallel
# to the backend job — slow Python install doesn't block fast Node
# checks and vice versa.

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  backend:
    name: Backend (pytest + anchor drift)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run anchor drift gate (explicit re-check)
        working-directory: .
        run: |
          python backend/scripts/verify_anchor_drift.py

  frontend:
    name: Frontend (node --test)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # The frontend tests are pure node:test files — no transpile, no
    # bundler. They exercise contracts (HTML structure, CSS token
    # discipline, theme-toggle exports, IIFE patterns) rather than
    # rendered behavior, so a single Node setup with no dependencies
    # is enough. Test files are listed explicitly rather than via glob
    # so a rogue *.test.js committed to the wrong directory can't
    # silently break the gate.

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # P0-3 C-3.4 — the static Tailwind CSS (css/tailwind.build.css) is committed.
      # Rebuild it from the SAME pinned toolchain + config and fail if it differs:
      # guards against a class being added to HTML/JS without regenerating the CSS
      # (which would silently drop styling).
      #
      # The toolchain is LOCKFILE-PINNED + ISOLATED (frontend/tooling/css) and
      # installed via `npm ci` — NOT `npx --yes`. `npx --yes tailwindcss@3.4.17`
      # re-resolved tailwind's transitive deps at run time, and resolving them in
      # the main project tree (alongside @playwright) deduped them differently, so
      # CI's CSS drifted from the committed build (random "STALE" failures that
      # blocked every PR). The isolated lockfile freezes the exact tree that built
      # the committed CSS → deterministic across machines/runs.
      - name: Install pinned Tailwind toolchain (isolated lockfile)
        working-directory: frontend/tooling/css
        run: npm ci

      - name: Tailwind static CSS is not stale (rebuild + diff, all clusters)
        run: |
          cd frontend
          BIN=./tooling/css/node_modules/.bin/tailwindcss
          check() {  # $1=config $2=committed-css
            "$BIN" -c "$1" -i ./css/tailwind.src.css -o /tmp/tw-ci.css --minify
            if ! diff -q "$2" /tmp/tw-ci.css; then
              echo "::error::$2 is STALE — run 'npm run build:css:setup && npm run build:css' in frontend/ and commit."
              diff "$2" /tmp/tw-ci.css | head -20 || true
              exit 1
            fi
            echo "$2 is fresh ✓"
          }
          check ./tailwind.config.cjs       css/tailwind.build.css
          check ./tailwind.config.inter.cjs css/tailwind.inter.css

      # B35 (FE migration plan v3): run EVERY contract test via glob instead of a
      # hand-maintained file list — new test files are CI-gated automatically.
      # To exclude a file, move it aside or add an explicit `--test-skip-pattern`
      # here WITH an owner + expiry comment; do not reintroduce a hand list.
      - name: Run frontend contract tests
        run: |
          node --test \
            frontend/tests/*.test.mjs \
            frontend/tests/*.test.js
