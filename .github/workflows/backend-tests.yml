name: Tests

# Sprint 4 Phase 7 — backend test suite gate.
# Includes the grammar anchor drift gate (test_anchor_drift.py) which
# fails the PR if feedback-anchor-mapping.yaml references unresolved
# anchors. Prevents broken AI feedback deep-links from shipping.
#
# Trigger: pull_request only (Andy Q4 directive — saves Actions quota,
# matches dev workflow, doesn't miss meaningful gates).
#
# Sprint 5b broadened: frontend/** added so the drift gate runs on
# frontend-only PRs too. The mapping file lives under backend/, but a
# frontend dev with VS Code open at repo root could touch it; more
# importantly, frontend changes that consume the recommendation shape
# (anchor field) want the same gate. Cheap insurance — the job is
# 10 min and runs only on PRs.
#
# Sprint 6.3.1 added the frontend-tests job (Codex audit AMBER #1):
# Sprint 6 introduced node:test contract suites for theme-toggle,
# embedded-mode, vocab-landing, typography-tier1, home (existing) and
# home-redesign. Without this job, a refactor that renamed
# class="av-theme-toggle" → class="theme-toggle" would fail locally
# but ship through the PR gate. The frontend job runs in parallel
# to the backend job — slow Python install doesn't block fast Node
# checks and vice versa.

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  backend:
    name: Backend (pytest + anchor drift)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short --ignore=tests/test_d1_e2e.py

      - name: Run anchor drift gate (explicit re-check)
        working-directory: .
        run: |
          python backend/scripts/verify_anchor_drift.py

  frontend:
    name: Frontend (node --test)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # The frontend tests are pure node:test files — no transpile, no
    # bundler. They exercise contracts (HTML structure, CSS token
    # discipline, theme-toggle exports, IIFE patterns) rather than
    # rendered behavior, so a single Node setup with no dependencies
    # is enough. Test files are listed explicitly rather than via glob
    # so a rogue *.test.js committed to the wrong directory can't
    # silently break the gate.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run frontend contract tests
        run: |
          node --test \
            frontend/tests/admin-listening-fulltest-import.test.mjs \
            frontend/tests/anti-flash-iife-canonical.test.mjs \
            frontend/tests/brief-contrast-guidance.test.mjs \
            frontend/tests/brief-hardcoded-color-lesson.test.mjs \
            frontend/tests/brief-lock-contract.test.mjs \
            frontend/tests/design-fix-1-admin-primitives.test.mjs \
            frontend/tests/design-fix-2-admin-buttons-hubs.test.mjs \
            frontend/tests/design-fix-3-user-tokens.test.mjs \
            frontend/tests/home.test.js \
            frontend/tests/home-redesign.test.mjs \
            frontend/tests/practice-redesign.test.mjs \
            frontend/tests/result-redesign.test.mjs \
            frontend/tests/speaking-redesign.test.mjs \
            frontend/tests/sprint-6-7-1-audit-closure.test.mjs \
            frontend/tests/sprint-6-9-1-audit-closure.test.mjs \
