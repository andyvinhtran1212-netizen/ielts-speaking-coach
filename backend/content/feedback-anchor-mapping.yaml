# Feedback-Anchor Master Mapping
# Ships to production at: backend/content/feedback-anchor-mapping.yaml
# AI feedback service loads at boot, caches in memory.
#
# Each mapping connects an AI-feedback-detected error pattern to a specific
# anchor in the grammar wiki. When user finishes a practice session and the
# AI feedback identifies an error matching one of these patterns, the result
# page links to the specific anchor (not just the topic page).

schema_version: "1.0"
generated_by: "cowork-audit-2026-05-02"
last_updated: "2026-05-02"
audit_commit: "1ca9792"

# ── Sprint 1 schema addition (2026-05-03) ─────────────────────────────
# Optional per-mapping field: deferred_until: <sprint-id>
#   When present, the drift verification gate
#   (backend/scripts/verify_anchor_drift.py) treats a missing
#   target_anchor as an expected deferral (not drift) until that sprint
#   ships.  When the sprint completes and the anchor exists, the field
#   becomes vestigial (no-op) and may be cleaned up in maintenance.
#   Companion field: deferred_reason — human-readable explanation.

# Severity vocabulary:
#   common    — high-frequency error, prioritised in suggestions
#   important — meaningful error, shown if no common error matches
#   nuance    — subtle issue, only shown when explicitly detected

# Confidence vocabulary:
#   high   — feedback_keywords are highly specific; surface always
#   medium — keywords overlap; surface if no high-confidence match exists
#   low    — fallback only

