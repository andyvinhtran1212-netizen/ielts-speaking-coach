<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F4 retention warning v2 harness (Sprint 16.3.1)</title>
  <!-- Mirrors speaking.html renderHistory's wiring: chips + banner driven purely
       by the Sprint 16.2.1 v2 `retention` block. No backend/Supabase. -->
  <link rel="stylesheet" href="/css/ds.css" />
</head>
<body class="av-page" style="min-height:100vh;padding:24px;">
  <div id="history-retention-banner"></div>
  <table><tbody id="history-tbody"></tbody></table>

  <script src="/js/retention-warning.js"></script>
  <script>
    var RW = window.RetentionWarning;
    function b(o) {
      return Object.assign({
        days_until_audio_purge: 15, days_until_content_purge: 60,
        is_audio_purged: false, is_content_purged: false, is_hidden: false,
      }, o);
    }
    // v2 retention blocks exactly as GET /sessions attaches them.
    var sessions = [
      { id: 's-audio-soon',   topic: 'A', retention: b({ days_until_audio_purge: 2 }) },
      { id: 's-content-soon', topic: 'C', retention: b({ is_audio_purged: true, days_until_audio_purge: 0, days_until_content_purge: 4 }) },
      { id: 's-audio-gone',   topic: 'G', retention: b({ is_audio_purged: true, days_until_audio_purge: 0, days_until_content_purge: 40 }) },
      { id: 's-fresh',        topic: 'F', retention: b({}) },
      { id: 's-legacy',       topic: 'L' /* no retention block */ },
    ];
    document.getElementById('history-retention-banner').innerHTML =
      RW.bannerHtml(RW.countSoonHidden(sessions));
    document.getElementById('history-tbody').innerHTML = sessions.map(function (s) {
      return '<tr class="session-row" data-session-id="' + s.id + '">'
        + '<td>' + s.topic + (RW.chipHtml(s.retention) ? ' ' + RW.chipHtml(s.retention) : '') + '</td>'
        + '</tr>';
    }).join('');
  </script>
</body>
</html>
