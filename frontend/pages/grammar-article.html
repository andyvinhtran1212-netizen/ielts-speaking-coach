<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Grammar — IELTS Grammar | Aver Learning</title>
  <meta name="description" id="meta-description" content="Học ngữ pháp tiếng Anh để cải thiện IELTS Speaking và Writing. Ví dụ thực tế, bài tập, và lời giải thích dễ hiểu.">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Aver Learning">
  <meta property="og:title" id="og-title" content="Grammar Wiki — Aver Learning">
  <meta property="og:description" id="og-description" content="Học ngữ pháp tiếng Anh để cải thiện IELTS Speaking và Writing.">
  <link rel="canonical" id="canonical-url" href="https://averlearning.com/grammar">
    <!-- Canonical anti-flash theme bootstrap (DESIGN_SYSTEM § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var theme;
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Tailwind CDN + custom navy/teal palette preserved (Sprint 6.15 Phase B
       finding — js/grammar.js renderer depends on text-teal-light, bg-teal/15,
       etc.). fontFamily key dropped; grammar-wiki.css owns font discipline. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
        },
      },
    }
  </script>

  <!-- DM Sans + Lora sub-system preserved per § 14.2 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Foundation: tokens → components → ds (Sprint 6.5.1 pattern) →
       grammar-wiki.css. admin-writing.css NOT linked (different cluster).
       writing-renderers.css NOT linked (Sprint 6.8 finding extends). -->
  <link rel="stylesheet" href="../css/aver-design/tokens.css" />
  <link rel="stylesheet" href="../css/aver-design/components.css" />
  <link rel="stylesheet" href="../css/ds.css" />
  <link rel="stylesheet" href="../css/grammar-wiki.css" />
</head>
<body class="av-page min-h-screen font-sans antialiased">

  <!-- Reading progress bar -->
  <div id="reading-progress"></div>

  <!-- Top nav -->
  <nav class="sticky top-0 z-30 border-b border-white/5" style="background: var(--av-surface-sunken); backdrop-filter: blur(12px);">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <div id="breadcrumb" class="flex items-center text-sm text-white/40 flex-wrap gap-0">
        <a href="/grammar.html" class="hover:text-teal-light transition-colors">Grammar Wiki</a>
      </div>
      <div class="flex items-center gap-3">
        <a href="/pages/home.html" class="text-xs text-white/30 hover:text-white/60 transition-colors">Trang chủ</a>
        <button id="theme-toggle" class="av-theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Skeleton loader (shown while article loads) -->
  <div id="article-skeleton" class="max-w-7xl mx-auto px-4 py-8">
    <div class="skeleton h-8 w-64 rounded-lg mb-4"></div>
    <div class="skeleton h-5 w-40 rounded mb-6"></div>
    <div class="skeleton h-4 w-full rounded mb-2"></div>
    <div class="skeleton h-4 w-5/6 rounded mb-2"></div>
    <div class="skeleton h-4 w-4/5 rounded mb-6"></div>
    <div class="skeleton h-4 w-full rounded mb-2"></div>
    <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
  </div>

  <!-- Article container (hidden until loaded) -->
  <div id="article-container" class="hidden max-w-7xl mx-auto px-4 py-8 ds-fadein">
    <div class="flex gap-8 items-start">

      <!-- ── Main content ────────────────────────────────────────────────── -->
      <article class="flex-1 min-w-0">

        <!-- Header -->
        <div class="mb-8">
          <div class="flex items-center gap-2 mb-3">
            <span id="article-level"></span>
          </div>
          <h1 id="article-title" class="text-3xl font-extrabold text-white mb-3"></h1>
          <div id="article-meta" class="flex items-center gap-3 text-sm text-white/35"></div>
        </div>

        <!-- Article body -->
        <div id="article-body" class="article-body mb-10"></div>

        <!-- Compare with -->
        <section id="compare-section" class="mb-8 hidden">
          <p class="section-label">So sánh với</p>
          <div id="compare-links" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- Next articles (pathway suggestions) -->
        <section id="next-articles-section" class="mb-8 hidden">
          <p class="section-label">Học tiếp theo</p>
          <div id="next-articles-list" class="flex flex-col gap-3"></div>
        </section>

        <!-- Related pages -->
        <section id="related-section" class="mb-8">
          <p class="section-label">Bài liên quan</p>
          <div id="related-pages" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- Prev / Next -->
        <div id="prev-next" class="border-t border-white/6 pt-6"></div>

      </article>

      <!-- ── TOC sidebar ─────────────────────────────────────────────────── -->
      <aside class="hidden lg:block w-56 flex-shrink-0">
        <div class="toc-sidebar">
          <div id="toc-container"></div>
        </div>
      </aside>

    </div>
  </div>

  <!-- Guest CTA: sticky bottom bar (hidden for logged-in users) -->
  <div id="guest-cta-bar" class="hidden fixed bottom-0 left-0 right-0 z-40 border-t border-teal/20"
       style="background:var(--av-surface-page);backdrop-filter:blur(14px);">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <p class="text-sm text-white/70 leading-snug">
        Luyện IELTS Speaking với AI — nhận feedback ngay lập tức
      </p>
      <a href="/login.html"
         class="flex-shrink-0 inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold
                bg-teal text-white hover:bg-teal-light transition-colors whitespace-nowrap">
        Dùng thử miễn phí →
      </a>
    </div>
  </div>

  <!-- Guest modal: shown after reading 2 articles -->
  <div id="guest-modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4"
       style="background:var(--av-surface-overlay);backdrop-filter:blur(4px);">
    <div class="w-full max-w-sm rounded-2xl border border-white/10 p-6 text-center"
         style="background:var(--av-surface-sunken);">
      <div class="w-12 h-12 rounded-full bg-teal/15 flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-teal-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.347.347A3.5 3.5 0 0112 15.5a3.5 3.5 0 01-2.071-.653l-.347-.347z"/>
        </svg>
      </div>
      <h3 id="guest-modal-title" class="text-base font-semibold text-white mb-2">
        Bạn đang đọc bài ngữ pháp
      </h3>
      <p class="text-sm text-white/55 mb-5 leading-relaxed">
        Muốn biết mình có dùng đúng trong IELTS Speaking không? Thử luyện với AI để nhận feedback ngay.
      </p>
      <div class="flex flex-col gap-2">
        <a href="/login.html"
           class="block w-full py-2.5 rounded-xl text-sm font-semibold bg-teal text-white hover:bg-teal-light transition-colors">
          Luyện Speaking ngay
        </a>
        <button id="guest-modal-dismiss"
                class="block w-full py-2.5 rounded-xl text-sm text-white/40 hover:text-white/70 transition-colors">
          Tiếp tục đọc
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/grammar.js"></script>
  <script>
    grammarWiki.loadGrammarArticle();

    // Reading progress bar
    const progressBar = document.getElementById('reading-progress');
    window.addEventListener('scroll', () => {
      const doc = document.documentElement;
      const scrolled = doc.scrollTop;
      const total = doc.scrollHeight - doc.clientHeight;
      progressBar.style.width = total > 0 ? (scrolled / total * 100) + '%' : '0%';
    }, { passive: true });
  </script>

  <!-- Canonical theme-toggle binding (Sprint 6.10.1). -->
  <script type="module">
    import { bindToggleButton } from '/js/theme-toggle.js';
    var btn = document.getElementById('theme-toggle');
    if (btn) bindToggleButton(btn);
  </script>
</body>
</html>
