<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grammar — IELTS Grammar | Aver Learning</title>
  <meta name="description" id="meta-description" content="Học ngữ pháp tiếng Anh để cải thiện IELTS Speaking và Writing. Ví dụ thực tế, bài tập, và lời giải thích dễ hiểu.">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Aver Learning">
  <meta property="og:title" id="og-title" content="Grammar Wiki — Aver Learning">
  <meta property="og:description" id="og-description" content="Học ngữ pháp tiếng Anh để cải thiện IELTS Speaking và Writing.">
  <link rel="canonical" id="canonical-url" href="https://averlearning.com/grammar">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['DM Sans', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ds.css" />
  <style>
    body {
      background: #07111f;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      font-family: 'DM Sans', ui-sans-serif, system-ui;
    }

    /* Reading progress bar */
    #reading-progress {
      position: fixed; top: 0; left: 0; z-index: 50;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, #0F766E, #14b8a6);
      transition: width 0.1s linear;
      pointer-events: none;
    }

    /* Sticky TOC sidebar */
    .toc-sidebar {
      position: sticky;
      top: 72px;
      max-height: calc(100vh - 90px);
      overflow-y: auto;
    }

    /* TOC active state — left border indicator */
    .toc-link { transition: color 0.15s, border-color 0.15s, padding-left 0.15s; }
    .toc-link.text-teal-light {
      border-left: 2px solid #14b8a6;
      padding-left: 10px;
      color: #14b8a6 !important;
    }

    /* Article header */
    #article-title {
      font-family: 'Lora', serif;
      font-weight: 700;
      line-height: 1.25;
    }

    /* Article typography */
    .article-body {
      color: rgba(255,255,255,0.82);
      line-height: 1.8;
      font-size: 15.5px;
    }
    .article-body h2 {
      font-family: 'Lora', serif;
      font-size: 1.3rem; font-weight: 700; color: #fff;
      margin-top: 2.5rem; margin-bottom: 0.85rem;
      padding-left: 12px;
      border-left: 3px solid #0F766E;
      scroll-margin-top: 80px;
    }
    .article-body h3 {
      font-size: 1.05rem; font-weight: 600;
      color: rgba(255,255,255,0.92);
      margin-top: 1.75rem; margin-bottom: 0.6rem;
      scroll-margin-top: 80px;
      letter-spacing: 0.01em;
    }
    .article-body p { margin-bottom: 1.1rem; }
    .article-body ul, .article-body ol {
      padding-left: 1.5rem; margin-bottom: 1.1rem;
    }
    .article-body ul li { list-style: disc; margin-bottom: 0.4rem; }
    .article-body ol li { list-style: decimal; margin-bottom: 0.4rem; }
    .article-body strong { color: #fff; font-weight: 600; }
    .article-body em { color: #14b8a6; font-style: normal; font-weight: 500; }
    .article-body code {
      background: rgba(20,184,166,0.08);
      border: 1px solid rgba(20,184,166,0.15);
      padding: 0.15em 0.45em; border-radius: 5px;
      font-size: 0.88em; font-family: ui-monospace, monospace;
      color: #14b8a6;
    }
    .article-body pre {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 18px 22px;
      overflow-x: auto; margin-bottom: 1.25rem;
    }
    .article-body pre code {
      background: none; border: none; padding: 0;
      font-size: 0.875rem; color: rgba(255,255,255,0.85);
    }
    .article-body table {
      width: 100%; border-collapse: collapse; margin-bottom: 1.5rem;
      font-size: 0.875rem; display: block; overflow-x: auto;
      border-radius: 10px;
    }
    .article-body table th {
      background: rgba(15,118,110,0.2);
      color: #14b8a6; font-weight: 600;
      padding: 10px 14px; text-align: left;
      border: 1px solid rgba(20,184,166,0.15);
      white-space: nowrap;
    }
    .article-body table td {
      padding: 9px 14px;
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }
    .article-body table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }
    .article-body table tr:hover td { background: rgba(20,184,166,0.04); }

    /* Blockquote — editorial style with decorative quote mark */
    .article-body blockquote {
      position: relative;
      padding: 18px 20px 14px 24px;
      margin: 1.5rem 0;
      background: rgba(20,184,166,0.05);
      border: 1px solid rgba(20,184,166,0.15);
      border-radius: 12px;
      color: rgba(255,255,255,0.78);
      font-style: italic;
    }
    .article-body blockquote::before {
      content: '\201C';
      font-family: 'Lora', serif;
      font-size: 3.5rem; line-height: 1;
      color: rgba(20,184,166,0.25);
      position: absolute; top: -4px; left: 12px;
      pointer-events: none;
    }
    .article-body a {
      color: #14b8a6;
      text-decoration: underline;
      text-decoration-color: rgba(20,184,166,0.35);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s;
    }
    .article-body a:hover { text-decoration-color: #14b8a6; }

    /* Section labels (compare, related) */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .section-label::before {
      content: '';
      display: inline-block; width: 14px; height: 2px;
      background: linear-gradient(90deg, #0F766E, transparent);
      border-radius: 2px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 9999px; }
  </style>
</head>
<body class="text-white min-h-screen font-sans antialiased">

  <!-- Reading progress bar -->
  <div id="reading-progress"></div>

  <!-- Top nav -->
  <nav class="sticky top-0 z-30 border-b border-white/5" style="background: rgba(10,22,40,0.92); backdrop-filter: blur(12px);">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <div id="breadcrumb" class="flex items-center text-sm text-white/40 flex-wrap gap-0">
        <a href="/grammar.html" class="hover:text-teal-light transition-colors">Grammar Wiki</a>
      </div>
      <div class="flex items-center gap-3">
        <a href="/pages/dashboard.html" class="text-xs text-white/30 hover:text-white/60 transition-colors">Dashboard</a>
      </div>
    </div>
  </nav>

  <!-- Skeleton loader (shown while article loads) -->
  <div id="article-skeleton" class="max-w-7xl mx-auto px-4 py-8">
    <div class="skeleton h-8 w-64 rounded-lg mb-4"></div>
    <div class="skeleton h-5 w-40 rounded mb-6"></div>
    <div class="skeleton h-4 w-full rounded mb-2"></div>
    <div class="skeleton h-4 w-5/6 rounded mb-2"></div>
    <div class="skeleton h-4 w-4/5 rounded mb-6"></div>
    <div class="skeleton h-4 w-full rounded mb-2"></div>
    <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
  </div>

  <!-- Article container (hidden until loaded) -->
  <div id="article-container" class="hidden max-w-7xl mx-auto px-4 py-8 ds-fadein">
    <div class="flex gap-8 items-start">

      <!-- ── Main content ────────────────────────────────────────────────── -->
      <article class="flex-1 min-w-0">

        <!-- Header -->
        <div class="mb-8">
          <div class="flex items-center gap-2 mb-3">
            <span id="article-level"></span>
          </div>
          <h1 id="article-title" class="text-3xl font-extrabold text-white mb-3"></h1>
          <div id="article-meta" class="flex items-center gap-3 text-sm text-white/35"></div>
        </div>

        <!-- Article body -->
        <div id="article-body" class="article-body mb-10"></div>

        <!-- Compare with -->
        <section id="compare-section" class="mb-8 hidden">
          <p class="section-label">So sánh với</p>
          <div id="compare-links" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- Next articles (pathway suggestions) -->
        <section id="next-articles-section" class="mb-8 hidden">
          <p class="section-label">Học tiếp theo</p>
          <div id="next-articles-list" class="flex flex-col gap-3"></div>
        </section>

        <!-- Related pages -->
        <section id="related-section" class="mb-8">
          <p class="section-label">Bài liên quan</p>
          <div id="related-pages" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- Prev / Next -->
        <div id="prev-next" class="border-t border-white/6 pt-6"></div>

      </article>

      <!-- ── TOC sidebar ─────────────────────────────────────────────────── -->
      <aside class="hidden lg:block w-56 flex-shrink-0">
        <div class="toc-sidebar">
          <div id="toc-container"></div>
        </div>
      </aside>

    </div>
  </div>

  <!-- Guest CTA: sticky bottom bar (hidden for logged-in users) -->
  <div id="guest-cta-bar" class="hidden fixed bottom-0 left-0 right-0 z-40 border-t border-teal/20"
       style="background:rgba(7,17,31,0.97);backdrop-filter:blur(14px);">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <p class="text-sm text-white/70 leading-snug">
        Luyện IELTS Speaking với AI — nhận feedback ngay lập tức
      </p>
      <a href="/login.html"
         class="flex-shrink-0 inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold
                bg-teal text-white hover:bg-teal-light transition-colors whitespace-nowrap">
        Dùng thử miễn phí →
      </a>
    </div>
  </div>

  <!-- Guest modal: shown after reading 2 articles -->
  <div id="guest-modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4"
       style="background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);">
    <div class="w-full max-w-sm rounded-2xl border border-white/10 p-6 text-center"
         style="background:#0d1f35;">
      <div class="w-12 h-12 rounded-full bg-teal/15 flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-teal-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.347.347A3.5 3.5 0 0112 15.5a3.5 3.5 0 01-2.071-.653l-.347-.347z"/>
        </svg>
      </div>
      <h3 id="guest-modal-title" class="text-base font-semibold text-white mb-2">
        Bạn đang đọc bài ngữ pháp
      </h3>
      <p class="text-sm text-white/55 mb-5 leading-relaxed">
        Muốn biết mình có dùng đúng trong IELTS Speaking không? Thử luyện với AI để nhận feedback ngay.
      </p>
      <div class="flex flex-col gap-2">
        <a href="/login.html"
           class="block w-full py-2.5 rounded-xl text-sm font-semibold bg-teal text-white hover:bg-teal-light transition-colors">
          Luyện Speaking ngay
        </a>
        <button id="guest-modal-dismiss"
                class="block w-full py-2.5 rounded-xl text-sm text-white/40 hover:text-white/70 transition-colors">
          Tiếp tục đọc
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/grammar.js"></script>
  <script>
    grammarWiki.loadGrammarArticle();

    // Reading progress bar
    const progressBar = document.getElementById('reading-progress');
    window.addEventListener('scroll', () => {
      const doc = document.documentElement;
      const scrolled = doc.scrollTop;
      const total = doc.scrollHeight - doc.clientHeight;
      progressBar.style.width = total > 0 ? (scrolled / total * 100) + '%' : '0%';
    }, { passive: true });
  </script>
</body>
</html>
