<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grammar — IELTS Speaking Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <style>
    body { background: #0a1628; }

    /* Sticky TOC sidebar */
    .toc-sidebar {
      position: sticky;
      top: 72px;
      max-height: calc(100vh - 90px);
      overflow-y: auto;
    }

    /* Article typography */
    .article-body {
      color: rgba(255,255,255,0.85);
      line-height: 1.75;
      font-size: 15px;
    }
    .article-body h2 {
      font-size: 1.35rem; font-weight: 700; color: #fff;
      margin-top: 2rem; margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      scroll-margin-top: 80px;
    }
    .article-body h3 {
      font-size: 1.1rem; font-weight: 600; color: rgba(255,255,255,0.9);
      margin-top: 1.5rem; margin-bottom: 0.5rem;
      scroll-margin-top: 80px;
    }
    .article-body p { margin-bottom: 1rem; }
    .article-body ul, .article-body ol {
      padding-left: 1.5rem; margin-bottom: 1rem;
    }
    .article-body ul li { list-style: disc; margin-bottom: 0.3rem; }
    .article-body ol li { list-style: decimal; margin-bottom: 0.3rem; }
    .article-body strong { color: #fff; font-weight: 600; }
    .article-body em { color: #14b8a6; font-style: normal; font-weight: 500; }
    .article-body code {
      background: rgba(255,255,255,0.07);
      padding: 0.15em 0.4em; border-radius: 5px;
      font-size: 0.9em; font-family: ui-monospace, monospace;
    }
    .article-body pre {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 16px 20px;
      overflow-x: auto; margin-bottom: 1rem;
    }
    .article-body pre code {
      background: none; padding: 0; font-size: 0.875rem;
    }
    .article-body table {
      width: 100%; border-collapse: collapse; margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }
    .article-body table th {
      background: rgba(15,118,110,0.15);
      color: #14b8a6; font-weight: 600;
      padding: 8px 12px; text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .article-body table td {
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }
    .article-body table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .article-body blockquote {
      border-left: 3px solid #14b8a6;
      padding: 12px 16px; margin-bottom: 1rem;
      background: rgba(20,184,166,0.05);
      border-radius: 0 10px 10px 0;
      color: rgba(255,255,255,0.75);
    }
    .article-body a {
      color: #14b8a6;
      text-decoration: underline;
      text-decoration-color: rgba(20,184,166,0.35);
      text-underline-offset: 2px;
    }
    .article-body a:hover { text-decoration-color: #14b8a6; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 9999px; }
  </style>
</head>
<body class="text-white min-h-screen font-sans antialiased">

  <!-- Top nav -->
  <nav class="sticky top-0 z-30 border-b border-white/5" style="background: rgba(10,22,40,0.92); backdrop-filter: blur(12px);">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <div id="breadcrumb" class="flex items-center text-sm text-white/40 flex-wrap gap-0">
        <a href="../grammar.html" class="hover:text-teal-light transition-colors">Grammar Wiki</a>
      </div>
      <div class="flex items-center gap-3">
        <a href="../pages/dashboard.html" class="text-xs text-white/30 hover:text-white/60 transition-colors">Dashboard</a>
      </div>
    </div>
  </nav>

  <!-- Skeleton loader (shown while article loads) -->
  <div id="article-skeleton" class="max-w-7xl mx-auto px-4 py-8">
    <div class="skeleton h-8 w-64 rounded-lg mb-4"></div>
    <div class="skeleton h-5 w-40 rounded mb-6"></div>
    <div class="skeleton h-4 w-full rounded mb-2"></div>
    <div class="skeleton h-4 w-5/6 rounded mb-2"></div>
    <div class="skeleton h-4 w-4/5 rounded mb-6"></div>
    <div class="skeleton h-4 w-full rounded mb-2"></div>
    <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
  </div>

  <!-- Article container (hidden until loaded) -->
  <div id="article-container" class="hidden max-w-7xl mx-auto px-4 py-8 ds-fadein">
    <div class="flex gap-8 items-start">

      <!-- ── Main content ────────────────────────────────────────────────── -->
      <article class="flex-1 min-w-0">

        <!-- Header -->
        <div class="mb-8">
          <div class="flex items-center gap-2 mb-3">
            <span id="article-level"></span>
          </div>
          <h1 id="article-title" class="text-3xl font-extrabold text-white mb-3"></h1>
          <div id="article-meta" class="flex items-center gap-3 text-sm text-white/35"></div>
        </div>

        <!-- Article body -->
        <div id="article-body" class="article-body mb-10"></div>

        <!-- Related pages -->
        <section id="related-section" class="mb-8">
          <p class="text-xs font-semibold uppercase tracking-widest text-white/25 mb-3">Bài liên quan</p>
          <div id="related-pages" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- Prev / Next -->
        <div id="prev-next" class="border-t border-white/6 pt-6"></div>

      </article>

      <!-- ── TOC sidebar ─────────────────────────────────────────────────── -->
      <aside class="hidden lg:block w-56 flex-shrink-0">
        <div class="toc-sidebar">
          <div id="toc-container"></div>
        </div>
      </aside>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/grammar.js"></script>
  <script>
    grammarWiki.loadGrammarArticle();
  </script>
</body>
</html>
