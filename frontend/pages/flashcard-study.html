<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Học flashcard — IELTS Speaking Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <style>
    body { background: #0a1628; }

    /* Progress header */
    .progress-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .progress-text   { font-size: 13px; color: rgba(255,255,255,0.6); white-space: nowrap; }
    .progress-bar    { flex: 1; height: 6px; background: rgba(255,255,255,0.08);
                       border-radius: 999px; overflow: hidden; }
    .progress-fill   { height: 100%; background: linear-gradient(90deg, #14b8a6, #0ea5e9);
                       transition: width 0.3s ease; }

    /* Flip card
     *
     * Phase 2.5 Day 2 fix: the back face used to be `position: absolute;
     * inset: 0`, which detached its content from layout flow.  When the
     * back face filled with rich content (IPA banner + def_vi + def_en +
     * example block + "Xem câu gốc" button + meta row) it overflowed past
     * the card's 280px floor and visually overlapped the rating buttons
     * below.
     *
     * Fix: stack both faces in a single grid cell.  The cell sizes itself
     * to the LARGER of the two faces, so the card grows when the back is
     * tall, and the ratings row stays cleanly below.  `backface-visibility`
     * still hides whichever face is rotated 180° away from the viewer, so
     * only one is visible at a time and the flip animation is unchanged.
     */
    .card-stage { perspective: 1200px; min-height: 280px; }
    .flashcard {
      position: relative; width: 100%; min-height: 280px;
      display: grid; grid-template-areas: "card";
      transform-style: preserve-3d; transition: transform 0.5s ease;
      cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .face {
      grid-area: card; backface-visibility: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(15,118,110,0.06) 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center;
    }
    .face.back { transform: rotateY(180deg); align-items: flex-start; text-align: left; justify-content: flex-start; }

    .headword { font-size: 32px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 10px; }
    .topic-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
                 padding: 3px 9px; border-radius: 20px;
                 background: rgba(99,102,241,0.15); color: #a5b4fc;
                 border: 1px solid rgba(99,102,241,0.3); }
    .flip-hint { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.4); }

    .def-vi   { font-size: 17px; color: #fff;            font-weight: 500; margin-bottom: 8px; }
    .def-en   { font-size: 14px; color: rgba(255,255,255,0.7);                margin-bottom: 14px; font-style: italic; }
    .context  { font-size: 13px; color: rgba(94,234,212,0.85); padding: 10px 12px;
                background: rgba(20,184,166,0.06); border-left: 2px solid rgba(20,184,166,0.4);
                border-radius: 6px; margin-bottom: 14px; }
    .meta-row { font-size: 12px; color: rgba(255,255,255,0.45); display: flex; gap: 16px; flex-wrap: wrap; }

    /* Phase D Wave 2 rich content — back-face header (headword + IPA) */
    .back-headword-row {
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px;
      padding-bottom: 10px; margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .back-headword { font-size: 22px; font-weight: 600; color: #fff; }
    .back-ipa {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px; color: #93c5fd;
      padding: 2px 8px; border-radius: 6px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
    }

    /* AI-generated example block (vetted, vs the user's own transcript) */
    .example-block {
      margin-top: 4px; margin-bottom: 14px; padding: 12px 14px;
      border-radius: 10px;
      background: rgba(20,184,166,0.06);
      border-left: 3px solid rgba(20,184,166,0.5);
    }
    .example-label {
      display: inline-block; font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
      background: rgba(20,184,166,0.15); color: #5eead4;
      margin-bottom: 6px;
    }
    .example-text { font-size: 14px; color: rgba(255,255,255,0.88); line-height: 1.55; margin: 0; }

    /* Rating buttons */
    .ratings { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 18px; }
    .rate-btn {
      padding: 14px 8px; border-radius: 12px; cursor: pointer; transition: all 0.15s;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.85); text-align: center; font-size: 13px; font-weight: 500;
    }
    .rate-btn:hover { transform: translateY(-2px); }
    .rate-btn .label    { display: block; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .rate-btn .interval { display: block; font-size: 11px; color: rgba(255,255,255,0.45); }
    .rate-btn .hotkey   { display: inline-block; font-size: 10px; padding: 1px 6px;
                          border-radius: 4px; background: rgba(255,255,255,0.08);
                          color: rgba(255,255,255,0.5); margin-left: 4px; }
    .rate-again { color: #fca5a5; border-color: rgba(239,68,68,0.3); }
    .rate-again:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.5); }
    .rate-hard  { color: #fcd34d; border-color: rgba(251,191,36,0.3); }
    .rate-hard:hover  { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.5); }
    .rate-good  { color: #5eead4; border-color: rgba(20,184,166,0.3); }
    .rate-good:hover  { background: rgba(20,184,166,0.1); border-color: rgba(20,184,166,0.5); }
    .rate-easy  { color: #93c5fd; border-color: rgba(59,130,246,0.3); }
    .rate-easy:hover  { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.5); }
    .rate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .ratings-hint { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; margin-top: 10px; }

    /* Summary */
    .summary {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 28px; text-align: center;
    }
    .summary h2 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .summary p  { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 22px; }
    .summary .big-num { font-size: 48px; font-weight: 700; color: #14b8a6; line-height: 1; }
    .breakdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 22px 0; }
    .breakdown .cell {
      padding: 10px 6px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    }
    .breakdown .cell .num   { font-size: 22px; font-weight: 600; color: #fff; }
    .breakdown .cell .label { font-size: 11px; color: rgba(255,255,255,0.5);
                              text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .summary-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    /* Buttons */
    .btn-primary, .btn-secondary, .btn-ghost {
      font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 10px;
      cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
      display: inline-block; text-decoration: none;
    }
    .btn-primary { background: rgba(20,184,166,0.18); border-color: rgba(20,184,166,0.4); color: #14b8a6; }
    .btn-primary:hover { background: rgba(20,184,166,0.28); }
    .btn-secondary { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    /* Triage view — Wave 2 Day 1 dogfood replacement for the
     * auto:needs_review study queue.  Cards here surface the AI's
     * suggestion + reason so the user can fix the underlying error
     * themselves before promoting the row into the manual stack. */
    .triage-header { margin-bottom: 18px; }
    .triage-header h2 {
      font-size: 18px; font-weight: 700; color: #fff; margin: 0 0 4px;
    }
    .triage-header p {
      font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.5; margin: 0;
    }
    .triage-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(251,146,60,0.25);
      border-left: 3px solid #fb923c;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .triage-card-headword {
      font-size: 16px; font-weight: 600; color: #fff;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .triage-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; padding: 2px 8px; border-radius: 999px;
      background: rgba(251,146,60,0.15); color: #fb923c;
      border: 1px solid rgba(251,146,60,0.3);
    }
    .triage-context {
      font-size: 13px; color: rgba(148,163,184,0.85);
      font-style: italic; margin: 4px 0 8px;
    }
    .triage-suggestion {
      background: rgba(34,197,94,0.06);
      border-left: 2px solid rgba(34,197,94,0.4);
      padding: 8px 10px; border-radius: 6px;
      font-size: 13px; color: rgba(255,255,255,0.85); margin: 6px 0;
    }
    .triage-suggestion strong { color: #4ade80; }
    .triage-reason {
      font-size: 12px; color: rgba(255,255,255,0.45); margin: 4px 0 10px;
    }
    .triage-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .triage-btn {
      font-size: 13px; padding: 6px 12px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .triage-btn--fixed {
      background: rgba(34,197,94,0.12); color: #4ade80;
      border: 1px solid rgba(34,197,94,0.35);
    }
    .triage-btn--fixed:hover {
      background: rgba(34,197,94,0.22); border-color: rgba(34,197,94,0.55);
    }
    .triage-btn--skip {
      background: transparent; color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .triage-btn--skip:hover {
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
    }

    /* States */
    .state-msg { color: rgba(255,255,255,0.4); text-align: center; padding: 56px 16px; font-size: 14px; }
    .state-msg.error { color: #fca5a5; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto;
      border: 3px solid rgba(20,184,166,0.2); border-top-color: #14b8a6;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body class="text-slate-100 font-sans min-h-screen">

  <header style="background:#0C2340; border-bottom:1px solid rgba(255,255,255,0.06);" class="px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="flashcards.html" class="text-sm font-medium flex items-center gap-1 hover:opacity-80" style="color:#14b8a6; text-decoration:none;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          Flashcards
        </a>
        <span class="text-slate-600">|</span>
        <h1 id="study-title" class="text-base font-semibold text-slate-200">Học flashcard</h1>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <!--
      Wave 2 Day 1 dogfood found that rendering needs_review vocab as
      study cards encouraged learners to memorise AI-flagged-as-incorrect
      forms — exactly the wrong outcome.  When stack=auto:needs_review
      we now show a triage view (review the suggestion, fix the underlying
      grammar yourself, then click "Đã sửa") instead of study cards.
      For every other stack we render the existing study UI.
    -->
    <div id="triage-container" class="hidden">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>

    <div id="study-container">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- order matters: supabase CDN → api.js → initSupabase → flashcard-study.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/api.js"></script>
  <script>
    initSupabase(
      'https://nqhrtqspznepmveyurzm.supabase.co',
      'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4'
    );
  </script>
  <script src="../js/flashcard-study.js"></script>
</body>
</html>
