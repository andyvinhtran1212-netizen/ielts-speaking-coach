<!DOCTYPE html>

  <title>Lộ trình học — Grammar Wiki — IELTS Speaking Coach</title>
    <!-- Canonical anti-flash theme bootstrap (DESIGN_SYSTEM § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var theme;
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Tailwind CDN + custom navy/teal palette preserved (Sprint 6.15 Phase B
       finding — js/grammar.js renderer depends on text-teal-light, bg-teal/15,
       etc.). fontFamily key dropped; grammar-wiki.css owns font discipline. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
        },
      },
    }
  </script>

  <!-- DM Sans + Lora sub-system preserved per § 14.2 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>
