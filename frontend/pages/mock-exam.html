<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Thi thử IELTS 4 kỹ năng — Aver Learning</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light'));
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/tailwind.build.css" />
  <style>
    body { margin:0; }
    .me-center { max-width:760px; margin:0 auto; padding:32px 16px; }
    .me-card { background:var(--av-surface-elevated); border:1px solid var(--av-border-default); border-radius:14px; padding:24px; }
    .me-h1 { font-size:24px; font-weight:800; color:var(--av-text-primary); margin-bottom:6px; }
    .me-muted { color:var(--av-text-secondary); line-height:1.65; }

    /* Exam layout: sticky timer bar + ONE section panel at a time */
    #state-test { display:none; flex-direction:column; height:100vh; }
    #state-test.on { display:flex; }
    .me-bar { display:flex; align-items:center; gap:14px; padding:10px 16px; border-bottom:1px solid var(--av-border-default); background:var(--av-surface-elevated); }
    .me-timer { font-variant-numeric:tabular-nums; font-weight:800; font-size:20px; color:var(--av-text-primary); }
    .me-timer.warn { color:var(--av-error); }
    .me-section-label { flex:1; font-weight:700; color:var(--av-text-primary); }
    .me-warn-banner { display:none; padding:6px 16px; background:var(--av-error); color:var(--av-text-on-primary); font-size:13px; text-align:center; }
    .me-warn-banner.on { display:block; }
    .me-panels { flex:1; position:relative; overflow:hidden; }
    .me-panels iframe { width:100%; height:100%; border:0; display:block; }
    .me-panels iframe.hidden { display:none; }
    .me-writing { position:absolute; inset:0; overflow:auto; padding:16px; }
    .me-writing.hidden { display:none; }
    .me-wtabs { display:flex; gap:6px; margin-bottom:10px; }
    .me-tab { padding:8px 14px; border:1px solid var(--av-border-default); border-radius:8px; background:var(--av-surface-card); cursor:pointer; font-size:14px; color:var(--av-text-primary); }
    .me-tab.active { background:var(--av-primary); color:var(--av-text-on-primary); border-color:transparent; }
    .me-wpanel { display:none; }
    .me-wpanel.active { display:block; }
    .me-prompt-image { display:block; margin-bottom:12px; border:1px solid var(--av-border-default); }
    textarea.me-essay { width:100%; min-height:50vh; padding:14px; border:1px solid var(--av-border-default); border-radius:10px; background:var(--av-surface-card); color:var(--av-text-primary); font:inherit; line-height:1.6; }
    .me-count { font-size:12px; color:var(--av-text-secondary); margin-top:6px; }
    .me-waiting-icon { font-size:40px; margin-bottom:8px; }
    .me-checklist { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; justify-content:center; }
    .me-check-pill { font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid var(--av-border-default); color:var(--av-text-secondary); }
    .me-check-pill.done { background:var(--av-primary); color:var(--av-text-on-primary); border-color:transparent; }
    .hidden { display:none; }
  </style>
</head>
<body class="av-page font-sans">
  <div id="state-loading" class="me-center me-muted" style="text-align:center;padding:60px 16px">Đang tải kỳ thi…</div>
  <div id="state-error" class="hidden me-center"><div class="me-card" style="text-align:center;color:var(--av-error)"></div></div>

  <!-- WAITING ROOM: not started yet, or this section submitted and the admin
       hasn't opened the next one yet. No per-student "Start" button — the
       exam moves forward only when the admin advances it (shared clock). -->
  <div id="state-waiting" class="hidden me-center">
    <div class="me-card" style="text-align:center">
      <div class="me-waiting-icon">⏳</div>
      <h1 class="me-h1" id="waiting-title">Thi thử IELTS</h1>
      <p class="me-muted" id="waiting-msg"></p>
      <div class="me-checklist" id="waiting-checklist"></div>
    </div>
  </div>

  <!-- TEST: exactly ONE section shown at a time -->
  <div id="state-test">
    <div class="me-bar">
      <span class="me-timer" id="timer">--:--</span>
      <div class="me-section-label" id="section-label"></div>
    </div>
    <div class="me-warn-banner" id="warn-banner">⚠ Sắp hết giờ phần này — bài sẽ tự nộp khi hết giờ.</div>
    <div class="me-panels" id="panels">
      <iframe id="panel-frame" class="hidden" title="Bài thi"></iframe>
      <div class="me-writing hidden" id="panel-writing">
        <div class="me-wtabs">
          <div class="me-tab active" data-wtab="task1">Task 1</div>
          <div class="me-tab" data-wtab="task2">Task 2</div>
        </div>
        <div class="me-wpanel active" data-wpanel="task1">
          <div class="me-muted" id="prompt-task1" style="margin-bottom:8px;white-space:pre-wrap"></div>
          <img id="prompt-task1-image" class="me-prompt-image hidden max-w-full rounded" alt="" loading="lazy" />
          <textarea class="me-essay" id="essay-task1" placeholder="Viết Task 1…"></textarea>
          <div class="me-count"><span id="count-task1">0</span> từ</div>
        </div>
        <div class="me-wpanel" data-wpanel="task2">
          <div class="me-muted" id="prompt-task2" style="margin-bottom:8px;white-space:pre-wrap"></div>
          <textarea class="me-essay" id="essay-task2" placeholder="Viết Task 2…"></textarea>
          <div class="me-count"><span id="count-task2">0</span> từ</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SUBMITTED -->
  <div id="state-submitted" class="hidden me-center">
    <div class="me-card" style="text-align:center">
      <div style="font-size:40px;margin-bottom:8px">✅</div>
      <h1 class="me-h1">Đã thu bài</h1>
      <p class="me-muted" id="submitted-msg"></p>
      <div id="submitted-extra" style="margin-top:16px"></div>
      <a class="av-btn" href="/pages/home.html" style="margin-top:16px;display:inline-block">Về trang chủ</a>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.107.0"></script>
  <script src="/js/api.js"></script>
  <script src="/js/mock-exam-runner.js"></script>
</body>
</html>
