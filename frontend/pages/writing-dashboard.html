<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Bài viết của em — Aver Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0C2340 0%, #0d2e45 40%, #0F766E 100%);
      min-height: 100vh;
      color: #e5e7eb;
    }
    /* Subtle radial accent — matches index.html hero treatment */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 70% 30%, rgba(15,118,110,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .essay-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      transition: transform 0.18s, border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }
    .essay-card.clickable { cursor: pointer; }
    .essay-card.clickable:hover {
      background: rgba(15,118,110,0.12);
      border-color: rgba(20,184,166,0.4);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(15,118,110,0.18);
    }
    .essay-card.clickable:focus-visible {
      outline: 2px solid #14b8a6;
      outline-offset: 2px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
    }
    .pill-green { background: rgba(20,184,166,0.15);  color: #14b8a6; }
    .pill-amber { background: rgba(251,191,36,0.15);  color: #fbbf24; }
    .pill-blue  { background: rgba(59,130,246,0.18);  color: #60a5fa; }
    .pill-red   { background: rgba(239,68,68,0.18);   color: #f87171; }
    .pill-gray  { background: rgba(156,163,175,0.18); color: #d1d5db; }
    .pill-purple{ background: rgba(168,85,247,0.18);  color: #c4b5fd; }
    .pill-timed { background: rgba(245,158,11,0.18);  color: #fbbf24; }

    /* Phase 2.3b — tab nav + assignment cards */
    .tab-btn {
      padding: 0.5rem 1rem;
      border-bottom: 2px solid transparent;
      color: #9ca3af;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s;
    }
    .tab-btn:hover { color: #e5e7eb; }
    .tab-btn.active {
      color: #14b8a6;
      border-bottom-color: #14b8a6;
    }
    .assignment-card { /* same look as essay-card; written separately so the
                         click semantics aren't accidentally inherited */
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      transition: background 0.18s, border-color 0.18s;
    }
    .assignment-card:hover {
      background: rgba(15,118,110,0.08);
      border-color: rgba(20,184,166,0.3);
    }
    .essay-textarea {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e5e7eb;
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      font-family: 'Inter', ui-sans-serif, system-ui;
      resize: vertical;
      font-size: 14px;
      line-height: 1.6;
    }
    .essay-textarea:focus { outline: none; border-color: #14b8a6; }
    .btn-primary {
      background: #14b8a6;
      color: #0a1628;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-primary:hover    { background: #0d9488; }
    .btn-primary:disabled { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.4); cursor: not-allowed; }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #e5e7eb;
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.10);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.10); }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    main { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <main class="max-w-3xl mx-auto px-4 py-6">
    <!-- Header -->
    <header class="flex items-center justify-between mb-8">
      <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
        <span class="text-xl font-bold">Aver<span class="text-teal-light">Learning</span></span>
      </a>
      <button id="logout-btn"
              class="text-sm text-gray-300 hover:text-white transition px-3 py-1.5 rounded-md border border-white/10 hover:border-white/30">
        Đăng xuất
      </button>
    </header>

    <!-- Loading state -->
    <div id="loading" class="text-center py-16" role="status" aria-live="polite">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-teal-light border-t-transparent"></div>
      <p class="mt-3 text-gray-300">Đang tải...</p>
    </div>

    <!-- Error state -->
    <div id="error" class="hidden max-w-md mx-auto text-center py-16">
      <div class="rounded-lg p-6 border border-red-500/20 bg-red-500/5">
        <p class="text-red-300 mb-4" id="error-message"></p>
        <a id="error-cta"
           href="../index.html"
           class="inline-block text-teal-light underline hover:text-white transition">
          Quay về trang chủ
        </a>
      </div>
    </div>

    <!-- Main content -->
    <div id="content" class="hidden">
      <!-- Greeting -->
      <section class="mb-8">
        <h1 class="text-2xl md:text-3xl font-semibold mb-2">
          Chào em, <span id="greeting-name">...</span> 👋
        </h1>
        <p class="text-sm text-gray-300">
          Mã học viên: <span id="student-code" class="font-mono text-gray-200">...</span>
          <span id="target-band-section" class="hidden">
            <span class="text-gray-500 mx-2">·</span>
            Mục tiêu: Band <span id="target-band">—</span>
          </span>
        </p>
      </section>

      <!-- Phase 2.3b — tab nav -->
      <div class="flex border-b border-white/10 mb-6 gap-1">
        <button id="tab-assignments" type="button" class="tab-btn active">
          📋 Bài giao
          <span id="assignments-count" class="ml-1 text-xs text-gray-500"></span>
        </button>
        <button id="tab-essays" type="button" class="tab-btn">
          📝 Bài đã nộp
          <span id="essays-count" class="ml-1 text-xs text-gray-500"></span>
        </button>
      </div>

      <!-- Tab 1 — Bài giao (active assignments awaiting submission) -->
      <section id="content-assignments">
        <div id="assignments-list" class="space-y-3"></div>
        <div id="assignments-empty" class="hidden text-center py-16 rounded-lg border border-white/10 bg-white/5">
          <p class="text-gray-200 mb-2">Em chưa có bài giao nào.</p>
          <p class="text-sm text-gray-400">Khi giảng viên giao đề, em sẽ thấy ở đây.</p>
        </div>
      </section>

      <!-- Tab 2 — Bài đã nộp (existing essays list) -->
      <section id="content-essays" class="hidden">
        <div id="essays-list" class="space-y-3"></div>
        <div id="empty-state" class="hidden text-center py-16 rounded-lg border border-white/10 bg-white/5">
          <p class="text-gray-200 mb-2">Em chưa có bài viết nào.</p>
          <p class="text-sm text-gray-400">Hãy nộp bài đầu tiên qua thẻ "Bài giao" hoặc qua giảng viên của em.</p>
        </div>
      </section>
    </div>
  </main>

  <!-- ─── SCRIPTS: order matters — supabase CDN → api.js → inline ── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/api.js"></script>
  <script>
    var SUPABASE_URL  = 'https://nqhrtqspznepmveyurzm.supabase.co';
    var SUPABASE_ANON = 'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4';
    initSupabase(SUPABASE_URL, SUPABASE_ANON);

    // ── Status pill mapping ─────────────────────────────────────────
    // 'submitted' is included for forward-compat — the 033 schema's
    // first lifecycle state is 'pending', but Phase 2.3 may rename
    // the user-facing first state. Both keys map to the same gray
    // pill so the UI doesn't flash unknown-status.
    var STATUS_CONFIG = {
      pending:   { text: '⏳ Chờ chấm',         pill: 'pill-gray',  clickable: false },
      submitted: { text: '⏳ Chờ chấm',         pill: 'pill-gray',  clickable: false },
      grading:   { text: '⏳ Đang chấm',        pill: 'pill-blue',  clickable: false },
      graded:    { text: '📋 Đang xem lại',    pill: 'pill-amber', clickable: false },
      reviewed:  { text: '📋 Đang xem lại',    pill: 'pill-amber', clickable: false },
      delivered: { text: '✓ Đã nhận xét',      pill: 'pill-green', clickable: true  },
      failed:    { text: '⚠ Lỗi, liên hệ giảng viên', pill: 'pill-red', clickable: false },
    };

    var TASK_LABELS = {
      task1_academic: 'Task 1 (Academic)',
      task1_general:  'Task 1 (General)',
      task2:          'Task 2',
    };

    // Phase 2.3b — assignment status pill mapping. Mirrors the
    // 5-state workflow from migration 036.
    var ASSIGNMENT_STATUS = {
      pending:     { text: '⏳ Chờ làm',       pill: 'pill-gray'   },
      in_progress: { text: '📝 Đang làm',      pill: 'pill-blue'   },
      submitted:   { text: '📥 Đã nộp',        pill: 'pill-amber'  },
      graded:      { text: '✓ Đã chấm',       pill: 'pill-purple' },
      delivered:   { text: '📨 Đã nhận xét',   pill: 'pill-green'  },
    };
    // Active states show in the "Bài giao" tab; submitted/graded/
    // delivered have their card under "Bài đã nộp" via writing_essays.
    var ACTIVE_ASSIGNMENT_STATES = ['pending', 'in_progress'];

    // ── Helpers ─────────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function formatDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    // ── Render ──────────────────────────────────────────────────────
    function renderStudent(student) {
      var s = student || {};
      document.getElementById('greeting-name').textContent = s.full_name || 'em';
      document.getElementById('student-code').textContent  = s.student_code || '—';
      if (s.target_band != null) {
        document.getElementById('target-band').textContent = s.target_band;
        show('target-band-section');
      }
    }

    function renderEssays(essays) {
      var list = document.getElementById('essays-list');
      essays = essays || [];

      // Phase 2.3b refactored the section header into a tab nav, so
      // the original `<span id="essay-count">` is gone. The tab badge
      // (`essays-count`, plural) is now the single source of truth and
      // is written by `loadEssays()` after this call returns. Reading
      // the dead id here was crashing the whole render with
      // "Cannot set properties of null" the moment the user clicked
      // the "Bài đã nộp" tab (Sprint 2.3b.1 production canary).

      if (essays.length === 0) {
        show('empty-state');
        return;
      }
      hide('empty-state');

      list.innerHTML = essays.map(function (e) {
        var status = STATUS_CONFIG[e.status] || STATUS_CONFIG.pending;
        var task   = TASK_LABELS[e.task_type] || 'Bài viết';
        var date   = formatDate(e.created_at);

        var clickable = status.clickable;
        var cardClass = 'essay-card rounded-lg p-4' + (clickable ? ' clickable' : '');

        // Phase 2.2.1: emit ONLY data-essay-id + a11y attrs. The previous
        // approach inlined onclick="window.location.href=" + JSON.stringify(href)
        // which embedded a double-quoted JSON string inside the double-quoted
        // onclick attribute. The browser parsed it as
        //   onclick="window.location.href="   (truncated)
        // followed by bogus attributes, then SyntaxError on first user click.
        // Listeners attached after innerHTML (see attachEssayCardClickListeners)
        // compute the URL at click time so nothing is serialised into HTML.
        var openAttrs = clickable
          ? ' role="link" tabindex="0"'
          : '';

        var arrow = clickable
          ? '<span class="text-teal-light text-sm font-medium">Xem →</span>'
          : '';

        var essayIdAttr = ' data-essay-id="' + escapeHtml(e.id) + '"';

        return (
          '<div class="' + cardClass + '"' + essayIdAttr + openAttrs + '>' +
            '<div class="flex items-center justify-between gap-3 mb-2">' +
              '<span class="text-xs text-gray-300 font-medium">' + escapeHtml(task) + ' · ' + escapeHtml(date) + '</span>' +
              '<span class="pill ' + status.pill + '">' + escapeHtml(status.text) + '</span>' +
            '</div>' +
            '<p class="text-sm text-gray-200 mb-2 line-clamp-2">' + escapeHtml(e.prompt_preview || '') + '</p>' +
            (arrow ? '<div class="flex justify-end">' + arrow + '</div>' : '') +
          '</div>'
        );
      }).join('');

      attachEssayCardClickListeners();
    }

    function attachEssayCardClickListeners() {
      // Wire pointer + keyboard (Enter / Space) navigation on every
      // .essay-card.clickable. Computing the URL inside the listener
      // — instead of serialising it into an inline attribute —
      // sidesteps the quote-nesting class of bugs entirely.
      //
      // Phase 2.2.2: navigate via absolute /writing/result rewrite
      // instead of window.api.url('pages/...'). Reason: api.js's
      // _appRoot heuristic only triggers when window.location.pathname
      // matches /\/pages\/[^/]+$/. The user reaches this dashboard via
      // the /writing/dashboard Vercel rewrite, so pathname is
      // "/writing/dashboard" and _appRoot resolves to "./", producing
      // ./pages/writing-result.html which the browser resolves against
      // /writing/ → /writing/pages/writing-result.html → 404 (canary
      // 2026-05-06). The /writing/result rewrite is already declared
      // in frontend/vercel.json, so an absolute path is the cleanest
      // production fix and keeps the address bar pretty.
      var cards = document.querySelectorAll('.essay-card.clickable');
      cards.forEach(function (card) {
        var goToDetail = function () {
          var essayId = card.getAttribute('data-essay-id');
          if (!essayId) return;
          window.location.href =
            '/writing/result?essay_id=' + encodeURIComponent(essayId);
        };
        card.addEventListener('click', goToDetail);
        card.addEventListener('keydown', function (ev) {
          if (ev.key === 'Enter' || ev.key === ' ') {
            ev.preventDefault();
            goToDetail();
          }
        });
      });
    }

    // ── Phase 2.3b — assignments tab ────────────────────────────────
    //
    // The "Bài giao" tab is the entry point for active assignments
    // (pending + in_progress). Clicking a card expands an inline
    // submit form below the card header — no separate page, the
    // textarea state lives in `_draftSaveTimers` (per-assignment
    // setTimeout handles for the 3-second debounce).

    var _draftSaveTimers = {};                  // assignment_id → timeout handle
    var _timerIntervals  = {};                  // assignment_id → setInterval handle (Phase 2.3c-3)

    // ── Phase 2.3c-3: IELTS-mode countdown helpers ──────────────────
    function formatTimer(seconds) {
      if (seconds === null || seconds === undefined) return '—';
      if (seconds <= 0) return 'Hết giờ';
      var mins = Math.floor(seconds / 60);
      var secs = Math.floor(seconds % 60);
      return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    }

    function showTimerToast(message) {
      var toast = document.createElement('div');
      toast.className = 'fixed top-4 right-4 z-50 px-4 py-3 rounded shadow-lg font-medium';
      toast.style.background = '#f59e0b';
      toast.style.color = '#0a1628';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function () { toast.remove(); }, 5000);
    }

    function stopCountdown(assignmentId) {
      if (_timerIntervals[assignmentId]) {
        clearInterval(_timerIntervals[assignmentId]);
        delete _timerIntervals[assignmentId];
      }
    }

    // Sprint 2.3c-3.1 — race fix.
    //
    // GET /my-assignments/{id} returns `timer.started_at = null`
    // before the student's first draft save (by design — the timer
    // starts when the student begins writing, not when they open
    // the card).  That means the initial render path can't kick
    // off the countdown.  PATCH /draft is what stamps started_at
    // server-side, but its response is the draft row, not the
    // refreshed timer state.
    //
    // This helper closes the gap: after every successful saveDraft
    // we re-poll /timer.  When the row was just stamped, the next
    // /timer response carries a real `time_remaining_seconds` and
    // we can finally start the local interval.  After that first
    // initialization the helper is a no-op (gated by
    // `_timerIntervals[assignmentId]`) so subsequent saves don't
    // burn an extra GET.
    async function maybeInitTimerAfterDraftSave(assignmentId, region, textarea) {
      if (_timerIntervals[assignmentId]) return;        // already running
      if (!region.querySelector('.timer-banner')) return;  // not a timed assignment

      try {
        var fresh = await window.api.get(
          '/api/writing/my-assignments/' + encodeURIComponent(assignmentId) + '/timer'
        );
        if (!fresh || !fresh.is_timed || fresh.is_expired) return;
        if (typeof fresh.time_remaining_seconds !== 'number') return;
        if (fresh.time_remaining_seconds <= 0) return;

        // Replace the "Bắt đầu khi gõ" placeholder before kicking
        // off the interval so the first paint isn't a 1s delay.
        var display = region.querySelector('.timer-display');
        if (display) display.textContent = formatTimer(fresh.time_remaining_seconds);

        startCountdown(region, assignmentId, fresh.time_remaining_seconds, textarea);
      } catch (e) {
        // Non-fatal — the next save will retry.
        console.warn('Timer init after stamp failed:', e);
      }
    }

    function formatRelativeTime(iso) {
      if (!iso) return '';
      var t = new Date(iso).getTime();
      if (isNaN(t)) return '';
      var diffSec = Math.max(0, Math.floor((Date.now() - t) / 1000));
      if (diffSec < 30)            return 'vừa xong';
      if (diffSec < 60)            return diffSec + ' giây trước';
      if (diffSec < 3600)          return Math.floor(diffSec / 60)   + ' phút trước';
      if (diffSec < 86400)         return Math.floor(diffSec / 3600) + ' giờ trước';
      return formatDate(iso);
    }

    function countWords(text) {
      var trimmed = (text || '').trim();
      if (!trimmed) return 0;
      return trimmed.split(/\s+/).length;
    }

    function setTabActive(tab) {
      var assignBtn = document.getElementById('tab-assignments');
      var essayBtn  = document.getElementById('tab-essays');
      assignBtn.classList.toggle('active', tab === 'assignments');
      essayBtn.classList.toggle('active',  tab === 'essays');
      document.getElementById('content-assignments').classList.toggle('hidden', tab !== 'assignments');
      document.getElementById('content-essays').classList.toggle('hidden',      tab !== 'essays');
    }

    function renderAssignments(assignments) {
      var list  = document.getElementById('assignments-list');
      var empty = document.getElementById('assignments-empty');

      if (!assignments || assignments.length === 0) {
        list.innerHTML = '';
        show('assignments-empty');
        return;
      }
      empty.classList.add('hidden');

      list.innerHTML = assignments.map(function (a) {
        var prompt = a.writing_prompts || {};
        var statusKey = a.status || 'pending';
        var statusCfg = ASSIGNMENT_STATUS[statusKey] || ASSIGNMENT_STATUS.pending;
        var taskLabel = TASK_LABELS[prompt.task_type] || 'Bài viết';

        var draftHint = '';
        if (a.has_draft) {
          var rel = a.draft_updated_at ? ' · ' + formatRelativeTime(a.draft_updated_at) : '';
          draftHint =
            '<p class="text-xs text-gray-400 mb-3">📝 Bản nháp: ' +
              (a.draft_word_count || 0) + ' từ' + escapeHtml(rel) +
            '</p>';
        }

        var deadlineLine = a.deadline
          ? '<span class="text-xs text-amber-300">Hạn: ' + formatDate(a.deadline) + '</span>'
          : '';

        var toggleLabel = a.has_draft ? 'Tiếp tục viết' : 'Bắt đầu viết';

        return (
          '<div class="assignment-card rounded-lg p-4" data-assignment-id="' + escapeHtml(a.id) + '">' +
            '<div class="flex items-start justify-between gap-3 mb-2">' +
              '<div class="min-w-0">' +
                '<h3 class="font-semibold text-gray-100 truncate">' + escapeHtml(prompt.title || '(Đề bài đã xóa)') + '</h3>' +
                '<div class="flex items-center gap-2 mt-1 flex-wrap">' +
                  '<span class="pill ' + statusCfg.pill + '">' + escapeHtml(statusCfg.text) + '</span>' +
                  '<span class="text-xs text-gray-400">' + escapeHtml(taskLabel) + '</span>' +
                  (a.is_timed && a.time_limit_minutes
                    ? '<span class="pill pill-timed">⏱️ ' + a.time_limit_minutes + ' phút</span>'
                    : '') +
                '</div>' +
              '</div>' +
              deadlineLine +
            '</div>' +
            draftHint +
            '<button type="button" class="btn-toggle text-sm text-teal-light hover:text-white">' +
              escapeHtml(toggleLabel) + ' →' +
            '</button>' +
            '<div class="form-region hidden mt-4 pt-4 border-t border-white/10"></div>' +
          '</div>'
        );
      }).join('');

      // Wire the toggle buttons via event delegation. Phase 2.2.1 ban
      // on inline onclick handlers still applies (anti-pattern #18).
      list.querySelectorAll('.btn-toggle').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var card = btn.closest('.assignment-card');
          if (!card) return;
          var assignmentId = card.getAttribute('data-assignment-id');
          toggleSubmitForm(card, assignmentId, btn);
        });
      });
    }

    async function toggleSubmitForm(card, assignmentId, toggleBtn) {
      var region = card.querySelector('.form-region');

      // Collapse if already open.
      if (!region.classList.contains('hidden')) {
        region.classList.add('hidden');
        // Stop the IELTS-mode countdown when the card collapses —
        // otherwise the interval keeps ticking and burning a network
        // call every 30s for a banner the student can't see.
        stopCountdown(assignmentId);
        toggleBtn.textContent = (toggleBtn.textContent || '').replace(/^Đang viết/, 'Tiếp tục viết');
        return;
      }

      try {
        var data = await window.api.get('/api/writing/my-assignments/' + encodeURIComponent(assignmentId));
        if (!data) return;
        renderSubmitForm(region, assignmentId, data, toggleBtn);
        toggleBtn.textContent = 'Đang viết · click để đóng';
      } catch (err) {
        alert('Không tải được bài giao: ' + (err.message || 'không xác định'));
      }
    }

    function renderSubmitForm(region, assignmentId, data, toggleBtn) {
      var assignment = data.assignment || {};
      var prompt     = assignment.writing_prompts || {};
      var draft      = data.draft || {};
      var draftText  = draft.draft_text || '';

      var instructionsHtml = assignment.instructions
        ? '<div class="mb-3 p-3 rounded text-xs leading-relaxed" style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);color:#fcd34d">' +
            '📌 ' + escapeHtml(assignment.instructions) +
          '</div>'
        : '';

      // Phase 2.3c-1: Task 1 Academic prompts can carry a chart/diagram
      // image. Render it above the prompt text so the student sees the
      // visual before reading the description.
      var promptImageHtml = prompt.prompt_image_url
        ? '<img src="' + escapeHtml(prompt.prompt_image_url) + '" alt="" '
            + 'class="mb-3 max-w-full rounded border border-white/10" loading="lazy" />'
        : '';

      // Phase 2.3c-3: IELTS-mode banner. Renders only when the
      // assignment is timed AND a time_limit is set (the migration's
      // CHECK constraint guarantees the pair, but we still defend
      // against a legacy row missing one or the other).
      var timer = data.timer || {};
      var isTimed = timer.is_timed && timer.time_limit_minutes;
      var initialRemaining = (timer.time_remaining_seconds === null
                               || timer.time_remaining_seconds === undefined)
        ? null
        : timer.time_remaining_seconds;
      // Pre-stamp display: when `started_at` is still NULL the
      // countdown can't run yet — show a hint that the clock starts
      // on first save instead of a literal '—', which production
      // canary 2026-05-06 read as "broken".
      var initialDisplay = initialRemaining !== null
        ? formatTimer(initialRemaining)
        : 'Bắt đầu khi gõ';
      var timerHtml = isTimed
        ? ('<div class="timer-banner mb-3 p-3 rounded flex items-center justify-between" '
            + 'style="background:rgba(245,158,11,0.10);border:1px solid rgba(245,158,11,0.25)">'
          +   '<div>'
          +     '<div class="text-xs uppercase tracking-wider text-amber-400 mb-1">⏱️ IELTS-mode</div>'
          +     '<div class="text-xs text-gray-400">Tổng thời gian: '
          +       timer.time_limit_minutes + ' phút</div>'
          +   '</div>'
          +   '<div class="timer-display text-xl font-mono font-bold text-amber-400">'
          +     escapeHtml(initialDisplay)
          +   '</div>'
          + '</div>')
        : '';

      region.innerHTML =
        timerHtml +
        promptImageHtml +
        '<div class="mb-3 p-3 rounded text-sm text-gray-300 leading-relaxed" style="background:rgba(255,255,255,0.04)">' +
          escapeHtml(prompt.prompt_text || '') +
        '</div>' +
        instructionsHtml +
        // Phase 2.3c-2 — file upload: text from .docx/.txt is APPENDED
        // to the textarea (preserves any current draft).  The hidden
        // <input type="file"> sits inside the <label> so a click on
        // the visible text triggers the picker.
        '<div class="mb-3 flex items-center gap-3">' +
          '<label class="inline-flex items-center gap-1 text-sm text-teal-400 hover:text-teal-300 cursor-pointer">' +
            '<span>📎 Tải file (.docx, .txt)</span>' +
            '<input type="file" class="essay-file-input hidden" accept=".docx,.txt" />' +
          '</label>' +
          '<span class="upload-status text-xs hidden"></span>' +
        '</div>' +
        '<textarea class="essay-textarea" rows="14" placeholder="Bắt đầu viết bài…">' +
          escapeHtml(draftText) +
        '</textarea>' +
        '<div class="flex flex-wrap items-center justify-between gap-3 mt-3">' +
          '<div class="text-xs text-gray-400 flex items-center gap-3">' +
            '<span><span class="word-counter">0</span> từ</span>' +
            '<span class="save-saved hidden text-emerald-400">✓ Đã lưu</span>' +
            '<span class="save-pending hidden text-amber-300">💾 Đang lưu…</span>' +
            '<span class="save-error hidden text-red-300"></span>' +
          '</div>' +
          '<div class="flex gap-2">' +
            '<button type="button" class="btn-secondary btn-save-draft">Lưu bản nháp</button>' +
            '<button type="button" class="btn-primary btn-submit">Nộp bài</button>' +
          '</div>' +
        '</div>';

      region.classList.remove('hidden');

      var textarea  = region.querySelector('.essay-textarea');
      var counter   = region.querySelector('.word-counter');
      var savedEl   = region.querySelector('.save-saved');
      var pendingEl = region.querySelector('.save-pending');
      var errorEl   = region.querySelector('.save-error');

      function refreshCount() { counter.textContent = countWords(textarea.value); }
      refreshCount();

      // Auto-save: clear any pending timer, mark "Đang lưu…", fire
      // the PATCH after 3s of inactivity.
      textarea.addEventListener('input', function () {
        refreshCount();
        savedEl.classList.add('hidden');
        errorEl.classList.add('hidden');
        pendingEl.classList.remove('hidden');

        if (_draftSaveTimers[assignmentId]) {
          clearTimeout(_draftSaveTimers[assignmentId]);
        }
        _draftSaveTimers[assignmentId] = setTimeout(function () {
          saveDraft(assignmentId, textarea.value, region);
        }, 3000);
      });

      region.querySelector('.btn-save-draft').addEventListener('click', function () {
        if (_draftSaveTimers[assignmentId]) {
          clearTimeout(_draftSaveTimers[assignmentId]);
        }
        saveDraft(assignmentId, textarea.value, region);
      });
      region.querySelector('.btn-submit').addEventListener('click', function () {
        // Cancel any pending auto-save — submit replaces it.
        if (_draftSaveTimers[assignmentId]) {
          clearTimeout(_draftSaveTimers[assignmentId]);
        }
        submitEssay(assignmentId, textarea.value, region);
      });

      // Phase 2.3c-2 — file upload (.docx / .txt). Append to textarea
      // and dispatch an `input` event so the existing word-counter +
      // 3s auto-save flow runs unchanged.
      var fileInput    = region.querySelector('.essay-file-input');
      var uploadStatus = region.querySelector('.upload-status');

      function setUploadStatus(text, tone) {
        uploadStatus.textContent = text;
        uploadStatus.classList.remove('hidden', 'text-gray-400', 'text-emerald-400', 'text-red-400');
        var toneClass = (
          tone === 'success' ? 'text-emerald-400' :
          tone === 'error'   ? 'text-red-400'     :
                               'text-gray-400'
        );
        uploadStatus.classList.add(toneClass);
      }

      fileInput.addEventListener('change', async function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (!file) return;

        // Client-side size pre-check — saves a round-trip; the
        // backend re-validates with the same 2MB cap.
        if (file.size > 2 * 1024 * 1024) {
          setUploadStatus('✕ File quá lớn (tối đa 2MB)', 'error');
          fileInput.value = '';
          return;
        }

        setUploadStatus('📤 Đang xử lý ' + file.name + '…', 'pending');

        try {
          var fd = new FormData();
          fd.append('file', file);
          // `window.api.upload` skips the JSON Content-Type so the
          // browser's multipart boundary is preserved (same helper
          // the admin image uploader uses).
          var result = await window.api.upload('/api/writing/extract-text', fd);

          var current   = textarea.value;
          var separator = current.trim() ? '\n\n' : '';
          textarea.value = current + separator + result.text;

          // Re-fire `input` so the word counter + auto-save debounce
          // pick up the appended text — same path as a manual edit.
          textarea.dispatchEvent(new Event('input', { bubbles: true }));

          setUploadStatus('✓ Đã thêm ' + result.word_count + ' từ', 'success');
          setTimeout(function () { uploadStatus.classList.add('hidden'); }, 3000);
        } catch (err) {
          setUploadStatus('✕ ' + ((err && err.message) || 'Lỗi xử lý file'), 'error');
        } finally {
          // Clear the file input so re-selecting the same file still
          // fires `change` (browsers suppress it otherwise).
          fileInput.value = '';
        }
      });

      // ── Phase 2.3c-3 — IELTS-mode countdown ──────────────────────
      // We only kick off the interval when the assignment IS timed
      // and the server already stamped started_at. Until the student
      // makes their first draft save the timer is dormant by design.
      if (isTimed && initialRemaining !== null && initialRemaining > 0) {
        startCountdown(region, assignmentId, initialRemaining, textarea);
      } else if (isTimed && timer.is_expired
                 && assignment.status !== 'submitted'
                 && assignment.status !== 'graded'
                 && assignment.status !== 'delivered') {
        // The student opened a card whose timer ALREADY expired —
        // submit whatever's in the textarea (or the saved draft if
        // empty) so the row exits the active state cleanly. The
        // backend marks `auto_submitted=true` because it sees the
        // timer is expired at submit time.
        showTimerToast('⏰ Hết giờ — đang nộp bài tự động.');
        submitEssay(assignmentId, textarea.value, region, /* force */ true);
      }
    }

    function startCountdown(region, assignmentId, initialRemaining, textarea) {
      var display = region.querySelector('.timer-display');
      if (!display) return;

      // Replace any stale interval for this assignment — re-opening
      // a card while a previous interval is still running would
      // double-tick the display.
      stopCountdown(assignmentId);

      var remaining = initialRemaining;
      var lastSync  = Date.now();
      var warned5min = false;

      _timerIntervals[assignmentId] = setInterval(async function () {
        remaining -= 1;
        display.textContent = formatTimer(remaining);

        // ≤5 min: shift the banner colour to red so peripheral
        // vision picks it up. The class swap is idempotent.
        if (remaining <= 300 && !display.classList.contains('text-red-500')) {
          display.classList.remove('text-amber-400');
          display.classList.add('text-red-500');
        }

        // One-shot 5-minute warning toast.
        if (!warned5min && remaining <= 300 && remaining > 295) {
          warned5min = true;
          showTimerToast('⚠️ Còn 5 phút!');
        }

        // 0:00 → auto-submit. We clear the interval BEFORE awaiting
        // submitEssay so a slow network request can't fire a second
        // tick that re-enters this branch.
        if (remaining <= 0) {
          stopCountdown(assignmentId);
          showTimerToast('⏰ Hết giờ! Đang nộp bài…');
          await submitEssay(assignmentId, textarea.value, region, /* force */ true);
          return;
        }

        // Server reconciliation every ~30s — protects against client
        // clock drift (or a student tabbing away and the OS de-
        // scheduling the JS event loop). We snap when the drift
        // exceeds 10s, which is the smallest gap a human notices.
        if (Date.now() - lastSync > 30000) {
          lastSync = Date.now();
          try {
            var fresh = await window.api.get(
              '/api/writing/my-assignments/'
              + encodeURIComponent(assignmentId) + '/timer'
            );
            if (fresh.is_expired) {
              remaining = 0;
            } else if (typeof fresh.time_remaining_seconds === 'number') {
              if (Math.abs(fresh.time_remaining_seconds - remaining) > 10) {
                remaining = fresh.time_remaining_seconds;
              }
            }
          } catch (e) {
            // Sync failure is non-fatal — keep ticking locally.
            console.warn('Timer sync failed:', e);
          }
        }
      }, 1000);
    }

    async function saveDraft(assignmentId, text, region) {
      var savedEl   = region.querySelector('.save-saved');
      var pendingEl = region.querySelector('.save-pending');
      var errorEl   = region.querySelector('.save-error');
      var textarea  = region.querySelector('.essay-textarea');

      pendingEl.classList.remove('hidden');
      savedEl.classList.add('hidden');
      errorEl.classList.add('hidden');

      try {
        // PATCH (not PUT) — api.js exposes get/post/patch/delete only,
        // and the backend declares this endpoint as PATCH for the same
        // reason (matches the project-wide convention from
        // admin_writing_prompts / admin_writing_assignments).
        await window.api.patch(
          '/api/writing/my-assignments/' + encodeURIComponent(assignmentId) + '/draft',
          { draft_text: text || '' }
        );
        pendingEl.classList.add('hidden');
        savedEl.classList.remove('hidden');
        // Auto-fade the "✓ Đã lưu" hint after 2s so it doesn't linger.
        setTimeout(function () { savedEl.classList.add('hidden'); }, 2000);

        // Sprint 2.3c-3.1: this PATCH may have just stamped
        // started_at server-side. Re-poll /timer + start the
        // countdown if the row is timed and not yet ticking.
        if (textarea) {
          maybeInitTimerAfterDraftSave(assignmentId, region, textarea);
        }
      } catch (err) {
        pendingEl.classList.add('hidden');
        var msg = (err && err.message) || 'lỗi khi lưu';

        // Sprint 2.3c-3.1: backend returns 410 Gone when a draft
        // save lands AFTER the timer has expired (the Vietnamese
        // detail string is the canonical signal). When that happens
        // the local countdown is either gone or never started — we
        // force-submit with the current textarea so the row exits
        // the active state cleanly. Backend stamps auto_submitted=true.
        if (msg.indexOf('Hết giờ') !== -1) {
          stopCountdown(assignmentId);
          showTimerToast('⏰ Hết giờ — đang nộp bài tự động.');
          if (textarea) {
            await submitEssay(assignmentId, textarea.value, region, /* force */ true);
          }
          return;
        }

        errorEl.textContent = '⚠ ' + msg;
        errorEl.classList.remove('hidden');
      }
    }

    async function submitEssay(assignmentId, text, region, force) {
      var trimmed = (text || '').trim();
      var wc = countWords(trimmed);

      // `force=true` is set by the IELTS-mode auto-submit path. We
      // skip every interactive prompt — the timer hit zero, there's
      // no time to ask "are you sure". The 50-char minimum is also
      // bypassed because a near-empty submission still has audit
      // value (auto_submitted=true gets stamped server-side).
      if (!force) {
        if (trimmed.length < 50) {
          alert('Bài viết quá ngắn (cần ít nhất 50 ký tự).');
          return;
        }
        if (wc < 100) {
          if (!confirm(
            'Bài viết chỉ có ' + wc + ' từ.\n' +
            'IELTS Task 2 yêu cầu tối thiểu 250 từ.\n' +
            'Em chắc muốn nộp bài?'
          )) return;
        }
        if (!confirm('Sau khi nộp em không thể chỉnh sửa. Em chắc muốn nộp bài?')) return;
      }

      var submitBtn = region.querySelector('.btn-submit');
      var saveBtn   = region.querySelector('.btn-save-draft');
      if (submitBtn) submitBtn.disabled = true;
      if (saveBtn)   saveBtn.disabled   = true;

      try {
        await window.api.post(
          '/api/writing/my-assignments/' + encodeURIComponent(assignmentId) + '/submit',
          { essay_text: text }
        );
        // Stop any IELTS-mode countdown — the row is now `submitted`
        // and the timer banner will be gone after the next render.
        stopCountdown(assignmentId);
        if (!force) alert('✓ Đã nộp bài. Em sẽ nhận kết quả sớm.');
        // Refresh both tabs — the card moves out of "Bài giao" into
        // "Bài đã nộp" once the essay row appears.
        await Promise.all([loadAssignments(), loadEssays()]);
      } catch (err) {
        alert('Lỗi nộp bài: ' + ((err && err.message) || 'không xác định'));
      } finally {
        if (submitBtn) submitBtn.disabled = false;
        if (saveBtn)   saveBtn.disabled   = false;
      }
    }

    async function loadAssignments() {
      try {
        var data = await window.api.get('/api/writing/my-assignments');
        if (!data) return;
        if (data.student) renderStudent(data.student);

        var all = data.assignments || [];
        var active = all.filter(function (a) {
          return ACTIVE_ASSIGNMENT_STATES.indexOf(a.status) !== -1;
        });

        var countEl = document.getElementById('assignments-count');
        countEl.textContent = active.length ? '(' + active.length + ')' : '';

        renderAssignments(active);
      } catch (err) {
        // Soft-fail — the assignments tab can be empty without
        // breaking the rest of the dashboard. Surface in the empty-
        // state pane rather than the full error screen.
        var list = document.getElementById('assignments-list');
        list.innerHTML =
          '<div class="card rounded-lg p-4 text-sm text-red-300">' +
            'Không tải được bài giao: ' + escapeHtml((err && err.message) || 'lỗi không xác định') +
          '</div>';
      }
    }

    async function loadEssays() {
      try {
        var data = await window.api.get('/api/writing/my-essays');
        if (!data) return;
        if (data.student) renderStudent(data.student);
        renderEssays(data.essays || []);
        var countEl = document.getElementById('essays-count');
        var n = (data.essays || []).length;
        countEl.textContent = n ? '(' + n + ')' : '';
      } catch (err) {
        var list = document.getElementById('essays-list');
        list.innerHTML =
          '<div class="card rounded-lg p-4 text-sm text-red-300">' +
            'Không tải được bài viết: ' + escapeHtml((err && err.message) || 'lỗi không xác định') +
          '</div>';
      }
    }

    // ── Bootstrap ───────────────────────────────────────────────────
    async function main() {
      try {
        // Default tab is "Bài giao". Both lists load in parallel so
        // the badge counts populate immediately even if the user
        // switches tabs before either request completes.
        await Promise.all([loadAssignments(), loadEssays()]);

        hide('loading');
        show('content');
      } catch (err) {
        var msg = (err && err.message) || 'Không tải được dữ liệu. Vui lòng thử lại.';
        var cta = document.getElementById('error-cta');

        // 403 from the backend means the user JWT is valid but no
        // students row links to them. Steer them toward login (re-
        // activating with the right student_code might fix it).
        if (/chưa được link/i.test(msg)) {
          cta.textContent = 'Đăng nhập lại';
          cta.setAttribute('href', window.api.url('login.html'));
        }

        document.getElementById('error-message').textContent = msg;
        hide('loading');
        show('error');
      }
    }

    document.getElementById('tab-assignments').addEventListener('click', function () {
      setTabActive('assignments');
    });
    document.getElementById('tab-essays').addEventListener('click', function () {
      setTabActive('essays');
    });

    // ── Logout ──────────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async function () {
      try {
        var sb = getSupabase();
        if (sb) await sb.auth.signOut();
      } catch (_) { /* best-effort — fall through to redirect */ }
      window.location.href = window.api.url('login.html');
    });

    main();
  </script>
</body>
</html>
