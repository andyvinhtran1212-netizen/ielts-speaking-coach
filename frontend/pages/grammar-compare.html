<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>So sánh — Grammar Wiki — IELTS Speaking Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['DM Sans', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <style>
    body {
      background: #07111f;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      font-family: 'DM Sans', ui-sans-serif, system-ui;
    }

    /* Article body — matches grammar-article.html */
    .article-body {
      color: rgba(255,255,255,0.82);
      line-height: 1.8;
      font-size: 15.5px;
    }
    .article-body h2 {
      font-family: 'Lora', serif;
      font-size: 1.3rem; font-weight: 700; color: #fff;
      margin-top: 2.5rem; margin-bottom: 0.85rem;
      padding-left: 12px;
      border-left: 3px solid #0F766E;
      scroll-margin-top: 80px;
    }
    .article-body h3 {
      font-size: 1.05rem; font-weight: 600;
      color: rgba(255,255,255,0.92);
      margin-top: 1.75rem; margin-bottom: 0.6rem;
      scroll-margin-top: 80px;
      letter-spacing: 0.01em;
    }
    .article-body p { margin-bottom: 1.1rem; }
    .article-body ul, .article-body ol {
      padding-left: 1.5rem; margin-bottom: 1.1rem;
    }
    .article-body ul li { list-style: disc; margin-bottom: 0.4rem; }
    .article-body ol li { list-style: decimal; margin-bottom: 0.4rem; }
    .article-body strong { color: #fff; font-weight: 600; }
    .article-body em { color: #14b8a6; font-style: normal; font-weight: 500; }
    .article-body code {
      background: rgba(20,184,166,0.08);
      border: 1px solid rgba(20,184,166,0.15);
      padding: 0.15em 0.45em; border-radius: 5px;
      font-size: 0.88em; font-family: ui-monospace, monospace;
      color: #14b8a6;
    }
    .article-body pre {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 18px 22px;
      overflow-x: auto; margin-bottom: 1.25rem;
    }
    .article-body pre code { background: none; border: none; padding: 0; font-size: 0.875rem; color: rgba(255,255,255,0.85); }
    .article-body table {
      width: 100%; border-collapse: collapse; margin-bottom: 1.5rem;
      font-size: 0.875rem; display: block; overflow-x: auto;
      border-radius: 10px;
    }
    .article-body table th {
      background: rgba(15,118,110,0.2);
      color: #14b8a6; font-weight: 600;
      padding: 10px 14px; text-align: left;
      border: 1px solid rgba(20,184,166,0.15);
      white-space: nowrap;
    }
    .article-body table td {
      padding: 9px 14px;
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }
    .article-body table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }
    .article-body table tr:hover td { background: rgba(20,184,166,0.04); }
    .article-body blockquote {
      position: relative;
      padding: 18px 20px 14px 24px;
      margin: 1.5rem 0;
      background: rgba(20,184,166,0.05);
      border: 1px solid rgba(20,184,166,0.15);
      border-radius: 12px;
      color: rgba(255,255,255,0.78);
      font-style: italic;
    }
    .article-body blockquote::before {
      content: '\201C';
      font-family: 'Lora', serif;
      font-size: 3.5rem; line-height: 1;
      color: rgba(20,184,166,0.25);
      position: absolute; top: -4px; left: 12px;
      pointer-events: none;
    }
    .article-body a { color: #14b8a6; text-decoration: underline; text-decoration-color: rgba(20,184,166,0.35); text-underline-offset: 3px; transition: text-decoration-color 0.15s; }
    .article-body a:hover { text-decoration-color: #14b8a6; }

    /* Column panel */
    .compare-col {
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 24px;
      background: rgba(255,255,255,0.02);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 9999px; }
  </style>
</head>
<body class="text-white min-h-screen font-sans antialiased">

  <!-- Top nav -->
  <nav class="sticky top-0 z-30 border-b border-white/5" style="background: rgba(10,22,40,0.92); backdrop-filter: blur(12px);">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <div id="breadcrumb" class="flex items-center text-sm text-white/40 flex-wrap gap-0">
        <a href="../grammar.html" class="hover:text-teal-light transition-colors">Grammar Wiki</a>
        <span class="mx-2 text-white/20">›</span>
        <span class="text-white/80">So sánh</span>
      </div>
      <a href="../pages/dashboard.html" class="text-xs text-white/30 hover:text-white/60 transition-colors">Dashboard</a>
    </div>
  </nav>

  <!-- Skeleton -->
  <div id="compare-skeleton" class="max-w-7xl mx-auto px-4 py-8">
    <div class="skeleton h-8 w-96 rounded-lg mb-8"></div>
    <div class="grid lg:grid-cols-2 gap-6">
      <div class="space-y-3">
        <div class="skeleton h-6 w-48 rounded mb-4"></div>
        <div class="skeleton h-4 w-full rounded"></div>
        <div class="skeleton h-4 w-5/6 rounded"></div>
        <div class="skeleton h-4 w-4/5 rounded"></div>
      </div>
      <div class="space-y-3">
        <div class="skeleton h-6 w-48 rounded mb-4"></div>
        <div class="skeleton h-4 w-full rounded"></div>
        <div class="skeleton h-4 w-5/6 rounded"></div>
        <div class="skeleton h-4 w-4/5 rounded"></div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div id="compare-container" class="hidden max-w-7xl mx-auto px-4 py-8 ds-fadein">

    <!-- Header -->
    <h1 id="compare-title" class="text-2xl font-extrabold mb-8"></h1>

    <!-- Two-column layout -->
    <div class="grid lg:grid-cols-2 gap-6">
      <div id="compare-left" class="compare-col"></div>
      <div id="compare-right" class="compare-col"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/grammar.js"></script>
  <script>
    grammarWiki.loadGrammarCompare();
  </script>
</body>
</html>
