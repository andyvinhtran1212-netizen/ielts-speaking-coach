<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Vocab Bank — Aver Learning</title>

  <!-- Sprint 7.3 — embedded-mode IIFE retired. my-vocabulary.html is now a
       standalone shell only; the embedded path goes through
       /js/vocab-modules/my-vocab.js mounted into vocabulary.html. The
       Sprint 6.0.1 IIFE that detected ?embedded=1 is no longer needed —
       this page is never loaded as an iframe under the canonical chrome
       unification post-Sprint 7.3. The embedded-mode.css link is kept
       for the duration of Sprint 7.3 → 7.5 because flashcards.html +
       exercises.html still depend on it; Sprint 7.6 retires the file. -->
  <link rel="stylesheet" href="/css/embedded-mode.css" />

  <!-- Sprint 6.11a: canonical anti-flash theme bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Aver Design System foundation. tokens.css MUST load before
       components.css and my-vocabulary.css. -->
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/ds.css" />
  <link rel="stylesheet" href="/css/my-vocabulary.css" />

  <!-- Lucide icons (line glyphs replacing the legacy hand-rolled SVGs). -->
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>

          </svg>

            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

  <!-- Sprint 7.3 — module mount container. The page body (context bar,
       stats, add form, filters, list, modals) lives inside the
       /js/vocab-modules/my-vocab.js template and is injected here. -->
  <main id="mount" class="vocab-module-mount"></main>

  <!-- Order matters: supabase CDN → api.js → bootstrap → vocab module. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/api.js"></script>
  <script>
    initSupabase(
      'https://nqhrtqspznepmveyurzm.supabase.co',
      'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4'
    );
  </script>

  <!-- Lucide hydration + canonical theme/user-pill wiring (Sprint 6.17.1). -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      hydrateIcons();
      var obs = new MutationObserver(function () { hydrateIcons(); });
      obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
  <script type="module">
    import { bindToggleButton } from '/js/theme-toggle.js';
    bindToggleButton(document.getElementById('theme-toggle'));
  </script>
  <script type="module" src="/js/user-pill.js"></script>

  <!-- Sprint 7.3 — mount the my-vocab module into <main id="mount">.
       embedded:false because this is the standalone shell. -->
  <script type="module">
    import { mount } from '/js/vocab-modules/my-vocab.js';
    mount(document.getElementById('mount'), { embedded: false });
  </script>
</body>
