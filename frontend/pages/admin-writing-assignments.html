<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Bài giao — Writing Coach Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background: #0a1628; font-family: 'Inter', ui-sans-serif, system-ui; color: #e2e8f0; min-height: 100vh; }
    .card  { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
    .input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); color: #e2e8f0; border-radius: 8px; padding: 6px 10px; width: 100%; font-size: 14px; }
    .input:focus { outline: none; border-color: #14b8a6; }
    textarea.input { font-family: 'Inter', ui-sans-serif, system-ui; resize: vertical; min-height: 70px; }
    .btn-primary   { background: #14b8a6; color: #0a1628; font-weight: 600; padding: 8px 14px; border-radius: 8px; cursor: pointer; border: none; font-size: 14px; }
    .btn-primary:hover { background: #0d9488; }
    .btn-primary:disabled { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.4); cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #e2e8f0; padding: 7px 12px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.10); font-weight: 500; font-size: 13px; }
    .btn-secondary:hover { background: rgba(255,255,255,0.10); }
    .btn-danger    { background: rgba(239,68,68,0.15); color: #fca5a5; padding: 6px 10px; border-radius: 6px; cursor: pointer; border: 1px solid rgba(239,68,68,0.30); font-weight: 500; font-size: 12px; }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .pill-pending     { background: rgba(156,163,175,0.15); color: #cbd5e1; }
    .pill-in_progress { background: rgba(59,130,246,0.15);  color: #93c5fd; }
    .pill-submitted   { background: rgba(245,158,11,0.15);  color: #fcd34d; }
    .pill-graded      { background: rgba(168,85,247,0.15);  color: #d8b4fe; }
    .pill-delivered   { background: rgba(16,185,129,0.15);  color: #86efac; }
    .pill-task        { background: rgba(20,184,166,0.15);  color: #5eead4; }
    .student-row     { padding: 4px 8px; border-radius: 6px; }
    .student-row:hover { background: rgba(255,255,255,0.04); }
    .modal-bg { background: rgba(10,22,40,0.85); backdrop-filter: blur(4px); }
  </style>
</head>
<body>
  <div class="max-w-5xl mx-auto px-4 py-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <span class="text-xl font-bold">Aver<span style="color:#14b8a6">Learning</span></span>
        <span class="text-sm text-gray-400 hidden md:inline">— Bài giao</span>
      </div>
      <a href="/admin.html" class="text-sm text-gray-400 hover:text-white">← Admin home</a>
    </header>

    <h1 class="text-2xl font-semibold mb-1 flex items-center gap-2">
      <span aria-hidden="true">📋</span> Bài giao
    </h1>
    <p class="text-sm text-gray-400 mb-6">Giao đề bài từ thư viện cho học viên.</p>

    <!-- Filter bar -->
    <div class="flex flex-wrap gap-3 mb-4 items-center">
      <select id="filter-status" class="input" style="width: auto; min-width: 200px;">
        <option value="">Tất cả trạng thái</option>
        <option value="pending">⏳ Chờ làm</option>
        <option value="in_progress">📝 Đang làm</option>
        <option value="submitted">📥 Đã nộp</option>
        <option value="graded">✓ Đã chấm</option>
        <option value="delivered">📨 Đã trả</option>
      </select>
      <button id="btn-create" type="button" class="btn-primary ml-auto">+ Giao bài mới</button>
    </div>

    <!-- States -->
    <div id="state-loading" class="text-center py-10 text-gray-400">Đang tải…</div>
    <div id="state-error"   class="hidden card p-4 text-red-300 text-sm"></div>
    <div id="state-empty"   class="hidden text-center py-10 text-gray-400">Chưa có bài giao nào.</div>

    <div id="assignments-list" class="space-y-3 hidden"></div>
  </div>

  <!-- Create assignment modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center px-4">
    <div class="card max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Giao bài mới</h2>
        <button id="btn-close-modal" type="button" class="text-gray-400 hover:text-white text-2xl leading-none" aria-label="Close">&times;</button>
      </div>

      <div class="space-y-4">
        <!-- Step 1 — pick prompt -->
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">
            Bước 1 — Chọn đề từ thư viện
          </label>
          <select id="form-prompt" class="input">
            <option value="">— Chọn đề bài —</option>
          </select>
          <div id="prompt-preview" class="hidden mt-2 p-3 rounded text-sm text-gray-300" style="background:rgba(255,255,255,0.03)"></div>
        </div>

        <!-- Step 2 — pick students -->
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">
            Bước 2 — Chọn học viên
            <span id="selected-count" class="ml-2 text-teal-300" style="color:#5eead4">(0 chọn)</span>
          </label>
          <div class="flex items-center gap-2 mb-2">
            <input id="student-search" type="text" placeholder="Tìm theo tên hoặc mã học viên…" class="input" style="flex:1" />
            <button id="btn-select-all" type="button" class="btn-secondary">Chọn tất cả</button>
            <button id="btn-clear-all"  type="button" class="btn-secondary">Bỏ chọn</button>
          </div>
          <div id="students-list" class="max-h-56 overflow-y-auto rounded p-2" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)">
            <p id="students-empty" class="hidden text-xs text-gray-500 p-2">Không có học viên trùng bộ lọc.</p>
          </div>
        </div>

        <!-- Step 3 — optional fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Hạn nộp (tùy chọn)</label>
            <input id="form-deadline" type="datetime-local" class="input" />
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Ghi chú cho học viên (tùy chọn)</label>
            <textarea id="form-instructions" class="input" placeholder="VD: Tập trung vào câu phức + linking words."></textarea>
          </div>
        </div>
      </div>

      <div id="modal-error" class="hidden mt-3 text-sm text-red-300"></div>

      <div class="flex justify-end gap-2 mt-6">
        <button id="btn-cancel" type="button" class="btn-secondary">Hủy</button>
        <button id="btn-save"   type="button" class="btn-primary">Giao bài</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Absolute path: under the Vercel rewrite `/admin/writing/assignments`
       (3 path segments), `../js/api.js` would resolve to `/admin/js/api.js`
       and 404 — same class of bug fixed in Sprint 2.3a-1.1 for the
       prompts page. `/js/api.js` is rewrite-agnostic. -->
  <script src="/js/api.js"></script>
  <script>
    'use strict';

    var SUPABASE_URL  = 'https://nqhrtqspznepmveyurzm.supabase.co';
    var SUPABASE_ANON = 'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4';
    initSupabase(SUPABASE_URL, SUPABASE_ANON);

    var STATUS_LABELS = {
      pending:     '⏳ Chờ làm',
      in_progress: '📝 Đang làm',
      submitted:   '📥 Đã nộp',
      graded:      '✓ Đã chấm',
      delivered:   '📨 Đã trả',
    };
    var TASK_LABELS = {
      task2:          'Task 2',
      task1_academic: 'Task 1 Academic',
      task1_general:  'Task 1 General',
    };

    var _allPrompts          = [];
    var _allStudents         = [];
    var _selectedStudentIds  = new Set();

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
      });
    }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function formatDate(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleDateString('vi-VN', {
          day: '2-digit', month: '2-digit', year: 'numeric',
        });
      } catch (_) { return '—'; }
    }

    // ── List view ─────────────────────────────────────────────────
    async function loadAssignments() {
      hide('state-error');
      hide('state-empty');
      hide('assignments-list');
      show('state-loading');

      var statusFilter = document.getElementById('filter-status').value;
      var params = new URLSearchParams();
      if (statusFilter) params.set('status_filter', statusFilter);

      try {
        var data = await window.api.get('/admin/writing/assignments?' + params.toString());
        renderAssignments((data && data.assignments) || []);
      } catch (err) {
        hide('state-loading');
        var box = document.getElementById('state-error');
        box.textContent = 'Lỗi tải bài giao: ' + (err.message || 'không xác định');
        show('state-error');
      }
    }

    function renderAssignments(rows) {
      hide('state-loading');
      var list = document.getElementById('assignments-list');

      if (rows.length === 0) {
        list.innerHTML = '';
        show('state-empty');
        return;
      }

      list.innerHTML = rows.map(function (a) {
        var prompt   = a.writing_prompts || {};
        var student  = a.students        || {};
        var statusKey = a.status || 'pending';

        var studentLabel = student.full_name || student.student_code || '—';
        var taskLabel    = TASK_LABELS[prompt.task_type] || prompt.task_type || '—';

        return ''
          + '<div class="card p-4">'
          +   '<div class="flex items-start justify-between gap-3 mb-2">'
          +     '<div class="min-w-0">'
          +       '<h3 class="font-semibold text-gray-100 text-base truncate">' + escapeHtml(prompt.title || '(Đề bài đã xóa)') + '</h3>'
          +       '<p class="text-xs text-gray-400 mt-1">→ ' + escapeHtml(studentLabel) + '</p>'
          +     '</div>'
          +     '<div class="flex flex-col items-end gap-1 flex-shrink-0">'
          +       '<span class="pill pill-' + statusKey + '">' + escapeHtml(STATUS_LABELS[statusKey] || statusKey) + '</span>'
          +       '<span class="pill pill-task">' + escapeHtml(taskLabel) + '</span>'
          +     '</div>'
          +   '</div>'
          +   '<div class="flex items-center justify-between flex-wrap gap-2 text-xs text-gray-500">'
          +     '<span>Giao: ' + formatDate(a.created_at) + '</span>'
          +     (a.deadline     ? '<span>Hạn: '       + formatDate(a.deadline)     + '</span>' : '')
          +     (a.submitted_at ? '<span>Nộp: '       + formatDate(a.submitted_at) + '</span>' : '')
          +     (a.delivered_at ? '<span style="color:#86efac">Trả: ' + formatDate(a.delivered_at) + '</span>' : '')
          +   '</div>'
          + '</div>';
      }).join('');

      show('assignments-list');
    }

    // ── Modal: data load ──────────────────────────────────────────
    async function loadModalData() {
      try {
        // Note: GET /admin/students returns an array directly (not
        // {students:[...]}) — see services/student_service.list_students.
        // Pass limit=200 so the picker doesn't silently drop students
        // beyond the default 50.
        var results = await Promise.all([
          window.api.get('/admin/writing/prompts'),
          window.api.get('/admin/students?limit=200'),
        ]);
        var promptsResp  = results[0];
        var studentsResp = results[1];

        _allPrompts  = (promptsResp && promptsResp.prompts) || [];
        _allStudents = Array.isArray(studentsResp) ? studentsResp : [];

        renderPromptOptions();
        renderStudentList('');
      } catch (err) {
        showModalError('Lỗi tải dữ liệu: ' + (err.message || 'không xác định'));
      }
    }

    function renderPromptOptions() {
      var sel = document.getElementById('form-prompt');
      var html = '<option value="">— Chọn đề bài —</option>'
        + _allPrompts.map(function (p) {
            var label = '[' + (TASK_LABELS[p.task_type] || p.task_type) + '] ' + (p.title || '');
            return '<option value="' + escapeHtml(p.id) + '">' + escapeHtml(label) + '</option>';
          }).join('');
      sel.innerHTML = html;
    }

    function renderStudentList(filter) {
      var box = document.getElementById('students-list');
      var empty = document.getElementById('students-empty');
      var f = (filter || '').toLowerCase();

      var filtered = _allStudents.filter(function (s) {
        if (!f) return true;
        var name = (s.full_name    || '').toLowerCase();
        var code = (s.student_code || '').toLowerCase();
        return name.indexOf(f) !== -1 || code.indexOf(f) !== -1;
      });

      if (filtered.length === 0) {
        box.innerHTML = '';
        box.appendChild(empty);
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      box.innerHTML = filtered.map(function (s) {
        var checked = _selectedStudentIds.has(s.id) ? 'checked' : '';
        var label = s.full_name || s.student_code || '(Chưa đặt tên)';
        return ''
          + '<label class="student-row flex items-center gap-2 cursor-pointer">'
          +   '<input type="checkbox" data-student-id="' + escapeHtml(s.id) + '" ' + checked + ' style="accent-color:#14b8a6">'
          +   '<span class="text-sm text-gray-200">' + escapeHtml(label) + '</span>'
          +   '<span class="text-xs text-gray-500 ml-auto">' + escapeHtml(s.student_code || '') + '</span>'
          + '</label>';
      }).join('');

      // Wire checkbox state into the selection set.
      box.querySelectorAll('input[type="checkbox"][data-student-id]').forEach(function (cb) {
        cb.addEventListener('change', function () {
          var id = cb.getAttribute('data-student-id');
          if (cb.checked) _selectedStudentIds.add(id);
          else            _selectedStudentIds.delete(id);
          updateSelectedCount();
        });
      });
    }

    function updateSelectedCount() {
      document.getElementById('selected-count').textContent =
        '(' + _selectedStudentIds.size + ' chọn)';
    }

    // ── Modal: open / close / save ────────────────────────────────
    function openCreateModal() {
      _selectedStudentIds.clear();
      document.getElementById('form-prompt').value       = '';
      document.getElementById('form-instructions').value = '';
      document.getElementById('form-deadline').value     = '';
      document.getElementById('student-search').value    = '';
      hide('prompt-preview');
      hide('modal-error');
      updateSelectedCount();
      show('modal');
      loadModalData();
    }

    function closeModal() { hide('modal'); }

    function showModalError(msg) {
      var box = document.getElementById('modal-error');
      box.textContent = msg;
      show('modal-error');
    }

    async function saveAssignment() {
      hide('modal-error');

      var promptId    = document.getElementById('form-prompt').value;
      var deadlineRaw = document.getElementById('form-deadline').value;
      var instructions = document.getElementById('form-instructions').value.trim();

      if (!promptId) {
        showModalError('Vui lòng chọn đề bài.');
        return;
      }
      if (_selectedStudentIds.size === 0) {
        showModalError('Vui lòng chọn ít nhất 1 học viên.');
        return;
      }

      var payload = {
        prompt_id:   promptId,
        student_ids: Array.from(_selectedStudentIds),
        deadline:    deadlineRaw ? new Date(deadlineRaw).toISOString() : null,
        instructions: instructions || null,
      };

      try {
        var result = await window.api.post('/admin/writing/assignments', payload);
        var msg = '✓ Đã giao bài cho ' + (result.count || 0) + ' học viên.';
        if (result.duplicates_warning && result.duplicates_warning.length > 0) {
          msg += '\n\n⚠ ' + result.duplicates_warning.length
            + ' học viên đã từng được giao đề này (vẫn tạo assignment mới).';
        }
        alert(msg);
        closeModal();
        await loadAssignments();
      } catch (err) {
        showModalError('Lỗi giao bài: ' + (err.message || 'không xác định'));
      }
    }

    // ── Wire up ───────────────────────────────────────────────────
    document.getElementById('btn-create').addEventListener('click', openCreateModal);
    document.getElementById('btn-save').addEventListener('click', saveAssignment);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('filter-status').addEventListener('change', loadAssignments);

    document.getElementById('student-search').addEventListener('input', function (e) {
      renderStudentList(e.target.value);
    });
    document.getElementById('btn-select-all').addEventListener('click', function () {
      // Select all VISIBLE rows (so the search filter is respected).
      document.querySelectorAll('#students-list input[type="checkbox"][data-student-id]').forEach(function (cb) {
        cb.checked = true;
        _selectedStudentIds.add(cb.getAttribute('data-student-id'));
      });
      updateSelectedCount();
    });
    document.getElementById('btn-clear-all').addEventListener('click', function () {
      _selectedStudentIds.clear();
      renderStudentList(document.getElementById('student-search').value);
      updateSelectedCount();
    });
    document.getElementById('form-prompt').addEventListener('change', function (e) {
      var p = _allPrompts.find(function (x) { return x.id === e.target.value; });
      var box = document.getElementById('prompt-preview');
      if (p) {
        box.textContent = p.prompt_text || '';
        show('prompt-preview');
      } else {
        hide('prompt-preview');
      }
    });

    loadAssignments();
  </script>
</body>
</html>
