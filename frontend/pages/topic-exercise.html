<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Luyện tập từ vựng theo chủ đề — IELTS Speaking Coach</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/aver-design/tokens.css" />
  <link rel="stylesheet" href="../css/ds.css" />
  <link rel="stylesheet" href="/css/tailwind.build.css" />
  <style>
    body { background: var(--av-surface-page); }

    .page-header { background: var(--av-surface-card); border-bottom: 1px solid var(--av-border-subtle); }

    .start-screen, .exercise-active, .summary {
      background: var(--av-surface-card);
      border: 1px solid var(--av-border-subtle);
      border-radius: var(--av-radius-xl); padding: 26px;
    }

    /* Progress header */
    .progress-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .progress-text { font-size: 13px; color: var(--av-text-secondary); white-space: nowrap; }
    .progress-bar { flex: 1; height: 6px; background: var(--av-border-subtle); border-radius: var(--av-radius-pill); overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--av-primary), #0ea5e9); transition: width 0.3s ease; }
    .qtype-tag {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: var(--av-radius-pill);
      background: var(--av-primary-soft); color: #5eead4; border: 1px solid var(--av-primary-border);
      white-space: nowrap;
    }

    /* Question prompt — the signature surface: definition / cloze / audio. */
    .q-prompt { font-size: 17px; color: var(--av-text-primary); line-height: 1.7; margin-bottom: 6px; }
    .q-lead { font-size: 13px; color: var(--av-text-muted); margin-bottom: 14px; }
    .q-def { font-size: 18px; font-weight: 500; color: var(--av-text-primary); line-height: 1.6; }
    .q-def .q-def-en { display: block; font-size: 14px; font-weight: 400; color: var(--av-text-secondary); font-style: italic; margin-top: 6px; }
    .blank-token {
      display: inline-block; min-width: 90px; padding: 0 10px;
      border-bottom: 2px dashed var(--av-primary-border); color: #5eead4; font-weight: 600;
    }
    .q-audio-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 15px; padding: 14px 22px; border-radius: var(--av-radius-pill); cursor: pointer;
      background: var(--av-primary-soft); border: 1px solid var(--av-primary-border); color: #5eead4;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .q-audio-btn:hover { background: rgba(20,184,166,0.22); transform: scale(1.03); }
    .q-audio-btn:focus-visible { outline: 2px solid #5eead4; outline-offset: 2px; }
    .q-audio-wrap { display: flex; justify-content: center; margin-bottom: 18px; }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      width: 100%; text-align: left; padding: 14px 16px; border-radius: var(--av-radius-lg);
      border: 1px solid var(--av-border-default); background: var(--av-surface-card);
      color: var(--av-text-primary); font-size: 15px; cursor: pointer; transition: all 0.15s;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--av-primary-border); background: var(--av-primary-soft); }
    .option-btn.correct { border-color: rgba(20,184,166,0.6); background: rgba(20,184,166,0.18); color: #5eead4; }
    .option-btn.wrong   { border-color: rgba(239,68,68,0.6);  background: rgba(239,68,68,0.15);  color: var(--av-error); }
    .option-btn.dimmed  { opacity: 0.45; }
    .option-btn:disabled { cursor: default; }
    .option-btn:focus-visible { outline: 2px solid #5eead4; outline-offset: 2px; }

    /* Feedback (reveals the card's meaning + hook/error after answering) */
    .feedback { margin-top: 18px; border-radius: var(--av-radius-lg); padding: 12px 14px; font-size: 14px; }
    .feedback.correct { background: var(--av-primary-soft); border: 1px solid var(--av-primary-border); }
    .feedback.wrong   { background: var(--av-error-soft);   border: 1px solid rgba(239,68,68,0.3); }
    .feedback-head { font-weight: 600; margin-bottom: 6px; }
    .feedback.correct .feedback-head { color: #5eead4; }
    .feedback.wrong   .feedback-head { color: var(--av-error); }
    .feedback-word { color: var(--av-text-primary); font-weight: 600; }
    .feedback-ipa { font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: #93c5fd; margin-left: 6px; }
    .feedback-def { color: var(--av-text-primary); line-height: 1.55; margin: 4px 0; }
    .feedback-hook { color: rgba(221,214,254,0.92); font-size: 13px; margin-top: 6px; }
    .feedback-actions { margin-top: 14px; display: flex; justify-content: flex-end; }

    .hidden { display: none !important; }

    .btn-primary, .btn-secondary, .btn-ghost {
      font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 10px;
      cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
      display: inline-block; text-decoration: none;
    }
    .btn-primary { background: var(--av-primary-soft); border-color: var(--av-primary-border); color: var(--av-primary); }
    .btn-primary:hover { background: rgba(20,184,166,0.28); }
    .btn-primary.btn-large { padding: 14px 28px; font-size: 16px; font-weight: 600; }
    .btn-secondary { background: var(--av-surface-card); border-color: var(--av-border-default); color: var(--av-text-primary); }
    .btn-secondary:hover { background: var(--av-border-subtle); }

    .start-screen { text-align: center; padding: 48px 24px; }
    .start-screen h2 { font-size: 22px; font-weight: 600; color: var(--av-text-primary); margin-bottom: 10px; }
    .start-screen p  { font-size: 14px; color: var(--av-text-muted); margin-bottom: 28px; }

    .summary { text-align: center; }
    .summary h2 { font-size: 22px; font-weight: 600; color: var(--av-text-primary); margin-bottom: 8px; }
    .summary > p { font-size: 14px; color: var(--av-text-muted); margin-bottom: 18px; }
    .score-number  { font-size: 48px; font-weight: 700; color: var(--av-primary); line-height: 1; }
    .score-percent { font-size: 14px; color: var(--av-text-muted); margin-top: 4px; margin-bottom: 22px; }
    .summary-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .state-msg { color: var(--av-text-faint); text-align: center; padding: 56px 16px; font-size: 14px; }
    .state-msg.error { color: var(--av-error); }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto;
      border: 3px solid var(--av-primary-soft); border-top-color: var(--av-primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .option-btn, .q-audio-btn, .btn-primary, .btn-secondary, .progress-fill { transition: none; }
      .q-audio-btn:hover { transform: none; }
      .spinner { animation-duration: 1.6s; }
    }
  </style>
</head>
<body class="text-slate-100 font-sans min-h-screen">

  <header class="page-header px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="vocabulary.html#vocab-topics" class="text-sm font-medium flex items-center gap-1 hover:opacity-80" style="color:var(--av-primary); text-decoration:none;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          Chủ đề
        </a>
        <span class="text-slate-600">|</span>
        <h1 id="ex-title" class="text-base font-semibold text-slate-200">Luyện tập từ vựng</h1>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <div id="ex-container">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>
  </main>

  <script src="../js/api.js"></script>

    );
  </script>
  <script src="../js/topic-exercise.js"></script>
</body>
</html>
