<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Luyện tập từ vựng theo chủ đề — IELTS Speaking Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <link rel="stylesheet" href="/css/tailwind.inter.css" />
  <style>
    body { background: #0a1628; }

    .start-screen, .exercise-active, .summary {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 26px;
    }

    /* Progress header */
    .progress-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .progress-text { font-size: 13px; color: rgba(255,255,255,0.6); white-space: nowrap; }
    .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #14b8a6, #0ea5e9); transition: width 0.3s ease; }
    .qtype-tag {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px;
      background: rgba(20,184,166,0.14); color: #5eead4; border: 1px solid rgba(20,184,166,0.34);
      white-space: nowrap;
    }

    /* Question prompt — the signature surface: definition / cloze / audio. */
    .q-prompt { font-size: 17px; color: #fff; line-height: 1.7; margin-bottom: 6px; }
    .q-lead { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 14px; }
    .q-def { font-size: 18px; font-weight: 500; color: #fff; line-height: 1.6; }
    .q-def .q-def-en { display: block; font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.6); font-style: italic; margin-top: 6px; }
    .blank-token {
      display: inline-block; min-width: 90px; padding: 0 10px;
      border-bottom: 2px dashed rgba(20,184,166,0.5); color: #5eead4; font-weight: 600;
    }
    .q-audio-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 15px; padding: 14px 22px; border-radius: 999px; cursor: pointer;
      background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.35); color: #5eead4;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .q-audio-btn:hover { background: rgba(20,184,166,0.22); transform: scale(1.03); }
    .q-audio-btn:focus-visible { outline: 2px solid #5eead4; outline-offset: 2px; }
    .q-audio-wrap { display: flex; justify-content: center; margin-bottom: 18px; }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      width: 100%; text-align: left; padding: 14px 16px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.9); font-size: 15px; cursor: pointer; transition: all 0.15s;
    }
    .option-btn:hover:not(:disabled) { border-color: rgba(20,184,166,0.4); background: rgba(20,184,166,0.08); }
    .option-btn.correct { border-color: rgba(20,184,166,0.6); background: rgba(20,184,166,0.18); color: #5eead4; }
    .option-btn.wrong   { border-color: rgba(239,68,68,0.6);  background: rgba(239,68,68,0.15);  color: #fca5a5; }
    .option-btn.dimmed  { opacity: 0.45; }
    .option-btn:disabled { cursor: default; }
    .option-btn:focus-visible { outline: 2px solid #5eead4; outline-offset: 2px; }

    /* Feedback (reveals the card's meaning + hook/error after answering) */
    .feedback { margin-top: 18px; border-radius: 10px; padding: 12px 14px; font-size: 14px; }
    .feedback.correct { background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.3); }
    .feedback.wrong   { background: rgba(239,68,68,0.10);  border: 1px solid rgba(239,68,68,0.3); }
    .feedback-head { font-weight: 600; margin-bottom: 6px; }
    .feedback.correct .feedback-head { color: #5eead4; }
    .feedback.wrong   .feedback-head { color: #fca5a5; }
    .feedback-word { color: #fff; font-weight: 600; }
    .feedback-ipa { font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: #93c5fd; margin-left: 6px; }
    .feedback-def { color: rgba(255,255,255,0.82); line-height: 1.55; margin: 4px 0; }
    .feedback-hook { color: rgba(221,214,254,0.92); font-size: 13px; margin-top: 6px; }
    .feedback-actions { margin-top: 14px; display: flex; justify-content: flex-end; }

    .hidden { display: none !important; }

    .btn-primary, .btn-secondary, .btn-ghost {
      font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 10px;
      cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
      display: inline-block; text-decoration: none;
    }
    .btn-primary { background: rgba(20,184,166,0.18); border-color: rgba(20,184,166,0.4); color: #14b8a6; }
    .btn-primary:hover { background: rgba(20,184,166,0.28); }
    .btn-primary.btn-large { padding: 14px 28px; font-size: 16px; font-weight: 600; }
    .btn-secondary { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    .start-screen { text-align: center; padding: 48px 24px; }
    .start-screen h2 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 10px; }
    .start-screen p  { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 28px; }

    .summary { text-align: center; }
    .summary h2 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .summary > p { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 18px; }
    .score-number  { font-size: 48px; font-weight: 700; color: #14b8a6; line-height: 1; }
    .score-percent { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; margin-bottom: 22px; }
    .summary-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .state-msg { color: rgba(255,255,255,0.4); text-align: center; padding: 56px 16px; font-size: 14px; }
    .state-msg.error { color: #fca5a5; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto;
      border: 3px solid rgba(20,184,166,0.2); border-top-color: #14b8a6;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .option-btn, .q-audio-btn, .btn-primary, .btn-secondary, .progress-fill { transition: none; }
      .q-audio-btn:hover { transform: none; }
      .spinner { animation-duration: 1.6s; }
    }
  </style>
</head>
<body class="text-slate-100 font-sans min-h-screen">

  <header style="background:#0C2340; border-bottom:1px solid rgba(255,255,255,0.06);" class="px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="vocabulary.html#vocab-topics" class="text-sm font-medium flex items-center gap-1 hover:opacity-80" style="color:#14b8a6; text-decoration:none;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          Chủ đề
        </a>
        <span class="text-slate-600">|</span>
        <h1 id="ex-title" class="text-base font-semibold text-slate-200">Luyện tập từ vựng</h1>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <div id="ex-container">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- order matters: supabase CDN → api.js → initSupabase → topic-exercise.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="../js/api.js"></script>
  <script>
    initSupabase(
      'https://nqhrtqspznepmveyurzm.supabase.co',
      'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4'
    );
  </script>
  <script src="../js/topic-exercise.js"></script>
</body>
</html>
