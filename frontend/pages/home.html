<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Trang chủ — Aver Learning</title>

  <!-- ── Anti-flash theme bootstrap (must run BEFORE any stylesheet) ── -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- ── Fonts: Plus Jakarta Sans (body) + JetBrains Mono (numerics) ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- ── Aver Design System (tokens MUST load before components) ───── -->
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />

  <!-- ── Page-specific styles ───────────────────────────────────────── -->
  <link rel="stylesheet" href="/css/home.css" />

  <!-- ── Lucide icons (line icons, no emoji) ────────────────────────── -->
  <script src="https://unpkg.com/lucide@1.17.0" defer></script>

  <!-- ── Canonical chrome Web Component (Sprint 7.12) ───────────────── -->
  <script type="module" src="/js/components/aver-chrome.js"></script>
</head>
<body class="av-page">

  <!-- ── Canonical chrome (Sprint 7.12: <aver-chrome> Web Component) ──
       Migrated from inline .topnav-wrap markup to single-source-of-truth
       custom element. The component renders the same canonical chrome
       into its Shadow DOM. See frontend/js/components/aver-chrome.js. -->
  <aver-chrome active="home"></aver-chrome>

  <div class="shell">

    <!-- ── Optional error banner ───────────────────────────────────── -->
    <div id="error-banner" class="error-banner hidden" role="alert" hidden></div>

    <!-- ── Greeting + hero stats ───────────────────────────────────── -->
    <header class="greeting">
      <div>
        <p class="eyebrow">Trang chủ</p>
        <h1>Xin chào, <span class="name" id="greeting-name">…</span></h1>
        <p class="lede">Tiếp tục hành trình IELTS của bạn — luyện đều mỗi ngày để giữ đà tiến bộ.</p>
      </div>

      <div class="hero-stats" aria-label="Tổng quan">
        <!--
          Each stat keeps its existing id ('hero-streak', 'hero-sessions',
          'hero-essays') and inner .value-num + .unit elements because
          home.js reaches in by id (renderHero in js/home.js). Don't
          rename these without also updating the JS.
        -->
        <div class="hero-stat streak" id="hero-streak">
          <span class="label">Streak</span>
          <span class="value">
            <span class="value-num">0</span>
            <span class="unit">ngày</span>
            <span class="flame" aria-hidden="true">
              <i data-lucide="flame"></i>
            </span>
          </span>
        </div>
        <div class="hero-stat" id="hero-sessions">
          <span class="label">Speaking</span>
          <span class="value">
            <span class="value-num">0</span>
            <span class="unit">buổi</span>
          </span>
        </div>
        <div class="hero-stat" id="hero-essays">
          <span class="label">Writing</span>
          <span class="value">
            <span class="value-num">0</span>
            <span class="unit">bài</span>
          </span>
        </div>
      </div>
    </header>

    <!-- ── Active skills ───────────────────────────────────────────── -->
    <!--
      home.js renders each .skill-card.skeleton by replacing innerHTML
      with: .head > .icon + .arrow|.lock-tag, h3, .metric-row > .metric,
      .sub-metric, .footer > .last-activity + .cta. The CSS in home.css
      styles each of those inner classes — keep them in sync if home.js
      ever changes the rendered structure.
    -->
    <section>
      <div class="section-head">
        <h2>Kỹ năng IELTS</h2>
        <span class="rule" aria-hidden="true"></span>
        <span class="meta">4 kỹ năng đang mở</span>
      </div>

      <div class="skill-grid">
        <article class="skill-card skeleton" data-skill="writing"></article>
        <article class="skill-card skeleton" data-skill="speaking"></article>
        <article class="skill-card skeleton" data-skill="grammar"></article>
        <article class="skill-card skeleton" data-skill="vocabulary"></article>
      </div>
    </section>

    <!-- ── Coming soon ─────────────────────────────────────────────── -->
    <section>
      <div class="section-head">
        <h2>Sắp ra mắt</h2>
        <span class="rule" aria-hidden="true"></span>
        <span class="meta">Đang phát triển</span>
      </div>

      <div class="skill-grid">
        <article class="skill-card skeleton" data-skill="reading"></article>
        <article class="skill-card skeleton" data-skill="listening"></article>
      </div>
    </section>

    <footer class="page-footer">
      <span>Cần trợ giúp? <a class="aver-link" href="mailto:hello@averlearning.com">Liên hệ giảng viên →</a></span>
      <span class="version">Aver Learning · Light theme default</span>
    </footer>

  </div>

  <!-- ── Scripts: order matters — supabase → api.js → home.js ─────── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="../js/api.js"></script>
  <script src="../js/analytics-beacon.js" defer></script>
  <script>
    var SUPABASE_URL  = 'https://nqhrtqspznepmveyurzm.supabase.co';
    var SUPABASE_ANON = 'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4';
    initSupabase(SUPABASE_URL, SUPABASE_ANON);
  </script>
  <script src="../js/home.js"></script>

  <!-- Sprint 7.12: theme toggle + user pill wiring moved into
       <aver-chrome>. Component owns bindToggleButton + pill populate.
       /js/user-pill.js + theme-toggle.js per-page imports retired. -->

  <!-- ── Lucide icon hydration ────────────────────────────────────── -->
  <script>
    function _renderLucide() { if (window.lucide && window.lucide.createIcons) window.lucide.createIcons(); }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', _renderLucide);
    } else {
      _renderLucide();
    }
  </script>

  <!-- ── Auth gate (Sprint 7.8-hotfix: pill populate moved to
       /js/user-pill.js for single source of truth on initials logic).
       This block now only redirects unauthenticated visitors to /login. -->
  <script>
    (async () => {
      try {
        const sb = getSupabase();
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
          window.location.href = '../login.html';
        }
      } catch (e) {
        console.error('[home] auth check failed:', e);
      }
    })();
  </script>
</body>
</html>
