<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Lemma Overrides · Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/aver-design/admin-buttons.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2.107.0" defer></script>
  <script src="/js/api.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); margin: 0; }
    .lem-shell {
      max-width: 1080px; margin: 0 auto;
      padding: var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-4);
    }
    .lem-header h1 { font-size: var(--av-fs-2xl); font-weight: var(--av-fw-semibold); margin: 0 0 var(--av-space-1); }
    .lem-header .subtitle { color: var(--av-text-secondary); font-size: var(--av-fs-sm); }

    .lem-toolbar {
      display: flex; gap: var(--av-space-3); align-items: center;
      flex-wrap: wrap;
    }
    .lem-search {
      flex: 1; min-width: 240px;
      padding: 8px 12px;
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-page, var(--av-surface-card));
      color: var(--av-text-primary);
      font-size: var(--av-fs-sm);
      font-family: inherit;
    }
    /* admin buttons → admin-buttons.css bridge (design-fix-2 B3) */

    .lem-table-wrap {
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      overflow-x: auto;
    }
    table.lem-table { width: 100%; border-collapse: collapse; }
    table.lem-table th, table.lem-table td {
      padding: var(--av-space-3) var(--av-space-4);
      text-align: left;
      font-size: var(--av-fs-sm);
      border-bottom: 1px solid var(--av-border-default);
    }
    table.lem-table th {
      font-weight: var(--av-fw-semibold);
      color: var(--av-text-secondary);
      background: var(--av-surface-sunken);
      font-size: var(--av-fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--av-tracking-wide);
    }
    .lem-word { font-family: var(--av-font-mono); }
    .lem-arrow { color: var(--av-text-muted); font-family: var(--av-font-mono); }

    .lem-empty, .lem-loading { padding: var(--av-space-8); text-align: center; color: var(--av-text-muted); font-size: var(--av-fs-sm); }

    /* Modal */
    .lem-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: var(--av-space-4);
    }
    .lem-modal {
      background: var(--av-surface-card);
      border-radius: var(--av-radius-lg);
      border: 1px solid var(--av-border-default);
      max-width: 480px; width: 100%;
      padding: var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-3);
    }
    .lem-modal h2 { font-size: var(--av-fs-lg); font-weight: var(--av-fw-semibold); margin: 0; }
    .lem-field { display: flex; flex-direction: column; gap: 4px; }
    .lem-field label {
      font-size: var(--av-fs-xs); color: var(--av-text-muted);
      text-transform: uppercase; letter-spacing: var(--av-tracking-wide);
    }
    .lem-field input, .lem-field textarea, .lem-field select {
      padding: 8px 12px;
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-page, var(--av-surface-card));
      color: var(--av-text-primary);
      font-size: var(--av-fs-sm);
      font-family: inherit;
    }
    .lem-modal-actions { display: flex; gap: var(--av-space-2); justify-content: flex-end; margin-top: var(--av-space-2); }

    .lem-banner {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      font-size: var(--av-fs-sm);
    }
    .lem-banner.is-success { background: #ECFDF5; color: var(--av-brand-teal-800); border: 1px solid var(--av-brand-teal-200); }
    .lem-banner.is-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }

    [hidden] { display: none !important; }
  </style>
</head>
<body class="av-page">
  <aver-admin-chrome active="vocab" subsection="lemmas">

    <main class="lem-shell">
      <header class="lem-header">
        <h1>Lemma Overrides</h1>
        <p class="subtitle">
          Sửa lỗi spaCy lemmatization với manual mapping. Có hiệu lực
          ngay trên capture kế tiếp (không cần restart service).
        </p>
      </header>

      <div class="lem-banner" id="status-banner" hidden></div>

      <div class="lem-toolbar">
        <input class="lem-search" id="search" type="text" placeholder="Tìm theo original word (prefix match)…" />
        <button class="btn-secondary" id="btn-search" type="button">Tìm</button>
        <button class="btn-primary"   id="btn-add"    type="button">+ Thêm override</button>
      </div>

      <div class="lem-loading" id="lem-loading">Đang tải…</div>
      <div class="lem-empty"   id="lem-empty"   hidden>Chưa có override nào.</div>

      <div class="lem-table-wrap" id="lem-table-wrap" hidden>
        <table class="lem-table">
          <thead>
            <tr>
              <th>Original word</th>
              <th></th>
              <th>Lemma</th>
              <th>POS</th>
              <th>Notes</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="lem-tbody"></tbody>
        </table>
      </div>
    </main>

    <!-- ── Add override modal ────────────────────────────────────── -->
    <div class="lem-modal-backdrop" id="modal-backdrop" hidden>
      <div class="lem-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">Thêm lemma override</h2>
        <div class="lem-field">
          <label for="m-word">Original word</label>
          <input id="m-word" type="text" placeholder="VD: phở" />
        </div>
        <div class="lem-field">
          <label for="m-lemma">Lemma (canonical form)</label>
          <input id="m-lemma" type="text" placeholder="VD: phở" />
        </div>
        <div class="lem-field">
          <label for="m-pos">POS (tuỳ chọn)</label>
          <select id="m-pos">
            <option value="">— (để spaCy phân loại)</option>
            <option value="NOUN">NOUN</option>
            <option value="VERB">VERB</option>
            <option value="ADJ">ADJ</option>
            <option value="ADV">ADV</option>
            <option value="PROPN">PROPN</option>
          </select>
        </div>
        <div class="lem-field">
          <label for="m-notes">Notes (tuỳ chọn)</label>
          <textarea id="m-notes" rows="2" placeholder="Lý do override…"></textarea>
        </div>
        <div class="lem-banner is-error" id="modal-error" hidden></div>
        <div class="lem-modal-actions">
          <button class="btn-secondary" id="btn-cancel" type="button">Hủy</button>
          <button class="btn-primary"   id="btn-submit" type="button">Lưu</button>
        </div>
      </div>
    </div>

  </aver-admin-chrome>

  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
  <script src="/js/error-reporter.js"></script>
  <script type="module" src="/js/admin-vocab-lemmas.js"></script>
</body>
</html>
