<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Chủ đề nội dung — Vocab Admin</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme',
          (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light'));
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/admin-writing.css" />
  <link rel="stylesheet" href="/css/tailwind.build.css" />
  <script src="https://unpkg.com/lucide@1.17.0" defer></script>
  <style>
    .tp-grid { display: grid; grid-template-columns: 320px 1fr; gap: 1rem; }
    @media (max-width: 820px) { .tp-grid { grid-template-columns: 1fr; } }
    .tp-card { border: 1px solid var(--av-border-subtle); border-radius: .75rem; padding: 1rem; background: var(--av-surface-card); }
    .tp-row { width: 100%; text-align: left; padding: .55rem .7rem; border: 1px solid var(--av-border-default); border-radius: .5rem; margin: .3rem 0; background: transparent; cursor: pointer; font: inherit; color: inherit; }
    .tp-row[aria-selected="true"] { border-color: var(--av-primary); background: var(--av-surface-sunken); }
    .tp-input { width: 100%; padding: .5rem .65rem; border: 1px solid var(--av-border-default); border-radius: .5rem; background: transparent; color: inherit; font: inherit; margin-top: .15rem; }
    .tp-field { margin-bottom: .6rem; }
    .tp-muted { opacity: .7; font-size: .82rem; }
    .tp-err { color: var(--av-error); } .tp-ok { color: var(--av-success); }
    .tp-bankrow { display: flex; justify-content: space-between; align-items: center; gap: .5rem; padding: .4rem 0; border-bottom: 1px solid var(--av-border-subtle); }
  </style>
</head>
<body class="av-page font-sans antialiased">
  <aver-admin-chrome active="vocab" subsection="topics">

  <main class="max-w-5xl mx-auto px-6 py-8">
    <h1 class="aw-h1 text-2xl font-bold">Chủ đề nội dung (Topics)</h1>
    <p class="aw-subtitle mt-1 text-sm">Tổ chức nội dung theo chủ đề. Chọn một chủ đề để xem/sửa.</p>
    <div class="mt-2" style="display:flex;gap:.4rem;align-items:center;">
      <span class="tp-muted">Khu vực:</span>
      <button id="tp-sk-vocab" class="aw-btn-secondary text-xs">Từ vựng</button>
      <button id="tp-sk-grammar" class="aw-btn-secondary text-xs">Grammar</button>
    </div>
    <p id="tp-status" class="hidden mt-2 text-sm"></p>

    <div class="tp-grid mt-5">
      <!-- Left: create + list -->
      <div>
        <div class="tp-card">
          <h2 class="text-sm font-bold mb-2">+ Tạo chủ đề</h2>
          <input id="tp-new-title" class="tp-input" placeholder="Tên chủ đề (vd Work & Careers)" />
          <input id="tp-new-slug" class="tp-input" placeholder="slug (bỏ trống → tự sinh)" />
          <button id="tp-create" class="aw-btn-primary mt-2 text-sm">Tạo</button>
        </div>
        <div class="mt-3">
          <div class="flex items-center justify-between">
            <h2 class="text-sm font-bold">Danh sách</h2>
            <span id="tp-count" class="tp-muted"></span>
          </div>
          <div id="tp-list" class="mt-1"></div>
        </div>
      </div>

      <!-- Right: detail -->
      <div id="tp-detail" class="tp-card">
        <p class="tp-muted">← Chọn một chủ đề để xem chi tiết.</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/api.js"></script>
  <script>
    'use strict';
    initSupabase('https://huwsmtubwulikhlmcirx.supabase.co',
                 'sb_publishable_hvevBST9lgIWRd5ITHtUpA_SYjiX6Ao');

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    function status(msg, kind) {
      const el = $('tp-status'); el.textContent = msg || ''; el.classList.toggle('hidden', !msg);
      el.className = 'mt-2 text-sm' + (msg ? '' : ' hidden') + (kind === 'error' ? ' tp-err' : (kind === 'ok' ? ' tp-ok' : ''));
    }

    const SKILL = new URLSearchParams(location.search).get('skill_area') === 'grammar' ? 'grammar' : 'vocab';
    let topics = [];
    let selectedId = null;

    async function loadTopics() {
      try {
        topics = await window.api.get('/admin/content-topics?skill_area=' + SKILL) || [];
      } catch (e) { $('tp-list').innerHTML = '<p class="tp-err">Lỗi tải: ' + esc(e.message) + '</p>'; return; }
      $('tp-count').textContent = topics.length + ' chủ đề';
      $('tp-list').innerHTML = topics.length
        ? topics.map((t) =>
            '<button class="tp-row" data-id="' + esc(t.id) + '" aria-selected="' + (t.id === selectedId) + '">'
            + '<strong>' + esc(t.title) + '</strong>'
            + (t.is_published ? '' : ' <span class="tp-muted">(ẩn)</span>')
            + '<br><span class="tp-muted">' + esc(t.slug) + '</span></button>').join('')
        : '<p class="tp-muted">Chưa có chủ đề nào.</p>';
      Array.prototype.forEach.call(document.querySelectorAll('.tp-row'), (b) => {
        b.addEventListener('click', () => selectTopic(b.getAttribute('data-id')));
      });
    }

    async function selectTopic(id) {
      selectedId = id;
      Array.prototype.forEach.call(document.querySelectorAll('.tp-row'), (b) =>
        b.setAttribute('aria-selected', b.getAttribute('data-id') === id));
      $('tp-detail').innerHTML = '<p class="tp-muted">Đang tải…</p>';
      let bundle;
      try { bundle = await window.api.get('/admin/content-topics/' + id + '/bundle'); }
      catch (e) { $('tp-detail').innerHTML = '<p class="tp-err">Lỗi tải chủ đề: ' + esc(e.message) + '</p>'; return; }
      renderDetail(bundle);
    }

    function renderDetail(b) {
      const t = b.topic, c = b.counts || {};
      const banks = b.quiz_banks || [];
      $('tp-detail').innerHTML =
        '<div class="flex items-center justify-between"><h2 class="text-lg font-bold">' + esc(t.title) + '</h2>'
        + '<span class="tp-muted">' + (c.vocab_cards || 0) + ' từ · ' + (c.quiz_banks || 0) + ' bank</span></div>'
        + '<div class="mt-3">'
        + '<div class="tp-field"><label class="tp-muted">Tên</label><input id="tp-e-title" class="tp-input" value="' + esc(t.title) + '"></div>'
        + '<div class="tp-field"><label class="tp-muted">Tên (VN)</label><input id="tp-e-title-vi" class="tp-input" value="' + esc(t.title_vi || '') + '"></div>'
        + '<div class="tp-field"><label class="tp-muted">Mô tả</label><input id="tp-e-desc" class="tp-input" value="' + esc(t.description || '') + '"></div>'
        + '<div class="tp-field"><label class="tp-muted">Thứ tự</label><input id="tp-e-order" type="number" class="tp-input" value="' + (t.order || 0) + '"></div>'
        + '<label class="tp-field" style="display:flex;align-items:center;gap:.5rem;"><input id="tp-e-pub" type="checkbox" ' + (t.is_published ? 'checked' : '') + '> Hiển thị (published)</label>'
        + '<div class="mt-2" style="display:flex;gap:.5rem;"><button id="tp-save" class="aw-btn-primary text-sm">Lưu</button>'
        + '<button id="tp-del" class="aw-btn-secondary text-sm">Xóa chủ đề</button></div>'
        + '</div>'
        + '<hr style="margin:1rem 0;border:none;border-top:1px solid var(--av-border-subtle);">'
        + '<div class="flex items-center justify-between"><h3 class="text-sm font-bold">Quick-Check banks</h3>'
        + '<a class="aw-btn-secondary text-xs" style="text-decoration:none;" href="/pages/admin/vocab/quiz.html?topic=' + esc(t.id) + '&skill_area=' + SKILL + '">+ Import bank</a></div>'
        + '<div id="tp-banks" class="mt-1">' + (banks.length
            ? banks.map((bk) =>
                '<div class="tp-bankrow"><span><strong>' + esc(bk.code) + '</strong> — ' + esc(bk.title || '') + ' · ' + (bk.words_count || 0) + ' từ'
                + (bk.is_published ? '' : ' <span class="tp-muted">(ẩn)</span>') + '</span>'
                + '<span><button class="aw-btn-secondary" data-stats="' + esc(bk.id) + '" style="font-size:.72rem;">📊</button> '
                + '<button class="aw-btn-secondary" data-pub="' + esc(bk.id) + '" data-cur="' + (bk.is_published ? '1' : '0') + '" style="font-size:.72rem;">' + (bk.is_published ? 'Ẩn' : 'Hiện') + '</button> '
                + '<button class="aw-btn-secondary" data-delbank="' + esc(bk.id) + '" style="font-size:.72rem;">Xóa</button></span></div>').join('')
            : '<p class="tp-muted">Chưa có bank. Dùng "Import bank" để thêm.</p>') + '</div>'
        + '<div id="tp-stats" class="mt-2"></div>'
        // Vocab-card management only applies to vocab topics; grammar topics have no cards.
        + (SKILL === 'vocab'
            ? '<hr style="margin:1rem 0;border:none;border-top:1px solid var(--av-border-subtle);">'
              + '<a class="aw-btn-secondary text-xs" style="text-decoration:none;" href="/pages/admin/vocab/content.html?category=' + esc(t.slug) + '">→ Quản lý ' + (c.vocab_cards || 0) + ' từ vựng của chủ đề</a>'
            : '');

      $('tp-save').onclick = saveTopic;
      $('tp-del').onclick = deleteTopic;
      Array.prototype.forEach.call(document.querySelectorAll('[data-pub]'), (btn) =>
        btn.addEventListener('click', () => toggleBank(btn.getAttribute('data-pub'), btn.getAttribute('data-cur') !== '1')));
      Array.prototype.forEach.call(document.querySelectorAll('[data-delbank]'), (btn) =>
        btn.addEventListener('click', () => deleteBank(btn.getAttribute('data-delbank'))));
      Array.prototype.forEach.call(document.querySelectorAll('[data-stats]'), (btn) =>
        btn.addEventListener('click', () => showAnalytics(btn.getAttribute('data-stats'))));
    }

    async function showAnalytics(bankId) {
      const box = $('tp-stats');
      box.innerHTML = '<p class="tp-muted">Đang tải phân tích…</p>';
      let a;
      try { a = await window.api.get('/admin/quiz/banks/' + bankId + '/analytics'); }
      catch (e) { box.innerHTML = '<p class="tp-err">Lỗi phân tích: ' + esc(e.message) + '</p>'; return; }
      const pct = (x) => (x == null ? '—' : Math.round(x * 100) + '%');
      const items = (a.items || []).slice(0, 10);
      const skills = a.skills || [];
      box.innerHTML =
        '<div class="tp-card"><div class="flex items-center justify-between">'
        + '<strong>📊 Từ dễ sai</strong><span class="tp-muted">' + (a.session_count || 0) + ' phiên</span></div>'
        + (items.length
            ? '<table style="width:100%;font-size:.82rem;margin-top:.4rem;border-collapse:collapse;">'
              + '<tr style="text-align:left;opacity:.7;"><th>Từ/điểm</th><th>Sai</th><th>Lần</th><th>Tỉ lệ sai</th></tr>'
              + items.map((r) => '<tr><td>' + esc(r.item_key) + '</td><td>' + (r.wrong || 0) + '</td><td>'
                  + (r.total || 0) + '</td><td>' + pct(r.error_rate) + '</td></tr>').join('')
              + '</table>'
            : '<p class="tp-muted" style="margin-top:.4rem;">Chưa có lượt làm nào.</p>')
        + (skills.length
            ? '<div class="mt-2 tp-muted">Theo kỹ năng: ' + skills.map((s) =>
                esc(s.skill) + ' ' + pct(s.error_rate)).join(' · ') + '</div>'
            : '') + '</div>';
    }

    async function createTopic() {
      const title = $('tp-new-title').value.trim();
      if (!title) { status('Nhập tên chủ đề.', 'error'); return; }
      try {
        const t = await window.api.post('/admin/content-topics',
          { title, slug: $('tp-new-slug').value.trim() || undefined, skill_area: SKILL });
        $('tp-new-title').value = ''; $('tp-new-slug').value = '';
        status('Đã tạo chủ đề.', 'ok');
        await loadTopics();
        if (t && t.id) selectTopic(t.id);
      } catch (e) { status('Lỗi tạo: ' + e.message, 'error'); }
    }

    async function saveTopic() {
      try {
        await window.api.patch('/admin/content-topics/' + selectedId, {
          title: $('tp-e-title').value.trim(),
          title_vi: $('tp-e-title-vi').value.trim() || null,
          description: $('tp-e-desc').value.trim() || null,
          order: parseInt($('tp-e-order').value, 10) || 0,
          is_published: $('tp-e-pub').checked,
        });
        status('Đã lưu.', 'ok'); await loadTopics(); selectTopic(selectedId);
      } catch (e) { status('Lỗi lưu: ' + e.message, 'error'); }
    }

    async function deleteTopic() {
      if (!confirm('Xóa chủ đề này? (chỉ được khi không còn từ vựng/bank)')) return;
      try {
        await window.api.delete('/admin/content-topics/' + selectedId);
        status('Đã xóa chủ đề.', 'ok'); selectedId = null;
        $('tp-detail').innerHTML = '<p class="tp-muted">← Chọn một chủ đề.</p>';
        loadTopics();
      } catch (e) { status('Không xóa được: ' + e.message, 'error'); }
    }

    async function toggleBank(id, publish) {
      try { await window.api.patch('/admin/quiz/banks/' + id, { is_published: publish }); selectTopic(selectedId); }
      catch (e) { status('Lỗi đổi trạng thái bank: ' + e.message, 'error'); }
    }
    async function deleteBank(id) {
      if (!confirm('Xóa bank này? (xóa cả câu hỏi)')) return;
      try { await window.api.delete('/admin/quiz/banks/' + id); selectTopic(selectedId); }
      catch (e) { status('Lỗi xóa bank: ' + e.message, 'error'); }
    }

    function gotoSkill(sk) {
      if (sk === SKILL) return;
      location.href = '/pages/admin/vocab/topics.html' + (sk === 'grammar' ? '?skill_area=grammar' : '');
    }

    document.addEventListener('DOMContentLoaded', () => {
      // highlight the active skill-area toggle
      $('tp-sk-' + SKILL).classList.add('aw-btn-primary');
      $('tp-sk-' + SKILL).classList.remove('aw-btn-secondary');
      $('tp-sk-vocab').addEventListener('click', () => gotoSkill('vocab'));
      $('tp-sk-grammar').addEventListener('click', () => gotoSkill('grammar'));
      $('tp-create').addEventListener('click', createTopic);
      loadTopics();
    });
  </script>

  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
