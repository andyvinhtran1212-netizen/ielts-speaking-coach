<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Tác giả Mini Test — Aver Learning Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/aver-design/admin-buttons.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); }
    .editor-shell {
      max-width: 920px; margin: 0 auto;
      padding: var(--av-space-8) var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-6);
    }
    .editor-header h1 { font-size: var(--av-fs-2xl); margin-bottom: var(--av-space-2); }
    .editor-header .subtitle { color: var(--av-text-secondary); font-size: var(--av-fs-sm); }
    .field-label {
      font-size: var(--av-fs-xs); color: var(--av-text-muted);
      text-transform: uppercase; letter-spacing: var(--av-tracking-widest);
      display: block; margin-bottom: var(--av-space-2);
    }
    .title-input {
      width: 100%;
      padding: var(--av-space-3) var(--av-space-4);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      font-size: var(--av-fs-base);
      background: var(--av-surface-card);
    }
    .pool-and-lineup {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--av-space-4);
    }
    @media (max-width: 720px) {
      .pool-and-lineup { grid-template-columns: 1fr; }
    }
    .ex-list {
      display: flex; flex-direction: column; gap: var(--av-space-2);
      list-style: none; padding: 0; margin: 0;
      max-height: 480px; overflow-y: auto;
    }
    .ex-card {
      padding: var(--av-space-3);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      display: flex; justify-content: space-between; align-items: center; gap: var(--av-space-2);
    }
    .ex-meta { font-family: var(--av-font-mono); font-size: var(--av-fs-xs); color: var(--av-text-muted); }
    .ex-title { font-size: var(--av-fs-sm); }
    .ex-type-pill {
      font-family: var(--av-font-mono); font-size: var(--av-fs-xs);
      padding: 2px 8px; border-radius: var(--av-radius-pill);
      background: var(--av-brand-teal-50); color: var(--av-brand-teal-800);
      border: 1px solid var(--av-brand-teal-200);
    }
    /* admin buttons → admin-buttons.css bridge (design-fix-2 B3) */
    .btn-ghost {
      padding: 4px 10px; border-radius: var(--av-radius-sm);
      background: transparent; color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default);
      cursor: pointer; font-size: var(--av-fs-xs);
    }
    .button-row { display: flex; gap: var(--av-space-3); flex-wrap: wrap; align-items: center; }
    .status-banner { padding: var(--av-space-3) var(--av-space-4); border-radius: var(--av-radius-md); font-size: var(--av-fs-sm); }
    .status-banner.is-success { background: #ECFDF5; color: var(--av-brand-teal-800); border: 1px solid var(--av-brand-teal-200); }
    .status-banner.is-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
    .status-banner.is-info    { background: var(--av-surface-sunken); color: var(--av-text-secondary); border: 1px solid var(--av-border-default); }
    [hidden] { display: none !important; }
  </style>
</head>
<body class="av-page">
  <aver-admin-chrome active="listening" subsection="mini-test">

  <div class="editor-shell">
    <header class="editor-header">
      <p style="margin-bottom: var(--av-space-2);">
        <a href="/pages/admin/listening/index.html" style="color: var(--av-text-secondary);">← Listening</a>
      </p>
      <h1>Tác giả Mini Test</h1>
      <p class="subtitle">
        Soạn danh sách bài tập (gist, true_false, mcq, dictation) cho một
        bài kiểm tra tổng hợp. Mỗi exercise phải đã được xuất bản.
      </p>
    </header>

    <div class="status-banner is-info" id="status-banner" hidden></div>

    <section>
      <span class="field-label">Tên Mini Test</span>
      <input class="title-input" id="title-input"
             placeholder="Ví dụ: Mini Test 1 — Travel + Education" />
    </section>

    <section>
      <span class="field-label">Sessions đã có</span>
      <ul class="ex-list" id="existing-sessions"></ul>
    </section>

    <section class="pool-and-lineup">
      <div>
        <span class="field-label">Kho exercises (published)</span>
        <ul class="ex-list" id="pool-list"></ul>
      </div>
      <div>
        <span class="field-label">Lineup (<span id="lineup-count">0</span>)</span>
        <ul class="ex-list" id="lineup-list"></ul>
      </div>
    </section>

    <section class="button-row">
      <button class="btn-primary" id="btn-save" type="button">Tạo Mini Test</button>
      <a class="btn-secondary" href="/pages/admin/listening/index.html">Hủy</a>
    </section>
  </div>

  <script type="module" src="/js/admin-listening-mini-test.js"></script>
  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
