<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Tác giả Trắc nghiệm Listening — Aver Learning Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/aver-design/admin-buttons.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/components/audio-player.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); }
    .editor-shell {
      max-width: 920px; margin: 0 auto;
      padding: var(--av-space-8) var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-6);
    }
    .editor-header h1 { font-size: var(--av-fs-2xl); margin-bottom: var(--av-space-2); }
    .editor-header .subtitle { color: var(--av-text-secondary); font-size: var(--av-fs-sm); }
    .field-label {
      font-size: var(--av-fs-xs); color: var(--av-text-muted);
      text-transform: uppercase; letter-spacing: var(--av-tracking-widest);
      display: block; margin-bottom: var(--av-space-2);
    }
    .transcript-ref {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-sunken);
      color: var(--av-text-secondary);
      font-size: var(--av-fs-sm); line-height: var(--av-lh-relaxed);
      white-space: pre-wrap;
    }
    .questions-list { display: flex; flex-direction: column; gap: var(--av-space-4); list-style: none; padding: 0; margin: 0; }
    .questions-list li {
      padding: var(--av-space-4);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      display: flex; flex-direction: column; gap: var(--av-space-3);
    }
    .questions-list li.has-error { border-color: #B91C1C; background: #FEF2F2; }
    .mcq-stem-row { display: flex; gap: var(--av-space-3); align-items: center; }
    .mcq-idx-label { font-family: var(--av-font-mono); font-weight: var(--av-fw-semibold); color: var(--av-text-muted); min-width: 32px; }
    .mcq-stem-input {
      flex: 1;
      padding: var(--av-space-2) var(--av-space-3);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-sm);
      font-family: var(--av-font-sans); font-size: var(--av-fs-sm);
      background: var(--av-surface-card);
    }
    .mcq-options-grid {
      display: grid; grid-template-columns: 28px 24px 1fr 64px;
      gap: var(--av-space-2); align-items: center;
      padding-left: 32px;
    }
    .mcq-letter { font-family: var(--av-font-mono); color: var(--av-text-muted); }
    .mcq-correct-radio { accent-color: var(--av-brand-teal-700); }
    .mcq-option-input {
      padding: var(--av-space-2) var(--av-space-3);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-sm);
      font-size: var(--av-fs-sm);
      background: var(--av-surface-card);
    }
    .mcq-correct-tag {
      font-family: var(--av-font-mono);
      font-size: var(--av-fs-xs);
      color: var(--av-brand-teal-700);
    }
    /* admin buttons → admin-buttons.css bridge (design-fix-2 B3) */
    .btn-ghost {
      padding: 4px 10px; border-radius: var(--av-radius-sm);
      background: transparent; color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default);
      cursor: pointer; font-size: var(--av-fs-xs);
    }
    .button-row { display: flex; gap: var(--av-space-3); flex-wrap: wrap; align-items: center; }
    .status-banner { padding: var(--av-space-3) var(--av-space-4); border-radius: var(--av-radius-md); font-size: var(--av-fs-sm); }
    .status-banner.is-success { background: #ECFDF5; color: var(--av-brand-teal-800); border: 1px solid var(--av-brand-teal-200); }
    .status-banner.is-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
    .status-banner.is-info    { background: var(--av-surface-sunken); color: var(--av-text-secondary); border: 1px solid var(--av-border-default); }
    [hidden] { display: none !important; }
  </style>
</head>
<body class="av-page">
  <aver-admin-chrome active="listening" subsection="mcq">

  <div class="editor-shell">
    <header class="editor-header">
      <p style="margin-bottom: var(--av-space-2);">
        <a href="/pages/admin/listening/index.html" style="color: var(--av-text-secondary);">← Listening</a>
      </p>
      <h1>Tác giả bài Trắc nghiệm</h1>
      <p class="subtitle">
        Soạn 1-20 câu hỏi, mỗi câu có 4 lựa chọn A/B/C/D. Tích vào ô tròn
        bên cạnh để chọn đáp án đúng.
      </p>
    </header>

    <div class="status-banner is-info" id="status-banner" hidden></div>

    <section>
      <span class="field-label">Bài nghe</span>
      <div id="content-info" style="color: var(--av-text-primary);">Đang tải…</div>
    </section>

    <section>
      <span class="field-label">Audio</span>
      <audio-player id="player"></audio-player>
    </section>

    <section>
      <span class="field-label">Bản gỡ băng (read-only)</span>
      <div class="transcript-ref" id="transcript-ref">…</div>
    </section>

    <section>
      <span class="field-label">Câu hỏi (1-20)</span>
      <ul class="questions-list" id="questions-list"></ul>
      <div class="button-row" style="margin-top: var(--av-space-3);">
        <button class="btn-ghost" id="btn-add" type="button">+ Thêm câu hỏi</button>
        <span style="color: var(--av-text-muted); font-size: var(--av-fs-xs);"
              id="questions-count"></span>
      </div>
    </section>

    <section class="button-row">
      <button class="btn-primary" id="btn-save" type="button">Lưu (Draft)</button>
      <button class="btn-primary" id="btn-publish" type="button">Lưu &amp; Xuất bản</button>
      <a class="btn-secondary" href="/pages/admin/listening/index.html">Hủy</a>
    </section>
  </div>

  <script type="module" src="/js/admin-listening-mcq.js"></script>
  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
