<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Topics Speaking · Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); margin: 0; }
    .top-shell {
      max-width: 1180px; margin: 0 auto;
      padding: var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-4);
    }
    .top-header h1 { font-size: var(--av-fs-2xl); font-weight: var(--av-fw-semibold); margin: 0 0 var(--av-space-1); }
    .top-header .subtitle { color: var(--av-text-secondary); font-size: var(--av-fs-sm); }

    .top-tabs {
      display: flex; gap: var(--av-space-1);
      padding: 4px;
      background: var(--av-surface-sunken);
      border-radius: var(--av-radius-md);
      width: fit-content;
    }
    .top-tab {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--av-radius-sm);
      cursor: pointer;
      font-size: var(--av-fs-sm);
      color: var(--av-text-secondary);
      font-family: inherit;
    }
    .top-tab.is-active {
      background: var(--av-surface-card);
      color: var(--av-text-primary);
      border-color: var(--av-border-default);
      font-weight: var(--av-fw-semibold);
    }

    .top-toolbar {
      display: flex; gap: var(--av-space-3); justify-content: space-between;
      align-items: center; flex-wrap: wrap;
    }
    .top-search {
      padding: 8px 12px;
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      color: var(--av-text-primary);
      font-size: var(--av-fs-sm);
      min-width: 240px;
      font-family: inherit;
    }

    .btn-primary {
      padding: var(--av-space-2) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: var(--av-brand-teal-700);
      color: var(--av-text-on-primary);
      border: none; font-weight: var(--av-fw-semibold); cursor: pointer;
      font-size: var(--av-fs-sm);
    }
    .btn-secondary {
      padding: var(--av-space-2) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: transparent; color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default); cursor: pointer;
      font-size: var(--av-fs-sm);
    }
    .btn-ghost {
      padding: 4px 10px; border-radius: var(--av-radius-sm);
      background: transparent; color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default); cursor: pointer;
      font-size: var(--av-fs-xs);
    }
    .btn-danger {
      padding: 4px 10px; border-radius: var(--av-radius-sm);
      background: transparent; color: #B91C1C;
      border: 1px solid #FECACA; cursor: pointer;
      font-size: var(--av-fs-xs);
    }

    .top-table-wrap {
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      overflow-x: auto;
    }
    table.top-table { width: 100%; border-collapse: collapse; }
    table.top-table th, table.top-table td {
      padding: var(--av-space-3) var(--av-space-4);
      text-align: left;
      font-size: var(--av-fs-sm);
      border-bottom: 1px solid var(--av-border-default);
      vertical-align: top;
    }
    table.top-table th {
      font-weight: var(--av-fw-semibold);
      color: var(--av-text-secondary);
      background: var(--av-surface-sunken);
      font-size: var(--av-fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--av-tracking-wide);
    }
    table.top-table tr:last-child td { border-bottom: none; }
    table.top-table tr.is-inactive { opacity: 0.55; }

    .top-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--av-radius-pill);
      font-size: var(--av-fs-xs);
      background: var(--av-surface-sunken);
      color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default);
    }
    .top-chip.is-active { background: var(--av-brand-teal-50); color: var(--av-brand-teal-800); border-color: var(--av-brand-teal-200); }

    .top-empty, .top-loading {
      padding: var(--av-space-8);
      text-align: center;
      color: var(--av-text-muted);
      font-size: var(--av-fs-sm);
    }

    .top-questions {
      padding: var(--av-space-3) var(--av-space-4);
      background: var(--av-surface-sunken);
      border-top: 1px dashed var(--av-border-default);
      display: flex; flex-direction: column; gap: var(--av-space-2);
    }
    .top-question-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--av-space-2);
      padding: 8px 12px;
      background: var(--av-surface-card);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-sm);
      font-size: var(--av-fs-sm);
    }

    .top-status-banner {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      font-size: var(--av-fs-sm);
    }
    .top-status-banner.is-success { background: #ECFDF5; color: var(--av-brand-teal-800); border: 1px solid var(--av-brand-teal-200); }
    .top-status-banner.is-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }

    /* ── Modal ─────────────────────────────────────────────────── */
    .top-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: var(--av-space-4);
    }
    .top-modal {
      background: var(--av-surface-card);
      border-radius: var(--av-radius-lg);
      border: 1px solid var(--av-border-default);
      max-width: 560px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      padding: var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-3);
    }
    .top-modal h2 { font-size: var(--av-fs-lg); font-weight: var(--av-fw-semibold); margin: 0; }
    .top-field { display: flex; flex-direction: column; gap: 4px; }
    .top-field label {
      font-size: var(--av-fs-xs);
      color: var(--av-text-muted);
      text-transform: uppercase;
      letter-spacing: var(--av-tracking-wide);
    }
    .top-field input, .top-field textarea, .top-field select {
      padding: 8px 12px;
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-page, var(--av-surface-card));
      color: var(--av-text-primary);
      font-size: var(--av-fs-sm);
      font-family: inherit;
    }
    .top-field textarea { min-height: 80px; resize: vertical; }
    .top-modal-actions { display: flex; gap: var(--av-space-2); justify-content: flex-end; }

    [hidden] { display: none !important; }
  </style>
</head>
<body class="av-page">
  <aver-admin-chrome active="speaking" subsection="topics">

    <main class="top-shell">
      <header class="top-header">
        <h1>Topics + Questions</h1>
        <p class="subtitle">
          Thư viện topic Part 1/2/3, CRUD câu hỏi từng topic, AI sinh câu hỏi.
          Bulk operations sẽ port lại trong Phase B.
        </p>
      </header>

      <div class="top-status-banner" id="status-banner" hidden></div>

      <div class="top-toolbar">
        <div class="top-tabs" role="tablist" aria-label="Lọc theo Part">
          <button class="top-tab is-active" data-part="1" type="button" role="tab">Part 1 · Interview</button>
          <button class="top-tab" data-part="2" type="button" role="tab">Part 2 · Cue Card</button>
          <button class="top-tab" data-part="3" type="button" role="tab">Part 3 · Discussion</button>
        </div>
        <div style="display:flex; gap: var(--av-space-2); align-items:center;">
          <input class="top-search" id="search" type="text" placeholder="Tìm theo tên topic…" />
          <button class="btn-primary" id="btn-add" type="button">+ Thêm topic</button>
        </div>
      </div>

      <div class="top-loading" id="topics-loading">Đang tải…</div>
      <div class="top-empty" id="topics-empty" hidden>
        Chưa có topic nào trong bộ lọc hiện tại. Thử Part khác hoặc thêm topic mới.
      </div>

      <div class="top-table-wrap" id="topics-table-wrap" hidden>
        <table class="top-table">
          <thead>
            <tr>
              <th>Topic</th>
              <th>Part</th>
              <th>Số câu hỏi</th>
              <th>Trạng thái</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="topics-tbody"></tbody>
        </table>
      </div>
    </main>

    <!-- ── Topic add/edit modal ─────────────────────────────────── -->
    <div class="top-modal-backdrop" id="modal-backdrop" hidden>
      <div class="top-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">Thêm topic mới</h2>
        <div class="top-field">
          <label for="m-title">Tên topic</label>
          <input id="m-title" type="text" placeholder="VD: Travel and tourism" />
        </div>
        <div class="top-field">
          <label for="m-part">Part</label>
          <select id="m-part">
            <option value="1">Part 1</option>
            <option value="2">Part 2</option>
            <option value="3">Part 3</option>
          </select>
        </div>
        <div class="top-field">
          <label for="m-category">Category (tuỳ chọn)</label>
          <input id="m-category" type="text" placeholder="VD: lifestyle, technology…" />
        </div>
        <div class="top-status-banner is-error" id="modal-error" hidden></div>
        <div class="top-modal-actions">
          <button class="btn-secondary" id="btn-cancel" type="button">Hủy</button>
          <button class="btn-primary"   id="btn-submit" type="button">Lưu</button>
        </div>
      </div>
    </div>

    <!-- ── Question add/edit modal ──────────────────────────────── -->
    <div class="top-modal-backdrop" id="modal-q-backdrop" hidden>
      <div class="top-modal" role="dialog" aria-modal="true" aria-labelledby="modal-q-title">
        <h2 id="modal-q-title">Thêm câu hỏi</h2>
        <div class="top-field">
          <label for="mq-text">Câu hỏi</label>
          <textarea id="mq-text" placeholder="Nhập nội dung câu hỏi…"></textarea>
        </div>
        <div class="top-field" id="mq-cue-row" hidden>
          <label for="mq-cue">Cue card bullets (mỗi dòng 1 bullet — chỉ Part 2)</label>
          <textarea id="mq-cue" placeholder="who you would invite\nwhere you would go\n…"></textarea>
        </div>
        <div class="top-status-banner is-error" id="modal-q-error" hidden></div>
        <div class="top-modal-actions">
          <button class="btn-secondary" id="btn-q-cancel" type="button">Hủy</button>
          <button class="btn-primary"   id="btn-q-submit" type="button">Lưu</button>
        </div>
      </div>
    </div>

  </aver-admin-chrome>

  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
  <script src="/js/error-reporter.js"></script>
  <script type="module" src="/js/admin-speaking-topics.js"></script>
</body>
</html>
