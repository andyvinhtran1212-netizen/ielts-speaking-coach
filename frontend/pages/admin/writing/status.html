<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Grading Status — Writing Coach Admin</title>

  <!-- Sprint 6.14a: canonical anti-flash bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- P0-3 C-3.4: static Tailwind (Plus-Jakarta cluster) — replaces 407KB Play-CDN. -->
  <link rel="stylesheet" href="/css/tailwind.build.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/admin-writing.css" />

  <script src="https://unpkg.com/lucide@1.17.0" defer></script>
</head>
<body class="av-page font-sans antialiased">
  <aver-admin-chrome active="writing" subsection="status">

  

  <div id="state-loading" class="flex items-center justify-center py-32">
    <p class="aw-state-loading__text text-sm">Đang kiểm tra quyền truy cập…</p>
  </div>

  <div id="state-denied" class="hidden max-w-xl mx-auto px-6 py-20 text-center">
    <h2 class="aw-state-denied__title text-xl font-bold">🔒 Admin Access Required</h2>
    <a href="/pages/home.html" class="aw-state-denied__back mt-4 inline-block text-sm">← Quay lại trang chủ</a>
  </div>

  <main id="state-ready" class="hidden max-w-2xl mx-auto px-6 py-12">
    <h1 class="aw-h1 text-2xl font-bold">Grading in progress</h1>
    <p class="aw-subtitle mt-1 text-sm">Bạn có thể đóng tab — bài sẽ tiếp tục chấm trong nền.</p>

    <div class="aw-card mt-8 p-6">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div class="flex items-center gap-3">
          <span id="status-pill" class="aw-status-pill aw-pulse" data-status="pending">queued</span>
          <span id="status-text" class="aw-status__text text-sm">Đang xếp hàng…</span>
        </div>
        <span id="elapsed" class="aw-status__elapsed text-xs">0s</span>
      </div>

      <div class="aw-progress-track mt-5">
        <div id="progress-bar" class="aw-progress-bar" style="width:5%;"></div>
      </div>

      <p id="eta-text" class="aw-status__eta mt-3 text-xs">ETA: tính toán…</p>

      <div id="error-box" class="aw-alert aw-alert--error hidden mt-5">
        <p class="text-sm font-medium">Có lỗi khi chấm bài</p>
        <p id="error-msg" class="mt-1 text-xs" style="opacity:0.85;"></p>
      </div>

      <div class="mt-6 flex justify-between items-center">
        <a id="link-essay" href="#" class="aw-status__essay-id text-xs"></a>
        <a id="btn-view" class="aw-btn-primary hidden" style="text-decoration:none;">→ Xem kết quả</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="/js/api.js"></script>
  <script src="/js/writing-admin.js"></script>
  <script>
    'use strict';

    var POLL_INTERVAL_MS = 5000;
    var TERMINAL = { graded: true, reviewed: true, delivered: true, failed: true };

    var _essayId = new URLSearchParams(window.location.search).get('essay_id');
    var _startedAt = Date.now();
    var _eta = 60;
    var _timer = null;
    var _notified = false;

    var STATUS_DISPLAY = {
      pending:   { text: 'Đang xếp hàng…' },
      grading:   { text: 'Gemini đang chấm bài…' },
      graded:    { text: 'Đã chấm xong! 🎉' },
      reviewed:  { text: 'Admin đã review.' },
      delivered: { text: 'Đã giao cho học viên.' },
      failed:    { text: 'Chấm bài thất bại.' },
    };

    // Sprint 2.7b — Deep tier runs 3 passes (~3-5 phút). Time-based
    // rotation gives the admin a sense of progress without realtime
    // events. Boundaries are heuristics matching the per-pass timeouts:
    // 0-90s = Pass 1, 90-180s = Pass 2, 180s+ = Pass 3.
    function deepGradingMessage(elapsedSeconds) {
      if (elapsedSeconds < 90)  return 'Deep tier · Pass 1 of 3 (Standard analysis)…';
      if (elapsedSeconds < 180) return 'Deep tier · Pass 2 of 3 (Refinement)…';
      return                          'Deep tier · Pass 3 of 3 (Sentence rewrite)…';
    }

    function updateUI(payload) {
      var s = payload.status || 'pending';
      var meta = STATUS_DISPLAY[s] || STATUS_DISPLAY.pending;
      var pill = document.getElementById('status-pill');
      pill.textContent = s;
      pill.setAttribute('data-status', s);
      if (TERMINAL[s]) pill.classList.remove('aw-pulse'); else pill.classList.add('aw-pulse');
      // Tier-aware status text. Deep tier rotates Pass 1/2/3 hints
      // while status='grading'; Standard / non-grading states use the
      // generic message from STATUS_DISPLAY.
      var tier = (payload.grading_tier || 'standard').toLowerCase();
      var elapsedSec = Math.floor((Date.now() - _startedAt) / 1000);
      if (s === 'grading' && tier === 'deep') {
        document.getElementById('status-text').textContent = deepGradingMessage(elapsedSec);
      } else {
        document.getElementById('status-text').textContent = meta.text;
      }

      _eta = payload.eta_seconds || _eta;
      var elapsed = Math.floor((Date.now() - _startedAt) / 1000);
      document.getElementById('elapsed').textContent = elapsed + 's';

      var pct;
      if (s === 'graded' || s === 'reviewed' || s === 'delivered') pct = 100;
      else if (s === 'failed') pct = 100;
      else pct = Math.min(95, Math.round((elapsed / _eta) * 100));
      var bar = document.getElementById('progress-bar');
      bar.style.width = pct + '%';
      if (s === 'failed') bar.classList.add('aw-progress-bar--failed');
      else                bar.classList.remove('aw-progress-bar--failed');

      if (!TERMINAL[s]) {
        document.getElementById('eta-text').textContent =
          'ETA: ~' + _eta + 's tổng cộng (đã trôi ' + elapsed + 's)';
      } else {
        document.getElementById('eta-text').textContent = 'Hoàn tất sau ' + elapsed + 's.';
      }

      if (s === 'failed' && payload.error_message) {
        document.getElementById('error-box').classList.remove('hidden');
        document.getElementById('error-msg').textContent = payload.error_message;
      }

      // Show "view result" CTA when graded — Sprint W3 will provide /grade page
      if (s === 'graded' || s === 'reviewed' || s === 'delivered') {
        var viewBtn = document.getElementById('btn-view');
        viewBtn.href = '/pages/admin/writing/grade.html?essay_id=' + encodeURIComponent(_essayId);
        viewBtn.classList.remove('hidden');

        if (!_notified) {
          _notified = true;
          WC.notify('Bài chấm xong', 'Essay ' + _essayId.slice(0, 8) + '… đã sẵn sàng review.');
        }
      }
    }

    async function pollOnce() {
      try {
        var data = await window.api.get('/admin/writing/essays/' + _essayId + '/status');
        updateUI(data);
        if (TERMINAL[data.status]) {
          clearInterval(_timer);
          _timer = null;
        }
      } catch (e) {
        document.getElementById('status-text').textContent = 'Polling failed: ' + e.message;
      }
    }

    WC.bootstrap({
      onReady: function () {
        if (!_essayId) {
          document.getElementById('status-text').textContent = 'Thiếu essay_id trong URL.';
          return;
        }
        document.getElementById('link-essay').textContent = 'essay_id: ' + _essayId;
        WC.requestNotifyPermission();
        pollOnce();
        _timer = setInterval(pollOnce, POLL_INTERVAL_MS);
      }
    });
  </script>

  <!-- Lucide hydration + theme toggle binding (Sprint 6.14a) -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      function bindToggleButton() {
        var btn = document.querySelector('.av-theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('av-theme', next); } catch (e) {}
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          hydrateIcons(); bindToggleButton();
        });
      } else {
        hydrateIcons(); bindToggleButton();
      }
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
