<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Library Prompts — Writing Coach Admin</title>

  <!-- Sprint 6.14a: canonical anti-flash bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/admin-writing.css" />
  <!-- P0-3 C-3.4: static Tailwind loaded LAST (after page CSS) to match the
       Play-CDN cascade — utilities/.hidden win over same-specificity page rules. -->
  <link rel="stylesheet" href="/css/tailwind.build.css" />

  <script src="https://unpkg.com/lucide@1.17.0" defer></script>
</head>
<body class="av-page font-sans antialiased min-h-screen">
  <aver-admin-chrome active="writing" subsection="prompts">
  <div class="max-w-5xl mx-auto px-4 py-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <span class="aw-brand text-xl font-bold">Aver<span class="aw-brand__accent">Learning</span></span>
        <span class="aw-subtitle text-sm hidden md:inline">— Library Prompts</span>
      </div>
      <div class="flex items-center gap-3">
        <a href="/admin.html" class="aw-back-link text-sm">← Admin home</a>
        <button class="av-theme-toggle" type="button" aria-label="Chuyển giao diện sáng/tối">
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <h1 class="aw-h1 text-2xl font-semibold mb-1 flex items-center gap-2">
      <span aria-hidden="true">📚</span> Library Prompts
    </h1>
    <p class="aw-subtitle text-sm mb-6">Quản lý kho đề bài IELTS Writing để giao cho học viên.</p>

    <!-- Filter bar -->
    <div class="flex flex-wrap gap-3 mb-4 items-center">
      <select id="filter-task-type" class="aw-input" style="width: auto; min-width: 180px;">
        <option value="">Tất cả task types</option>
        <option value="task2">Task 2</option>
        <option value="task1_academic">Task 1 Academic</option>
        <option value="task1_general">Task 1 General</option>
      </select>
      <select id="filter-difficulty" class="aw-input" style="width: auto; min-width: 160px;">
        <option value="">Tất cả độ khó</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
      <button id="btn-create" type="button" class="aw-btn-primary ml-auto">+ Thêm prompt mới</button>
    </div>

    <!-- States -->
    <div id="state-loading" class="aw-state-loading text-center py-10">Đang tải…</div>
    <div id="state-error"   class="aw-state-error hidden text-sm"></div>
    <div id="state-empty"   class="aw-state-empty hidden text-center py-10">Chưa có prompt nào ở bộ lọc hiện tại.</div>

    <!-- Prompts list -->
    <div id="prompts-list" class="space-y-3 hidden"></div>
  </div>

  <!-- Create / edit modal -->
  <div id="modal" class="aw-modal-bg hidden fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="aw-modal-panel max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 id="modal-title" class="aw-modal-title text-lg font-semibold">Tạo prompt mới</h2>
        <button id="btn-close-modal" type="button" class="aw-modal-close text-2xl leading-none" aria-label="Close">&times;</button>
      </div>

      <div class="space-y-3">
        <div>
          <label class="aw-form-label">Tiêu đề <span class="aw-form-label__required">*</span></label>
          <input id="form-title" class="aw-input" placeholder="VD: Climate change priority" />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="aw-form-label">Task type</label>
            <select id="form-task-type" class="aw-input">
              <option value="task2">Task 2</option>
              <option value="task1_academic">Task 1 Academic</option>
              <option value="task1_general">Task 1 General</option>
            </select>
          </div>
          <div>
            <label class="aw-form-label">Độ khó</label>
            <select id="form-difficulty" class="aw-input">
              <option value="">— Chưa phân loại —</option>
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>

        <div>
          <label class="aw-form-label">Đề bài <span class="aw-form-label__required">*</span></label>
          <textarea id="form-prompt-text" class="aw-input" placeholder="Some people believe… Discuss both views and give your opinion."></textarea>
        </div>

        <!-- Phase 2.3c-1 — image upload, visible only for task1_academic -->
        <div id="form-image-section" class="hidden">
          <label class="aw-form-label">
            Hình ảnh (Task 1 Academic)
          </label>
          <p class="aw-help-text text-xs mb-2">
            Tùy chọn — JPG/PNG/WEBP/GIF, tối đa 5MB. Cloudinary sẽ tự nén + cap 1200px.
          </p>

          <div id="image-preview-container" class="hidden mb-2">
            <img id="image-preview" class="aw-image-preview max-w-xs" alt="" />
            <button id="btn-remove-image" type="button" class="aw-btn-secondary mt-2" style="font-size:12px">
              ✕ Xóa hình
            </button>
          </div>

          <div id="image-upload-controls">
            <input id="form-image-file" type="file" accept="image/*" class="text-sm" />
            <span id="upload-status" class="aw-upload-status hidden ml-2 text-xs">Đang upload…</span>
            <span id="upload-error"  class="aw-upload-error hidden ml-2 text-xs"></span>
          </div>

          <input id="form-image-url"       type="hidden" />
          <input id="form-image-public-id" type="hidden" />
        </div>

        <div>
          <label class="aw-form-label">Tags (cách nhau bởi dấu phẩy)</label>
          <input id="form-tags" class="aw-input" placeholder="environment, opinion, advanced" />
        </div>
      </div>

      <div id="modal-error" class="aw-upload-error hidden mt-3 text-sm"></div>

      <div class="flex justify-end gap-2 mt-6">
        <button id="btn-cancel" type="button" class="aw-btn-secondary">Hủy</button>
        <button id="btn-save"   type="button" class="aw-btn-primary">Lưu</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <!-- Absolute path: under the Vercel rewrite `/admin/writing/prompts`
       (3 path segments), `../js/api.js` resolves to `/admin/js/api.js`
       and 404s. Using `/js/api.js` matches admin-writing-grade.html and
       is rewrite-agnostic. -->
  <script src="/js/api.js"></script>
  <script>
    'use strict';

    // ── Supabase init (matches the convention from other admin pages) ─
    var SUPABASE_URL  = 'https://nqhrtqspznepmveyurzm.supabase.co';
    var SUPABASE_ANON = 'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4';
    initSupabase(SUPABASE_URL, SUPABASE_ANON);

    var TASK_LABELS = {
      task2:          'Task 2',
      task1_academic: 'Task 1 Academic',
      task1_general:  'Task 1 General',
    };
    var DIFFICULTY_LABELS = {
      beginner:     'Beginner',
      intermediate: 'Intermediate',
      advanced:     'Advanced',
    };

    var _allPrompts = [];
    var _editingId  = null;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
      });
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    // ── Image upload helpers (Phase 2.3c-1) ────────────────────────
    // The image section only makes sense for Task 1 Academic — the
    // schema permits an image on any task_type, but the UX rule is:
    // text-only prompts shouldn't surface a stray upload field.
    function syncImageSectionVisibility() {
      var taskType = document.getElementById('form-task-type').value;
      if (taskType === 'task1_academic') show('form-image-section');
      else                                hide('form-image-section');
    }

    function setImageState(url, publicId) {
      document.getElementById('form-image-url').value       = url      || '';
      document.getElementById('form-image-public-id').value = publicId || '';

      var preview     = document.getElementById('image-preview');
      var previewBox  = document.getElementById('image-preview-container');
      var controls    = document.getElementById('image-upload-controls');

      if (url) {
        preview.src = url;
        previewBox.classList.remove('hidden');
        controls.classList.add('hidden');
      } else {
        preview.removeAttribute('src');
        previewBox.classList.add('hidden');
        controls.classList.remove('hidden');
        // Clear the file input so re-selecting the same file still
        // fires `change` (browsers suppress the event when value
        // hasn't changed otherwise).
        document.getElementById('form-image-file').value = '';
      }
      hide('upload-error');
    }

    async function handleImageUpload(ev) {
      var file = ev.target.files && ev.target.files[0];
      if (!file) return;

      hide('upload-error');
      show('upload-status');

      try {
        var fd = new FormData();
        fd.append('file', file);
        // `window.api.upload` skips the JSON Content-Type so the
        // browser's multipart boundary is preserved.
        var res = await window.api.upload('/admin/writing/prompts/upload-image', fd);
        setImageState(res.url, res.public_id);
      } catch (err) {
        var box = document.getElementById('upload-error');
        box.textContent = 'Upload lỗi: ' + (err.message || 'không xác định');
        show('upload-error');
        // Reset the file input so a retry fires `change` again.
        document.getElementById('form-image-file').value = '';
      } finally {
        hide('upload-status');
      }
    }

    // ── Load + render ──────────────────────────────────────────────
    async function loadPrompts() {
      hide('state-error');
      hide('state-empty');
      hide('prompts-list');
      show('state-loading');

      var taskType  = document.getElementById('filter-task-type').value;
      var difficulty = document.getElementById('filter-difficulty').value;

      // Backend defaults `is_active=true` when the param is omitted, so
      // the admin UI only ever shows active rows. (Restore-from-inactive
      // is queued for a later sprint if Andy needs it.)
      var params = new URLSearchParams();
      if (taskType)   params.set('task_type', taskType);
      if (difficulty) params.set('difficulty', difficulty);

      try {
        var data = await window.api.get('/admin/writing/prompts?' + params.toString());
        _allPrompts = (data && data.prompts) || [];
        renderPrompts();
      } catch (err) {
        hide('state-loading');
        var box = document.getElementById('state-error');
        box.textContent = 'Lỗi tải prompts: ' + (err.message || 'không xác định');
        show('state-error');
      }
    }

    function renderPrompts() {
      hide('state-loading');
      var list = document.getElementById('prompts-list');

      if (_allPrompts.length === 0) {
        list.innerHTML = '';
        show('state-empty');
        return;
      }

      list.innerHTML = _allPrompts.map(function (p) {
        var tags = (p.tags || []).map(function (t) {
          return '<span class="aw-tag">' + escapeHtml(t) + '</span>';
        }).join(' ');

        var diffClass = p.difficulty ? ('aw-pill aw-pill--difficulty-' + p.difficulty) : 'aw-pill';
        var diffLabel = p.difficulty ? (DIFFICULTY_LABELS[p.difficulty] || p.difficulty) : '';

        var truncated = p.prompt_text && p.prompt_text.length > 240
          ? p.prompt_text.substring(0, 240).trim() + '…'
          : (p.prompt_text || '');

        var imageHtml = p.prompt_image_url
          ? '<img src="' + escapeHtml(p.prompt_image_url) + '" alt="" '
              + 'class="aw-image-preview max-w-xs mb-3" loading="lazy" />'
          : '';

        return ''
          + '<div class="aw-prompt-row">'
          +   '<div class="flex items-start justify-between gap-3 mb-2">'
          +     '<h3 class="aw-prompt-row__title font-semibold text-base">' + escapeHtml(p.title || '(Không tiêu đề)') + '</h3>'
          +     '<div class="flex flex-wrap gap-1 flex-shrink-0 justify-end">'
          +       '<span class="aw-pill aw-pill--task">' + escapeHtml(TASK_LABELS[p.task_type] || p.task_type) + '</span>'
          +       (diffLabel ? '<span class="' + diffClass + '">' + escapeHtml(diffLabel) + '</span>' : '')
          +     '</div>'
          +   '</div>'
          +   imageHtml
          +   '<p class="aw-prompt-row__body text-sm mb-3 whitespace-pre-line">' + escapeHtml(truncated) + '</p>'
          +   '<div class="flex items-center justify-between flex-wrap gap-2">'
          +     '<div class="flex flex-wrap gap-1">' + tags + '</div>'
          +     '<div class="flex gap-2">'
          +       '<button type="button" class="aw-btn-secondary" data-action="edit"   data-id="' + p.id + '">Sửa</button>'
          +       '<button type="button" class="aw-btn-danger"    data-action="delete" data-id="' + p.id + '">Xóa</button>'
          +     '</div>'
          +   '</div>'
          + '</div>';
      }).join('');

      // Wire row buttons via event delegation (avoids onclick template
      // literal pitfalls — see anti-pattern #18 from Sprint 2.2.1).
      list.querySelectorAll('button[data-action]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var action = btn.getAttribute('data-action');
          var id     = btn.getAttribute('data-id');
          if (action === 'edit')   openEditModal(id);
          if (action === 'delete') softDeletePrompt(id);
        });
      });

      show('prompts-list');
    }

    // ── Modal handlers ─────────────────────────────────────────────
    function openCreateModal() {
      _editingId = null;
      document.getElementById('modal-title').textContent = 'Tạo prompt mới';
      document.getElementById('form-title').value        = '';
      document.getElementById('form-task-type').value    = 'task2';
      document.getElementById('form-prompt-text').value  = '';
      document.getElementById('form-difficulty').value   = '';
      document.getElementById('form-tags').value         = '';
      setImageState('', '');
      syncImageSectionVisibility();
      hide('modal-error');
      show('modal');
    }

    function openEditModal(id) {
      var p = _allPrompts.find(function (x) { return x.id === id; });
      if (!p) return;

      _editingId = id;
      document.getElementById('modal-title').textContent = 'Sửa prompt';
      document.getElementById('form-title').value        = p.title       || '';
      document.getElementById('form-task-type').value    = p.task_type   || 'task2';
      document.getElementById('form-prompt-text').value  = p.prompt_text || '';
      document.getElementById('form-difficulty').value   = p.difficulty  || '';
      document.getElementById('form-tags').value         = (p.tags || []).join(', ');
      setImageState(p.prompt_image_url || '', p.prompt_image_public_id || '');
      syncImageSectionVisibility();
      hide('modal-error');
      show('modal');
    }

    function closeModal() { hide('modal'); }

    async function savePrompt() {
      var title      = document.getElementById('form-title').value.trim();
      var taskType   = document.getElementById('form-task-type').value;
      var promptText = document.getElementById('form-prompt-text').value.trim();
      var difficulty = document.getElementById('form-difficulty').value || null;
      var tagsRaw    = document.getElementById('form-tags').value;

      if (!title || title.length < 2) {
        showModalError('Tiêu đề phải có ít nhất 2 ký tự.');
        return;
      }
      if (!promptText || promptText.length < 10) {
        showModalError('Đề bài phải có ít nhất 10 ký tự.');
        return;
      }

      var tags = tagsRaw.split(',').map(function (t) { return t.trim(); }).filter(Boolean);

      // Image fields are only meaningful for task1_academic — for any
      // other task type we send NULL to clear a stale value left from
      // a prior edit where the admin switched task_type.
      var imageUrl      = document.getElementById('form-image-url').value      || null;
      var imagePublicId = document.getElementById('form-image-public-id').value || null;
      if (taskType !== 'task1_academic') {
        imageUrl      = null;
        imagePublicId = null;
      }

      var payload = {
        title:                  title,
        task_type:              taskType,
        prompt_text:            promptText,
        difficulty:             difficulty,
        tags:                   tags,
        prompt_image_url:       imageUrl,
        prompt_image_public_id: imagePublicId,
      };

      try {
        if (_editingId) {
          await window.api.patch('/admin/writing/prompts/' + _editingId, payload);
        } else {
          await window.api.post('/admin/writing/prompts', payload);
        }
        closeModal();
        await loadPrompts();
      } catch (err) {
        showModalError('Lỗi: ' + (err.message || 'không lưu được'));
      }
    }

    function showModalError(msg) {
      var box = document.getElementById('modal-error');
      box.textContent = msg;
      show('modal-error');
    }

    async function softDeletePrompt(id) {
      // Backend DELETE flips `is_active=false` rather than removing the
      // row, so the prompt can be brought back later via direct PATCH
      // if needed. The admin UI no longer surfaces inactive rows
      // (filter dropdown removed), so this is effectively final from
      // the admin's perspective until we add a "show inactive" view.
      if (!confirm('Tắt prompt này?')) return;
      try {
        await window.api.delete('/admin/writing/prompts/' + id);
        await loadPrompts();
      } catch (err) {
        alert('Lỗi xóa: ' + (err.message || 'không xác định'));
      }
    }

    // ── Wire up + initial load ─────────────────────────────────────
    document.getElementById('btn-create').addEventListener('click', openCreateModal);
    document.getElementById('btn-save').addEventListener('click', savePrompt);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('filter-task-type').addEventListener('change', loadPrompts);
    document.getElementById('filter-difficulty').addEventListener('change', loadPrompts);

    // Image upload wiring
    document.getElementById('form-task-type').addEventListener('change', syncImageSectionVisibility);
    document.getElementById('form-image-file').addEventListener('change', handleImageUpload);
    document.getElementById('btn-remove-image').addEventListener('click', function () {
      setImageState('', '');
    });

    loadPrompts();
  </script>

  <!-- Lucide hydration + theme toggle binding (Sprint 6.14a) -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      function bindToggleButton() {
        var btn = document.querySelector('.av-theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('av-theme', next); } catch (e) {}
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          hydrateIcons(); bindToggleButton();
        });
      } else {
        hydrateIcons(); bindToggleButton();
      }
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
