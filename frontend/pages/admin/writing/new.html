<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Submit Essay — Writing Coach Admin</title>

  <!-- Sprint 6.14a: canonical anti-flash bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Aver Design System foundation. -->
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/admin-writing.css" />

  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body class="av-page font-sans antialiased">
  <aver-admin-chrome active="writing" subsection="new">

  

  <div id="state-loading" class="flex items-center justify-center py-32">
    <p class="aw-state-loading__text text-sm">Đang kiểm tra quyền truy cập…</p>
  </div>

  <div id="state-denied" class="hidden max-w-xl mx-auto px-6 py-20 text-center">
    <h2 class="aw-state-denied__title text-xl font-bold">🔒 Admin Access Required</h2>
    <a href="/pages/home.html" class="aw-state-denied__back mt-4 inline-block text-sm">← Quay lại trang chủ</a>
  </div>

  <main id="state-ready" class="hidden max-w-4xl mx-auto px-6 py-8">
    <h1 class="aw-h1 text-2xl font-bold">Submit New Essay</h1>
    <p class="aw-subtitle mt-1 text-sm">Chọn học viên, dán đề + bài viết, AI sẽ chấm trong nền.</p>

    <div id="alert-area" class="mt-4"></div>

    <form id="essay-form" class="aw-card mt-5 p-6 space-y-5">
      <!-- Student picker -->
      <div>
        <label class="aw-label text-xs font-medium">Học viên *</label>
        <select id="f-student" class="aw-input mt-1" required>
          <option value="">— Đang tải danh sách —</option>
        </select>
      </div>

      <!-- Task type + level + model -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="aw-label text-xs font-medium">Task Type *</label>
          <select id="f-task-type" class="aw-input mt-1" required>
            <option value="task2">Task 2</option>
            <option value="task1_academic">Task 1 — Academic</option>
            <option value="task1_general">Task 1 — General</option>
          </select>
        </div>
        <div>
          <label class="aw-label text-xs font-medium">Analysis Level *</label>
          <select id="f-level" class="aw-input mt-1" required>
            <option value="1">Level 1 — Mistake-only</option>
            <option value="2">Level 2 — + Coherence</option>
            <option value="3" selected>Level 3 — + Idea / Counterargument</option>
            <option value="4">Level 4 — + Lexical / Sentence</option>
            <option value="5">Level 5 — Pedantic / Full</option>
          </select>
        </div>
        <div>
          <label class="aw-label text-xs font-medium">Model *</label>
          <select id="f-model" class="aw-input mt-1" required>
            <option value="gemini-2.5-pro" selected>Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (rẻ hơn, nhanh hơn)</option>
          </select>
        </div>
      </div>

      <!-- Form of address -->
      <div>
        <label class="aw-label text-xs font-medium">Cách xưng hô (form of address)</label>
        <div class="mt-1 flex gap-2 flex-wrap">
          <label class="aw-foa-pill"><input type="radio" name="foa" value="bạn" class="sr-only"> bạn</label>
          <label class="aw-foa-pill aw-foa-pill--checked"><input type="radio" name="foa" value="em" checked class="sr-only"> em</label>
          <label class="aw-foa-pill"><input type="radio" name="foa" value="anh" class="sr-only"> anh</label>
          <label class="aw-foa-pill"><input type="radio" name="foa" value="chị" class="sr-only"> chị</label>
        </div>
      </div>

      <!-- Sprint 2.7a — Grading depth tier (Quick removed in 2.7a.1) -->
      <div>
        <label class="aw-label text-xs font-medium">Grading tier</label>
        <div class="aw-tier-picker mt-2">
          <label class="aw-tier-option">
            <input type="radio" name="grading_tier" value="standard" checked>
            <div class="aw-tier-card">
              <span class="aw-tier__name">Standard</span>
              <span class="aw-tier__meta">~30–60s · 12 sections · Pro</span>
              <span class="aw-tier__desc">Full analysis: improved essay, lexical, counterargument.</span>
            </div>
          </label>
          <label class="aw-tier-option">
            <input type="radio" name="grading_tier" value="deep">
            <div class="aw-tier-card">
              <span class="aw-tier__name">Deep</span>
              <span class="aw-tier__meta">~3–5 phút · 12 sections + sentence rewrite · Pro multi-pass</span>
              <span class="aw-tier__desc">Refined band scores + sentence-by-sentence rewrite for mistakes. ~$0.50</span>
            </div>
          </label>
          <label class="aw-tier-option">
            <input type="radio" name="grading_tier" value="instructor">
            <div class="aw-tier-card">
              <span class="aw-tier__name">Instructor</span>
              <span class="aw-tier__meta">~24–48h · Human review</span>
              <span class="aw-tier__desc">AI Standard Pass 1 + giảng viên review &amp; deliver kèm tin nhắn.</span>
            </div>
          </label>
        </div>
      </div>

      <!-- Prompt + Essay -->
      <div>
        <label class="aw-label text-xs font-medium">Đề bài (prompt) *</label>
        <textarea id="f-prompt" class="aw-input mt-1" rows="4" required placeholder="Some people think that…"></textarea>
      </div>
      <div>
        <label class="aw-label text-xs font-medium">
          Bài viết của học viên *
          <span id="word-count" class="aw-word-count ml-2">0 từ</span>
        </label>
        <textarea id="f-essay" class="aw-input mt-1" rows="14" required placeholder="Paste essay here…"></textarea>
      </div>

      <div class="flex justify-end gap-2 pt-2">
        <a href="/pages/admin/writing/index.html" class="aw-btn-cancel px-4 py-2 text-sm">Hủy</a>
        <button type="submit" id="btn-submit" class="aw-btn-primary">Submit for grading</button>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script src="/js/writing-admin.js"></script>
  <script>
    'use strict';

    function setAlert(kind, msg) {
      var area = document.getElementById('alert-area');
      var cls  = kind === 'error' ? 'aw-alert--error' : kind === 'success' ? 'aw-alert--success' : 'aw-alert--warn';
      area.innerHTML = '<div class="aw-alert ' + cls + '">' + WC.escapeHtml(msg) + '</div>';
    }

    async function loadStudents(presetId) {
      var sel = document.getElementById('f-student');
      try {
        var rows = await window.api.get('/admin/students?limit=200');
        if (!rows || !rows.length) {
          sel.innerHTML = '<option value="">— Chưa có học viên —</option>';
          setAlert('warn', 'Bạn cần tạo học viên trước. → /pages/admin/students/index.html');
          return;
        }
        sel.innerHTML = '<option value="">— Chọn học viên —</option>' + rows.map(function (r) {
          var label = r.student_code + ' — ' + r.full_name;
          return '<option value="' + WC.escapeHtml(r.id) + '">' + WC.escapeHtml(label) + '</option>';
        }).join('');
        if (presetId) sel.value = presetId;
      } catch (e) {
        setAlert('error', 'Không tải được học viên: ' + e.message);
      }
    }

    function updateWordCount() {
      var t = document.getElementById('f-essay').value.trim();
      var n = t === '' ? 0 : t.split(/\s+/).length;
      document.getElementById('word-count').textContent = n + ' từ';
    }

    function bindFoaPills() {
      // Visual swap for the FOA radio group — the underlying <input>
      // stays the source of truth (form submit reads :checked).
      var pills = document.querySelectorAll('.aw-foa-pill');
      pills.forEach(function (pill) {
        pill.addEventListener('click', function () {
          pills.forEach(function (p) { p.classList.remove('aw-foa-pill--checked'); });
          pill.classList.add('aw-foa-pill--checked');
        });
      });
    }

    async function handleSubmit(e) {
      e.preventDefault();
      var btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'Đang gửi…';

      var foa = document.querySelector('input[name="foa"]:checked');
      // Sprint 2.7a — tier picker. Default 'standard' if no radio is
      // selected (defensive — the form ships with one checked).
      var tier = document.querySelector('input[name="grading_tier"]:checked');
      var payload = {
        student_id:      document.getElementById('f-student').value,
        task_type:       document.getElementById('f-task-type').value,
        analysis_level:  parseInt(document.getElementById('f-level').value, 10),
        selected_model:  document.getElementById('f-model').value,
        form_of_address: foa ? foa.value : 'em',
        grading_tier:    tier ? tier.value : 'standard',
        prompt_text:     document.getElementById('f-prompt').value.trim(),
        essay_text:      document.getElementById('f-essay').value.trim(),
      };

      if (!payload.student_id) {
        setAlert('error', 'Vui lòng chọn học viên.');
        btn.disabled = false; btn.textContent = 'Submit for grading';
        return;
      }

      try {
        var res = await window.api.post('/admin/writing/essays', payload);
        // Pre-warm notification permission so the status page can notify on graded.
        WC.requestNotifyPermission();
        window.location.href = '/pages/admin/writing/status.html?essay_id=' + encodeURIComponent(res.essay_id);
      } catch (err) {
        setAlert('error', err.message);
        btn.disabled = false; btn.textContent = 'Submit for grading';
      }
    }

    WC.bootstrap({
      onReady: function () {
        var preset = new URLSearchParams(window.location.search).get('student_id');
        loadStudents(preset);
        document.getElementById('f-essay').addEventListener('input', updateWordCount);
        document.getElementById('essay-form').addEventListener('submit', handleSubmit);
        bindFoaPills();
      }
    });
  </script>

  <!-- Lucide hydration + theme toggle binding (Sprint 6.14a) -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      function bindToggleButton() {
        var btn = document.querySelector('.av-theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('av-theme', next); } catch (e) {}
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          hydrateIcons(); bindToggleButton();
        });
      } else {
        hydrateIcons(); bindToggleButton();
      }
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
