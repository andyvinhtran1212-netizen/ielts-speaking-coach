<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Instructor Queue — Writing Coach Admin</title>

  <!-- Sprint 6.14c: canonical anti-flash bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/admin-writing.css" />

  <script src="https://unpkg.com/lucide@1.17.0" defer></script>
</head>
<body class="av-page font-sans antialiased">
  <aver-admin-chrome active="writing" subsection="instructor-queue">

  

  <div id="state-loading" class="flex items-center justify-center py-32">
    <p class="aw-state-loading__text text-sm">Đang kiểm tra quyền truy cập…</p>
  </div>

  <div id="state-denied" class="hidden max-w-xl mx-auto px-6 py-20 text-center">
    <h2 class="aw-state-denied__title text-xl font-bold">🔒 Admin Access Required</h2>
    <a href="/pages/home.html" class="aw-state-denied__back mt-4 inline-block text-sm">← Quay lại trang chủ</a>
  </div>

  <main id="state-ready" class="hidden max-w-6xl mx-auto px-6 py-8">
    <div class="flex items-baseline justify-between gap-4 flex-wrap">
      <div>
        <h1 class="aw-h1 text-2xl font-bold">Instructor Queue</h1>
        <p class="aw-subtitle mt-1 text-sm">
          Bài tier <strong>Instructor</strong> đã chấm xong AI Pass 1, chờ giảng viên review &amp; deliver.
        </p>
      </div>
      <div class="aw-meta-count text-xs">
        Auto-refresh mỗi 30s · <span id="queue-count">0</span> bài
      </div>
    </div>

    <div id="alert-area" class="mt-4"></div>

    <div class="mt-5 flex gap-2 flex-wrap">
      <button class="aw-filter-btn aw-filter-btn--active" data-filter="all_active">All Active</button>
      <button class="aw-filter-btn" data-filter="queued">Queued</button>
      <button class="aw-filter-btn" data-filter="my_claims">My Claims</button>
      <button class="aw-filter-btn" data-filter="delivered">Delivered (recent)</button>
    </div>

    <div class="aw-card mt-5 overflow-x-auto">
      <table class="aw-queue-table">
        <thead>
          <tr>
            <th>Submitted</th>
            <th>Age</th>
            <th>Student</th>
            <th>Lvl</th>
            <th>Task</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="queue-rows">
          <tr><td colspan="7" class="aw-queue-table__empty">Đang tải…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="/js/api.js"></script>
  <script src="/js/writing-admin.js"></script>
  <script>
    'use strict';

    // ── State ─────────────────────────────────────────────────────────
    var POLL_INTERVAL_MS = 30000;

    // currentAdminId comes from WC.bootstrap's onReady callback (which
    // wraps /auth/me — same pattern as every other admin-writing page).
    var _currentAdminId = null;
    var _currentFilter  = 'all_active';
    var _pollTimer      = null;

    // Filter → status query params. 'my_claims' also filters by
    // claimed_by=currentAdminId server-side (instructor_id query param).
    var FILTERS = {
      all_active: { statuses: ['queued', 'claimed'] },
      queued:     { statuses: ['queued'] },
      my_claims:  { statuses: ['claimed'], scopeToMe: true },
      delivered:  { statuses: ['delivered'] },
    };

    var TASK_LABEL = {
      task1_academic: 'T1 Academic',
      task1_general:  'T1 General',
      task2:          'T2',
    };

    // ── Helpers ───────────────────────────────────────────────────────

    function setAlert(kind, msg) {
      var area = document.getElementById('alert-area');
      var cls = kind === 'error' ? 'aw-alert--error' : kind === 'success' ? 'aw-alert--success' : 'aw-alert--warn';
      area.innerHTML = '<div class="aw-alert ' + cls + '">' + WC.escapeHtml(msg) + '</div>';
    }

    function clearAlert() {
      document.getElementById('alert-area').innerHTML = '';
    }

    function ageClass(hours) {
      if (hours < 24) return 'aw-age-cell aw-age-cell--fresh';
      if (hours < 48) return 'aw-age-cell aw-age-cell--warning';
      return 'aw-age-cell aw-age-cell--overdue';
    }

    function formatAge(hours) {
      if (hours == null || isNaN(hours)) return '—';
      if (hours < 1) return Math.round(hours * 60) + 'm';
      if (hours < 24) return hours.toFixed(0) + 'h';
      return Math.floor(hours / 24) + 'd ' + Math.floor(hours % 24) + 'h';
    }

    function formatDateTime(isoString) {
      if (!isoString) return '—';
      try {
        var d = new Date(isoString);
        var now = new Date();
        var diffH = (now - d) / (1000 * 60 * 60);
        if (diffH < 1) return Math.round(diffH * 60) + ' phút trước';
        if (diffH < 24) return Math.round(diffH) + 'h trước';
        return d.toLocaleDateString('vi-VN');
      } catch (_) { return isoString; }
    }

    // ── Render ────────────────────────────────────────────────────────

    function renderStatusPill(status) {
      var label = status || 'queued';
      return '<span class="aw-instructor-pill" data-status="' + WC.escapeHtml(label) + '">' + WC.escapeHtml(label) + '</span>';
    }

    function renderActions(item) {
      var review = item.review || {};
      var status = review.status;
      var isMine = !!_currentAdminId && review.claimed_by === _currentAdminId;
      var essayId = item.essay_id || '';
      var reviewId = review.id || '';

      if (status === 'queued') {
        return '<div class="aw-row-actions">' +
          '<button class="aw-btn-act aw-btn-act--claim" data-action="claim" data-review-id="' +
          WC.escapeHtml(reviewId) + '">Claim</button>' +
        '</div>';
      }

      if (status === 'claimed' && isMine) {
        return '<div class="aw-row-actions">' +
          '<a class="aw-btn-act aw-btn-act--edit" href="/pages/admin/writing/grade.html?essay_id=' +
          encodeURIComponent(essayId) + '">Edit</a>' +
          '<button class="aw-btn-act aw-btn-act--release" data-action="release" data-review-id="' +
          WC.escapeHtml(reviewId) + '">Release</button>' +
        '</div>';
      }

      if (status === 'claimed' && !isMine) {
        return '<span class="aw-locked-tag">🔒 Locked by another instructor</span>';
      }

      if (status === 'delivered') {
        return '<div class="aw-row-actions">' +
          '<a class="aw-btn-act aw-btn-act--view" href="/pages/admin/writing/grade.html?essay_id=' +
          encodeURIComponent(essayId) + '">View</a>' +
        '</div>';
      }

      // edited / released / unknown — no primary action; show pill only.
      return '';
    }

    function renderRow(item) {
      var review = item.review || {};
      var ageH = item.age_hours || 0;
      var taskLabel = TASK_LABEL[item.task_type] || item.task_type || '—';
      var studentEmail = item.student_email || '— unknown —';

      return '<tr data-review-id="' + WC.escapeHtml(review.id || '') + '">' +
        '<td>' + WC.escapeHtml(formatDateTime(item.submitted_at)) + '</td>' +
        '<td class="' + ageClass(ageH) + '">' + WC.escapeHtml(formatAge(ageH)) + '</td>' +
        '<td>' + WC.escapeHtml(studentEmail) + '</td>' +
        '<td>L' + WC.escapeHtml(String(item.student_level || '?')) + '</td>' +
        '<td>' + WC.escapeHtml(taskLabel) + '</td>' +
        '<td>' + renderStatusPill(review.status) + '</td>' +
        '<td>' + renderActions(item) + '</td>' +
      '</tr>';
    }

    function renderQueue(items) {
      var tbody = document.getElementById('queue-rows');
      document.getElementById('queue-count').textContent = items.length;

      if (!items.length) {
        var msg = _currentFilter === 'my_claims'
          ? 'Bạn chưa claim bài nào.'
          : _currentFilter === 'delivered'
            ? 'Chưa có bài đã deliver gần đây.'
            : 'Hàng đợi trống. 🎉';
        tbody.innerHTML = '<tr><td colspan="7" class="aw-queue-table__empty">' + WC.escapeHtml(msg) + '</td></tr>';
        return;
      }

      tbody.innerHTML = items.map(renderRow).join('');
    }

    // ── Actions ───────────────────────────────────────────────────────

    async function handleClaim(reviewId) {
      try {
        var review = await window.api.post('/admin/instructor/reviews/' + encodeURIComponent(reviewId) + '/claim', {});
        if (!review || !review.essay_id) {
          setAlert('error', 'Phản hồi server thiếu essay_id.');
          return;
        }
        // Navigate straight to the grading page for editing.
        window.location.href = '/pages/admin/writing/grade.html?essay_id=' + encodeURIComponent(review.essay_id);
      } catch (e) {
        // window.api.post throws Error with `message` from backend's
        // `detail` field. Conflict (409) text comes from the backend's
        // ConflictError message — render plainly + auto-refresh.
        var msg = (e && e.message) || 'Lỗi claim';
        if (/already claimed|cannot claim/i.test(msg)) {
          setAlert('warn', 'Bài đã được instructor khác claim. Đang refresh…');
          loadQueue();
        } else {
          setAlert('error', msg);
        }
      }
    }

    async function handleRelease(reviewId) {
      if (!confirm('Release claim? Bài sẽ trở về queue cho instructor khác.')) return;
      try {
        await window.api.post('/admin/instructor/reviews/' + encodeURIComponent(reviewId) + '/release', {});
        setAlert('success', 'Đã release. Bài về queue.');
        loadQueue();
      } catch (e) {
        setAlert('error', (e && e.message) || 'Lỗi release');
      }
    }

    // Event delegation — buttons are re-rendered every poll, so we
    // bind once on the tbody rather than per-row.
    document.addEventListener('click', function (ev) {
      var btn = ev.target.closest('button[data-action]');
      if (!btn) return;
      var action = btn.dataset.action;
      var reviewId = btn.dataset.reviewId;
      if (!reviewId) return;
      if (action === 'claim')   handleClaim(reviewId);
      if (action === 'release') handleRelease(reviewId);
    });

    // ── Loading ───────────────────────────────────────────────────────

    async function loadQueue() {
      var filter = FILTERS[_currentFilter] || FILTERS.all_active;
      var qs = filter.statuses.map(function (s) { return 'status=' + encodeURIComponent(s); }).join('&');
      if (filter.scopeToMe && _currentAdminId) {
        qs += '&instructor_id=' + encodeURIComponent(_currentAdminId);
      }

      try {
        var items = await window.api.get('/admin/instructor/queue?' + qs);
        renderQueue(items || []);
      } catch (e) {
        setAlert('error', 'Không tải được queue: ' + ((e && e.message) || ''));
      }
    }

    function setFilter(name) {
      if (!(name in FILTERS)) return;
      _currentFilter = name;
      document.querySelectorAll('.aw-filter-btn').forEach(function (btn) {
        btn.classList.toggle('aw-filter-btn--active', btn.dataset.filter === name);
      });
      clearAlert();
      loadQueue();
    }

    // Filter button wire-up.
    document.querySelectorAll('.aw-filter-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { setFilter(btn.dataset.filter); });
    });

    // ── Init ──────────────────────────────────────────────────────────

    WC.bootstrap({
      onReady: function (me) {
        _currentAdminId = me && me.id;
        loadQueue();
        // Soft-poll every 30s. Acceptable trade-off: another admin's
        // claim is up to 30s stale on this page; the 409 path on
        // claim attempt covers the race.
        _pollTimer = setInterval(loadQueue, POLL_INTERVAL_MS);
      },
    });

    // Pause polling when tab hidden — saves backend load + battery.
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
      } else if (!_pollTimer) {
        loadQueue();
        _pollTimer = setInterval(loadQueue, POLL_INTERVAL_MS);
      }
    });
  </script>

  <!-- Lucide hydration + theme toggle binding (Sprint 6.14c) -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      function bindToggleButton() {
        var btn = document.querySelector('.av-theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('av-theme', next); } catch (e) {}
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          hydrateIcons(); bindToggleButton();
        });
      } else {
        hydrateIcons(); bindToggleButton();
      }
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
