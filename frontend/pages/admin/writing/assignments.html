<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Bài giao — Writing Coach Admin</title>

  <!-- Sprint 6.14b: canonical anti-flash bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/admin-writing.css" />

  <script src="https://unpkg.com/lucide@1.17.0" defer></script>
</head>
<body class="av-page font-sans antialiased min-h-screen">
  <aver-admin-chrome active="writing" subsection="assignments">
  <div class="max-w-5xl mx-auto px-4 py-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <span class="aw-brand text-xl font-bold">Aver<span class="aw-brand__accent">Learning</span></span>
        <span class="aw-subtitle text-sm hidden md:inline">— Bài giao</span>
      </div>
      <div class="flex items-center gap-3">
        <a href="/admin.html" class="aw-back-link text-sm">← Admin home</a>
        <button class="av-theme-toggle" type="button" aria-label="Chuyển giao diện sáng/tối">
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <h1 class="aw-h1 text-2xl font-semibold mb-1 flex items-center gap-2">
      <span aria-hidden="true">📋</span> Bài giao
    </h1>
    <p class="aw-subtitle text-sm mb-6">Giao đề bài từ thư viện cho học viên.</p>

    <!-- Filter bar -->
    <div class="flex flex-wrap gap-3 mb-4 items-center">
      <select id="filter-status" class="aw-input" style="width: auto; min-width: 200px;">
        <option value="">Tất cả trạng thái</option>
        <option value="pending">⏳ Chờ làm</option>
        <option value="in_progress">📝 Đang làm</option>
        <option value="submitted">📥 Đã nộp</option>
        <option value="graded">✓ Đã chấm</option>
        <option value="delivered">📨 Đã trả</option>
      </select>
      <!-- Sprint 19.2 — cohort filter (derived via students.cohort_id). -->
      <select id="filter-cohort" class="aw-input" style="width: auto; min-width: 180px;">
        <option value="">Tất cả lớp</option>
      </select>
      <button id="btn-create" type="button" class="aw-btn-primary ml-auto">+ Giao bài mới</button>
    </div>

    <!-- States -->
    <div id="state-loading" class="aw-state-loading text-center py-10">Đang tải…</div>
    <div id="state-error"   class="aw-state-error hidden text-sm"></div>
    <div id="state-empty"   class="aw-state-empty hidden text-center py-10">Chưa có bài giao nào.</div>

    <div id="assignments-list" class="space-y-3 hidden"></div>
  </div>

  <!-- Create assignment modal -->
  <div id="modal" class="aw-modal-bg hidden fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="aw-modal-panel max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 class="aw-modal-title text-lg font-semibold">Giao bài mới</h2>
        <button id="btn-close-modal" type="button" class="aw-modal-close text-2xl leading-none" aria-label="Close">&times;</button>
      </div>

      <div class="space-y-4">
        <!-- Sprint 19.2 — assign target mode: per-student vs whole cohort -->
        <div class="aw-assign-mode" role="tablist" aria-label="Chế độ giao bài">
          <button type="button" class="aw-assign-mode__btn is-active" data-assign-mode="individual">👤 Cá nhân</button>
          <button type="button" class="aw-assign-mode__btn" data-assign-mode="cohort">🏫 Theo lớp</button>
        </div>

        <!-- Step 1 — pick prompt -->
        <div>
          <label class="aw-modal-step-label">
            Bước 1 — Chọn đề từ thư viện
          </label>
          <select id="form-prompt" class="aw-input">
            <option value="">— Chọn đề bài —</option>
          </select>
          <div id="prompt-preview" class="aw-prompt-preview hidden mt-2 p-3 text-sm"></div>
        </div>

        <!-- Step 2a — pick students (individual mode) -->
        <div id="step-students">
          <label class="aw-modal-step-label">
            Bước 2 — Chọn học viên
            <span id="selected-count" class="aw-modal-step-label__count">(0 chọn)</span>
          </label>
          <div class="flex items-center gap-2 mb-2">
            <input id="student-search" type="text" placeholder="Tìm theo tên hoặc mã học viên…" class="aw-input" style="flex:1" />
            <button id="btn-select-all" type="button" class="aw-btn-secondary">Chọn tất cả</button>
            <button id="btn-clear-all"  type="button" class="aw-btn-secondary">Bỏ chọn</button>
          </div>
          <div id="students-list" class="aw-student-picker max-h-56 overflow-y-auto p-2">
            <p id="students-empty" class="aw-student-picker__empty hidden text-xs p-2">Không có học viên trùng bộ lọc.</p>
          </div>
        </div>

        <!-- Step 2b — pick cohort (cohort mode, Sprint 19.2 fan-out) -->
        <div id="step-cohort" class="hidden">
          <label class="aw-modal-step-label">Bước 2 — Chọn lớp</label>
          <select id="form-cohort" class="aw-input">
            <option value="">— Chọn lớp —</option>
          </select>
          <p class="aw-help-text text-xs mt-1">Hệ thống tạo 1 bài cho mỗi học viên trong lớp; bỏ qua học viên đã có đề này.</p>
        </div>

        <!-- Step 3 — optional fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="aw-modal-step-label">Hạn nộp (tùy chọn)</label>
            <input id="form-deadline" type="datetime-local" class="aw-input" />
          </div>
          <div>
            <label class="aw-modal-step-label">Ghi chú cho học viên (tùy chọn)</label>
            <textarea id="form-instructions" class="aw-input" placeholder="VD: Tập trung vào câu phức + linking words."></textarea>
          </div>
        </div>

        <!-- Step 4 — IELTS-mode timer (Phase 2.3c-3) -->
        <div class="aw-modal-step-divider">
          <label class="flex items-center gap-2 cursor-pointer">
            <input id="form-is-timed" type="checkbox" class="cursor-pointer" />
            <span class="text-sm font-medium">⏱️ IELTS-mode (đếm ngược + tự nộp)</span>
          </label>
          <div id="timer-fields" class="hidden mt-2 ml-6">
            <label class="aw-modal-step-label">Thời gian (phút)</label>
            <input id="form-time-limit" type="number" min="1" max="180" placeholder="VD: 40" class="aw-input" style="width: 8rem" />
            <p class="aw-help-text text-xs mt-1">Task 1: 20 phút · Task 2: 40 phút (chuẩn IELTS).</p>
          </div>
        </div>
      </div>

      <div id="modal-error" class="aw-upload-error hidden mt-3 text-sm"></div>

      <div class="flex justify-end gap-2 mt-6">
        <button id="btn-cancel" type="button" class="aw-btn-secondary">Hủy</button>
        <button id="btn-save"   type="button" class="aw-btn-primary">Giao bài</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <!-- Absolute path: under the Vercel rewrite `/admin/writing/assignments`
       (3 path segments), `../js/api.js` would resolve to `/admin/js/api.js`
       and 404 — same class of bug fixed in Sprint 2.3a-1.1 for the
       prompts page. `/js/api.js` is rewrite-agnostic. -->
  <script src="/js/api.js"></script>
  <script>
    'use strict';

    var SUPABASE_URL  = 'https://nqhrtqspznepmveyurzm.supabase.co';
    var SUPABASE_ANON = 'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4';
    initSupabase(SUPABASE_URL, SUPABASE_ANON);

    var STATUS_LABELS = {
      pending:     '⏳ Chờ làm',
      in_progress: '📝 Đang làm',
      submitted:   '📥 Đã nộp',
      graded:      '✓ Đã chấm',
      delivered:   '📨 Đã trả',
    };
    var TASK_LABELS = {
      task2:          'Task 2',
      task1_academic: 'Task 1 Academic',
      task1_general:  'Task 1 General',
    };

    var _allPrompts          = [];
    var _allStudents         = [];
    var _selectedStudentIds  = new Set();
    // Sprint 19.2 — cohort fan-out state.
    var _allCohorts          = [];
    var _assignMode          = 'individual';   // 'individual' | 'cohort'

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
      });
    }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function formatDate(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleDateString('vi-VN', {
          day: '2-digit', month: '2-digit', year: 'numeric',
        });
      } catch (_) { return '—'; }
    }

    // ── Cohorts (Sprint 19.2) — filter dropdown + fan-out picker ───
    async function loadCohorts() {
      try {
        var data = await window.api.get('/admin/writing/cohorts');
        _allCohorts = (data && data.cohorts) || [];
      } catch (err) {
        _allCohorts = [];   // soft-fail: cohort features degrade, page still works
        return;
      }
      var opts = _allCohorts.map(function (c) {
        return '<option value="' + escapeHtml(c.id) + '">' + escapeHtml(c.name || '(Lớp)') + '</option>';
      }).join('');
      document.getElementById('filter-cohort').innerHTML = '<option value="">Tất cả lớp</option>' + opts;
      document.getElementById('form-cohort').innerHTML   = '<option value="">— Chọn lớp —</option>' + opts;
    }

    // ── List view ─────────────────────────────────────────────────
    async function loadAssignments() {
      hide('state-error');
      hide('state-empty');
      hide('assignments-list');
      show('state-loading');

      var statusFilter = document.getElementById('filter-status').value;
      var cohortFilter = document.getElementById('filter-cohort').value;
      var params = new URLSearchParams();
      if (statusFilter) params.set('status_filter', statusFilter);
      if (cohortFilter) params.set('cohort_id', cohortFilter);

      try {
        var data = await window.api.get('/admin/writing/assignments?' + params.toString());
        renderAssignments((data && data.assignments) || []);
      } catch (err) {
        hide('state-loading');
        var box = document.getElementById('state-error');
        box.textContent = 'Lỗi tải bài giao: ' + (err.message || 'không xác định');
        show('state-error');
      }
    }

    function renderAssignments(rows) {
      hide('state-loading');
      var list = document.getElementById('assignments-list');

      if (rows.length === 0) {
        list.innerHTML = '';
        show('state-empty');
        return;
      }

      list.innerHTML = rows.map(function (a) {
        var prompt   = a.writing_prompts || {};
        var student  = a.students        || {};
        var statusKey = a.status || 'pending';

        var studentLabel = student.full_name || student.student_code || '—';
        var taskLabel    = TASK_LABELS[prompt.task_type] || prompt.task_type || '—';

        var timerPill = a.is_timed && a.time_limit_minutes
          ? '<span class="aw-assign-pill aw-assign-pill--timed">⏱️ ' + a.time_limit_minutes + ' phút</span>'
          : '';
        var autoSubmittedHint = a.auto_submitted
          ? '<span class="aw-assign-auto-submitted text-xs">⚠ Nộp tự động (hết giờ)</span>'
          : '';

        return ''
          + '<div class="aw-card p-4">'
          +   '<div class="flex items-start justify-between gap-3 mb-2">'
          +     '<div class="min-w-0">'
          +       '<h3 class="aw-prompt-row__title font-semibold text-base truncate">' + escapeHtml(prompt.title || '(Đề bài đã xóa)') + '</h3>'
          +       '<p class="aw-assign-meta text-xs mt-1">→ ' + escapeHtml(studentLabel) + '</p>'
          +     '</div>'
          +     '<div class="flex flex-col items-end gap-1 flex-shrink-0">'
          +       '<span class="aw-assign-pill" data-status="' + escapeHtml(statusKey) + '">' + escapeHtml(STATUS_LABELS[statusKey] || statusKey) + '</span>'
          +       '<span class="aw-assign-pill aw-assign-pill--task">' + escapeHtml(taskLabel) + '</span>'
          +       timerPill
          +     '</div>'
          +   '</div>'
          +   (autoSubmittedHint ? '<div class="mb-2">' + autoSubmittedHint + '</div>' : '')
          +   '<div class="aw-assign-meta flex items-center justify-between flex-wrap gap-2 text-xs">'
          +     '<span>Giao: ' + formatDate(a.created_at) + '</span>'
          +     (a.deadline     ? '<span>Hạn: '       + formatDate(a.deadline)     + '</span>' : '')
          +     (a.submitted_at ? '<span>Nộp: '       + formatDate(a.submitted_at) + '</span>' : '')
          +     (a.delivered_at ? '<span class="aw-assign-meta__delivered">Trả: ' + formatDate(a.delivered_at) + '</span>' : '')
          +   '</div>'
          + '</div>';
      }).join('');

      show('assignments-list');
    }

    // ── Modal: data load ──────────────────────────────────────────
    async function loadModalData() {
      try {
        // Note: GET /admin/students returns an array directly (not
        // {students:[...]}) — see services/student_service.list_students.
        // Pass limit=200 so the picker doesn't silently drop students
        // beyond the default 50.
        var results = await Promise.all([
          window.api.get('/admin/writing/prompts'),
          window.api.get('/admin/students?limit=200'),
        ]);
        var promptsResp  = results[0];
        var studentsResp = results[1];

        _allPrompts  = (promptsResp && promptsResp.prompts) || [];
        _allStudents = Array.isArray(studentsResp) ? studentsResp : [];

        renderPromptOptions();
        renderStudentList('');
      } catch (err) {
        showModalError('Lỗi tải dữ liệu: ' + (err.message || 'không xác định'));
      }
    }

    function renderPromptOptions() {
      var sel = document.getElementById('form-prompt');
      var html = '<option value="">— Chọn đề bài —</option>'
        + _allPrompts.map(function (p) {
            var label = '[' + (TASK_LABELS[p.task_type] || p.task_type) + '] ' + (p.title || '');
            return '<option value="' + escapeHtml(p.id) + '">' + escapeHtml(label) + '</option>';
          }).join('');
      sel.innerHTML = html;
    }

    function renderStudentList(filter) {
      var box = document.getElementById('students-list');
      var empty = document.getElementById('students-empty');
      var f = (filter || '').toLowerCase();

      var filtered = _allStudents.filter(function (s) {
        if (!f) return true;
        var name = (s.full_name    || '').toLowerCase();
        var code = (s.student_code || '').toLowerCase();
        return name.indexOf(f) !== -1 || code.indexOf(f) !== -1;
      });

      if (filtered.length === 0) {
        box.innerHTML = '';
        box.appendChild(empty);
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      box.innerHTML = filtered.map(function (s) {
        var checked = _selectedStudentIds.has(s.id) ? 'checked' : '';
        var label = s.full_name || s.student_code || '(Chưa đặt tên)';
        return ''
          + '<label class="aw-student-row flex items-center gap-2">'
          +   '<input type="checkbox" class="aw-student-row__checkbox" data-student-id="' + escapeHtml(s.id) + '" ' + checked + '>'
          +   '<span class="aw-student-row__name">' + escapeHtml(label) + '</span>'
          +   '<span class="aw-student-row__code">' + escapeHtml(s.student_code || '') + '</span>'
          + '</label>';
      }).join('');

      // Wire checkbox state into the selection set.
      box.querySelectorAll('input[type="checkbox"][data-student-id]').forEach(function (cb) {
        cb.addEventListener('change', function () {
          var id = cb.getAttribute('data-student-id');
          if (cb.checked) _selectedStudentIds.add(id);
          else            _selectedStudentIds.delete(id);
          updateSelectedCount();
        });
      });
    }

    function updateSelectedCount() {
      document.getElementById('selected-count').textContent =
        '(' + _selectedStudentIds.size + ' chọn)';
    }

    // ── Modal: open / close / save ────────────────────────────────
    function openCreateModal() {
      _selectedStudentIds.clear();
      document.getElementById('form-prompt').value       = '';
      document.getElementById('form-instructions').value = '';
      document.getElementById('form-deadline').value     = '';
      document.getElementById('student-search').value    = '';
      // Phase 2.3c-3 — reset timer toggle + minutes input.
      document.getElementById('form-is-timed').checked   = false;
      document.getElementById('form-time-limit').value   = '';
      document.getElementById('timer-fields').classList.add('hidden');
      document.getElementById('form-cohort').value = '';
      setAssignMode('individual');   // Sprint 19.2 — default to per-student
      hide('prompt-preview');
      hide('modal-error');
      updateSelectedCount();
      show('modal');
      loadModalData();
    }

    function closeModal() { hide('modal'); }

    function showModalError(msg) {
      var box = document.getElementById('modal-error');
      box.textContent = msg;
      show('modal-error');
    }

    async function saveAssignment() {
      hide('modal-error');

      var promptId    = document.getElementById('form-prompt').value;
      var deadlineRaw = document.getElementById('form-deadline').value;
      var instructions = document.getElementById('form-instructions').value.trim();
      var isTimed     = document.getElementById('form-is-timed').checked;
      var timeLimitRaw = document.getElementById('form-time-limit').value;

      if (!promptId) {
        showModalError('Vui lòng chọn đề bài.');
        return;
      }

      // Timer pair validation — mirrors the server `model_validator`.
      // Catching it here saves an HTTP round-trip and the modal-level
      // error renders inline rather than as a generic 422 alert.
      var timeLimit = null;
      if (isTimed) {
        timeLimit = parseInt(timeLimitRaw, 10);
        if (!Number.isInteger(timeLimit) || timeLimit < 1 || timeLimit > 180) {
          showModalError('Vui lòng nhập thời gian (1-180 phút).');
          return;
        }
      }

      var deadlineIso = deadlineRaw ? new Date(deadlineRaw).toISOString() : null;

      // ── Sprint 19.2 — cohort fan-out branch ──
      if (_assignMode === 'cohort') {
        var cohortId = document.getElementById('form-cohort').value;
        if (!cohortId) { showModalError('Vui lòng chọn lớp.'); return; }
        var cohort = _allCohorts.find(function (c) { return c.id === cohortId; });
        var cname = cohort ? cohort.name : 'lớp';
        var ccount = cohort ? (cohort.student_count || 0) : 0;
        if (!confirm('Sắp giao đề này cho ' + ccount + ' học viên trong lớp "' + cname + '". Tiếp tục?')) return;
        try {
          var fr = await window.api.post('/admin/writing/assignments/fan-out', {
            prompt_id:          promptId,
            cohort_id:          cohortId,
            deadline:           deadlineIso,
            instructions:       instructions || null,
            is_timed:           isTimed,
            time_limit_minutes: timeLimit,
          });
          var fmsg = '✓ Đã giao bài cho ' + (fr.created_count || 0) + ' học viên trong lớp "' + cname + '".';
          if (fr.skipped_count) fmsg += '\n\n(' + fr.skipped_count + ' học viên đã có đề này — bỏ qua.)';
          alert(fmsg);
          closeModal();
          await loadAssignments();
        } catch (err) {
          showModalError('Lỗi giao bài theo lớp: ' + (err.message || 'không xác định'));
        }
        return;
      }

      // ── Individual mode (existing per-student flow) ──
      if (_selectedStudentIds.size === 0) {
        showModalError('Vui lòng chọn ít nhất 1 học viên.');
        return;
      }
      var payload = {
        prompt_id:          promptId,
        student_ids:        Array.from(_selectedStudentIds),
        deadline:           deadlineIso,
        instructions:       instructions || null,
        is_timed:           isTimed,
        time_limit_minutes: timeLimit,
      };

      try {
        var result = await window.api.post('/admin/writing/assignments', payload);
        var msg = '✓ Đã giao bài cho ' + (result.count || 0) + ' học viên.';
        if (result.duplicates_warning && result.duplicates_warning.length > 0) {
          msg += '\n\n⚠ ' + result.duplicates_warning.length
            + ' học viên đã từng được giao đề này (vẫn tạo assignment mới).';
        }
        alert(msg);
        closeModal();
        await loadAssignments();
      } catch (err) {
        showModalError('Lỗi giao bài: ' + (err.message || 'không xác định'));
      }
    }

    // Sprint 19.2 — toggle assign target mode (individual ↔ cohort).
    function setAssignMode(mode) {
      _assignMode = mode;
      document.querySelectorAll('[data-assign-mode]').forEach(function (b) {
        b.classList.toggle('is-active', b.getAttribute('data-assign-mode') === mode);
      });
      document.getElementById('step-students').classList.toggle('hidden', mode !== 'individual');
      document.getElementById('step-cohort').classList.toggle('hidden', mode !== 'cohort');
    }

    // ── Wire up ───────────────────────────────────────────────────
    document.getElementById('btn-create').addEventListener('click', openCreateModal);
    document.getElementById('btn-save').addEventListener('click', saveAssignment);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('filter-status').addEventListener('change', loadAssignments);
    document.getElementById('filter-cohort').addEventListener('change', loadAssignments);

    // Sprint 19.2 — assign-mode toggle.
    document.querySelectorAll('[data-assign-mode]').forEach(function (btn) {
      btn.addEventListener('click', function () { setAssignMode(btn.getAttribute('data-assign-mode')); });
    });

    // Phase 2.3c-3 — toggle the time-limit field's visibility based on
    // the IELTS-mode checkbox.
    document.getElementById('form-is-timed').addEventListener('change', function (e) {
      var fields = document.getElementById('timer-fields');
      if (e.target.checked) fields.classList.remove('hidden');
      else                  fields.classList.add('hidden');
    });

    document.getElementById('student-search').addEventListener('input', function (e) {
      renderStudentList(e.target.value);
    });
    document.getElementById('btn-select-all').addEventListener('click', function () {
      // Select all VISIBLE rows (so the search filter is respected).
      document.querySelectorAll('#students-list input[type="checkbox"][data-student-id]').forEach(function (cb) {
        cb.checked = true;
        _selectedStudentIds.add(cb.getAttribute('data-student-id'));
      });
      updateSelectedCount();
    });
    document.getElementById('btn-clear-all').addEventListener('click', function () {
      _selectedStudentIds.clear();
      renderStudentList(document.getElementById('student-search').value);
      updateSelectedCount();
    });
    document.getElementById('form-prompt').addEventListener('change', function (e) {
      var p = _allPrompts.find(function (x) { return x.id === e.target.value; });
      var box = document.getElementById('prompt-preview');
      if (p) {
        box.textContent = p.prompt_text || '';
        show('prompt-preview');
      } else {
        hide('prompt-preview');
      }
    });

    loadCohorts();        // Sprint 19.2 — populate cohort filter + fan-out picker
    loadAssignments();
  </script>

  <!-- Lucide hydration + theme toggle binding (Sprint 6.14b) -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      function bindToggleButton() {
        var btn = document.querySelector('.av-theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('av-theme', next); } catch (e) {}
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          hydrateIcons(); bindToggleButton();
        });
      } else {
        hydrateIcons(); bindToggleButton();
      }
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
