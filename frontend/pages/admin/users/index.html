<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Tất cả người dùng · Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); margin: 0; }
    .placeholder-shell {
      max-width: 760px; margin: 0 auto;
      padding: var(--av-space-2) var(--av-space-2) var(--av-space-8);
      display: flex; flex-direction: column; gap: var(--av-space-6);
    }
    .placeholder-header h1 {
      font-size: var(--av-fs-2xl); margin-bottom: var(--av-space-2);
    }
    .placeholder-header .subtitle {
      color: var(--av-text-secondary);
      font-size: var(--av-fs-base);
      line-height: var(--av-lh-normal);
    }
    .placeholder-banner {
      padding: var(--av-space-4) var(--av-space-6);
      background: var(--av-surface-sunken);
      border: 1px dashed var(--av-border-default);
      border-radius: var(--av-radius-md);
      color: var(--av-text-secondary);
      line-height: var(--av-lh-relaxed);
    }
    .placeholder-banner strong { color: var(--av-text-primary); }
    .placeholder-banner code {
      font-family: var(--av-font-mono);
      font-size: var(--av-fs-sm);
      padding: 1px 5px;
      background: var(--av-surface-card);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-sm);
    }
    .placeholder-cta {
      display: inline-flex;
      align-items: center;
      gap: var(--av-space-2);
      padding: var(--av-space-2) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: var(--av-brand-teal-700);
      color: var(--av-text-on-primary);
      text-decoration: none;
      font-weight: var(--av-fw-semibold);
      font-size: var(--av-fs-sm);
    }
  </style>
</head>
<body class="av-page">
  <aver-admin-chrome active="users">

    <div class="placeholder-shell">
      <header class="placeholder-header">
        <h1>Tất cả người dùng</h1>
        <p class="subtitle">Auth users + role assignment + filter theo role.</p>
      </header>

      <div class="placeholder-banner">
        <p><strong>Sắp ra mắt.</strong> Sprint 12.8 sẽ extract Users mgmt ra khỏi <code>admin.html</code>.</p>
        <p>Trong khi chờ, sử dụng <a href="/admin.html"><code>/admin.html</code></a> hoặc các trang đã ship khác qua sidebar bên trái.</p>
      </div>

      <a class="placeholder-cta" href="/pages/admin/index.html">← Quay lại Tổng quan</a>
    </div>

  </aver-admin-chrome>
  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
</body>
</html>
