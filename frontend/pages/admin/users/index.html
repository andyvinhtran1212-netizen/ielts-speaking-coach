<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Tất cả người dùng · Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); margin: 0; }
    .usr-shell {
      max-width: 1280px; margin: 0 auto;
      padding: var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-4);
    }
    .usr-header h1 { font-size: var(--av-fs-2xl); font-weight: var(--av-fw-semibold); margin: 0 0 var(--av-space-1); }
    .usr-header .subtitle { color: var(--av-text-secondary); font-size: var(--av-fs-sm); }

    .usr-filter-bar {
      display: flex; gap: var(--av-space-3); flex-wrap: wrap;
      align-items: flex-end;
      padding: var(--av-space-4);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
    }
    .usr-filter { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
    .usr-filter label {
      font-size: var(--av-fs-xs); color: var(--av-text-muted);
      text-transform: uppercase; letter-spacing: var(--av-tracking-wide);
    }
    .usr-filter input, .usr-filter select {
      padding: 8px 12px;
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-page, var(--av-surface-card));
      color: var(--av-text-primary);
      font-size: var(--av-fs-sm);
      font-family: inherit;
    }
    .btn-secondary { padding: 8px 14px; border-radius: var(--av-radius-md); background: transparent; color: var(--av-text-secondary); border: 1px solid var(--av-border-default); cursor: pointer; font-size: var(--av-fs-sm); }

    .usr-table-wrap {
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      overflow-x: auto;
    }
    table.usr-table { width: 100%; border-collapse: collapse; }
    table.usr-table th, table.usr-table td {
      padding: var(--av-space-3) var(--av-space-4);
      text-align: left;
      font-size: var(--av-fs-sm);
      border-bottom: 1px solid var(--av-border-default);
      vertical-align: top;
    }
    table.usr-table th {
      font-weight: var(--av-fw-semibold);
      color: var(--av-text-secondary);
      background: var(--av-surface-sunken);
      font-size: var(--av-fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--av-tracking-wide);
    }
    .usr-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--av-radius-pill);
      font-size: var(--av-fs-xs);
      background: var(--av-surface-sunken);
      color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default);
    }
    .usr-chip.is-admin      { background: var(--av-brand-teal-50); color: var(--av-brand-teal-800); border-color: var(--av-brand-teal-200); }
    .usr-chip.is-instructor { background: #EEF2FF; color: #3730A3; border-color: #C7D2FE; }
    .usr-chip.is-inactive   { background: #FEE2E2; color: #991B1B; border-color: #FECACA; }
    .usr-mono { font-family: var(--av-font-mono); font-size: var(--av-fs-xs); color: var(--av-text-muted); }

    .usr-role-select {
      padding: 4px 8px;
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-sm);
      background: var(--av-surface-card);
      color: var(--av-text-primary);
      font-size: var(--av-fs-xs);
      font-family: inherit;
    }

    .usr-banner {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      font-size: var(--av-fs-sm);
    }
    .usr-banner.is-success { background: #ECFDF5; color: var(--av-brand-teal-800); border: 1px solid var(--av-brand-teal-200); }
    .usr-banner.is-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }

    .usr-loading, .usr-empty {
      padding: var(--av-space-6); text-align: center;
      color: var(--av-text-muted); font-size: var(--av-fs-sm);
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body class="av-page">
  <aver-admin-chrome active="users">

    <main class="usr-shell">
      <header class="usr-header">
        <h1>Tất cả người dùng</h1>
        <p class="subtitle">
          Auth users + role assignment. Self-demotion bị chặn để tránh
          tự khoá khỏi admin panel.
        </p>
      </header>

      <div class="usr-banner" id="status-banner" hidden></div>

      <section class="usr-filter-bar" aria-label="Bộ lọc">
        <div class="usr-filter">
          <label for="usr-role">Role</label>
          <select id="usr-role">
            <option value="">Tất cả</option>
            <option value="admin">Admin</option>
            <option value="instructor">Instructor</option>
            <option value="student">Student</option>
          </select>
        </div>
        <div class="usr-filter" style="flex: 1; min-width: 240px;">
          <label for="usr-search">Tìm theo email hoặc display name</label>
          <input id="usr-search" type="text" placeholder="Tìm…" />
        </div>
        <button class="btn-secondary" id="btn-reset" type="button">Reset</button>
      </section>

      <div class="usr-loading" id="usr-loading">Đang tải…</div>
      <div class="usr-empty"   id="usr-empty"   hidden>Không có user nào khớp bộ lọc.</div>

      <div class="usr-table-wrap" id="usr-table-wrap" hidden>
        <table class="usr-table">
          <thead>
            <tr>
              <th>Display name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Sessions hôm nay</th>
              <th>Active</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="usr-tbody"></tbody>
        </table>
      </div>
    </main>

  </aver-admin-chrome>

  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
  <script src="/js/error-reporter.js"></script>
  <script type="module" src="/js/admin-users.js"></script>
</body>
</html>
