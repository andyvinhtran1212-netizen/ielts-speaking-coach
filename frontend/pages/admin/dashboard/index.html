<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Dashboard — Đang chuyển hướng</title>

  <!-- dashboard-consolidation — the ops Dashboard (6-metric overview + trends
       + "Cần chú ý") was merged INTO Tổng quan at /pages/admin/index.html as
       the "Vận hành" tab. This page is now a pure redirect; vercel.json also
       301s the path server-side. Anti-flash IIFE kept so the redirect never
       flashes the wrong theme and old bookmarks land cleanly. -->

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta http-equiv="refresh" content="0; url=/pages/admin/index.html" />
  <link rel="canonical" href="/pages/admin/index.html" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />

  <style>
    body.av-page {
      font-family: var(--av-font-sans);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; color: var(--av-text-secondary);
    }
    .redirect-note { font-size: var(--av-fs-sm); }
    .redirect-note a { color: var(--av-brand-teal-700); }
  </style>
</head>
<body class="av-page">
  <p class="redirect-note">
    Dashboard đã gộp vào Tổng quan.
    <a href="/pages/admin/index.html">Mở Tổng quan →</a>
  </p>
  <script>window.location.replace('/pages/admin/index.html');</script>
</body>
</html>
