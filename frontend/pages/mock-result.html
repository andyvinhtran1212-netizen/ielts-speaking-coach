<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Kết quả thi thử — Aver Learning</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/tailwind.build.css" />
  <style>
    .trf-wrap { max-width:var(--av-width-read,760px); margin:0 auto; padding:var(--av-space-8) var(--av-space-4) var(--av-space-16); }
    .trf-state { padding:var(--av-space-16) 0; text-align:center; }
    .trf-state h1 { font-size:var(--av-fs-xl,22px); font-weight:700; color:var(--av-text-primary); margin-bottom:var(--av-space-2); }
    .trf-state p { color:var(--av-text-secondary); max-width:460px; margin:0 auto; line-height:1.6; }
    .trf-state--error { color:var(--av-error); }
    .trf-header { margin-bottom:var(--av-space-6); }
    .trf-h1 { font-size:var(--av-fs-2xl,24px); font-weight:800; color:var(--av-text-primary); line-height:var(--av-lh-snug,1.4); }
    .trf-released { color:var(--av-text-secondary); font-size:13px; margin-top:var(--av-space-1); }
    .trf-band-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:var(--av-space-3); }
    .trf-band { background:var(--av-surface-card); border:1px solid var(--av-border-subtle); border-radius:var(--av-radius-lg); padding:var(--av-space-4); text-align:center; box-shadow:var(--av-shadow-sm); }
    .trf-band-label { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--av-text-secondary); }
    .trf-band-val { font-size:32px; font-weight:800; color:var(--av-text-primary); font-family:var(--av-font-mono); font-variant-numeric:tabular-nums; }
    .trf-overall { background:var(--av-primary); border-color:transparent; }
    .trf-overall .trf-band-label, .trf-overall .trf-band-val { color:var(--av-text-on-primary); }
    .trf-section { margin-top:var(--av-space-6); }
    .trf-h2 { font-size:15px; font-weight:700; color:var(--av-text-primary); margin-bottom:var(--av-space-2); }
    .trf-box { background:var(--av-surface-card); border:1px solid var(--av-border-subtle); border-radius:var(--av-radius-lg); padding:var(--av-space-4); line-height:1.7; color:var(--av-text-primary); white-space:pre-wrap; box-shadow:var(--av-shadow-sm); }
    .trf-links { display:flex; gap:var(--av-space-2); flex-wrap:wrap; }
    .trf-note { background:var(--av-surface-card); border:1px solid var(--av-border-subtle); border-radius:var(--av-radius-md); padding:var(--av-space-3); margin-bottom:var(--av-space-2); }
    .trf-note__skill { font-weight:600; text-transform:capitalize; color:var(--av-text-primary); font-size:13px; }
    .trf-note__body { color:var(--av-text-secondary); line-height:1.6; white-space:pre-wrap; margin-top:var(--av-space-1); }
    .trf-foot { margin-top:var(--av-space-8); font-size:12px; color:var(--av-text-secondary); line-height:1.6; }
  </style>
</head>
<body class="av-page font-sans min-h-screen">
  <div class="trf-wrap">
    <div id="state-loading" class="trf-state" style="color:var(--av-text-secondary)">Đang tải kết quả…</div>

    <div id="state-pending" class="hidden trf-state">
      <h1>Đang chờ giám khảo duyệt</h1>
      <p>
        Bài của bạn đã được ghi nhận. Giám khảo sẽ chấm và công bố kết quả trong thời gian cam kết.
        Bạn sẽ thấy điểm tại đây khi có kết quả.
      </p>
    </div>

    <div id="state-error" class="hidden trf-state trf-state--error"></div>

    <div id="state-content" class="hidden">
      <header class="trf-header">
        <h1 class="trf-h1">Phiếu điểm thi thử (TRF)</h1>
        <p id="released-at" class="trf-released"></p>
      </header>

      <section class="trf-band-grid" id="bands"></section>

      <section id="comment-wrap" class="trf-section">
        <h2 class="trf-h2">Nhận xét của giám khảo</h2>
        <div id="examiner-comment" class="trf-box"></div>
      </section>

      <section id="notes-wrap" class="trf-section"></section>

      <section id="chuabai-wrap" class="trf-section"></section>

      <p class="trf-foot">
        Kết quả do giám khảo duyệt, có tham khảo phân tích AI.
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.107.0"></script>
  <script src="/js/api.js"></script>
  <script>
  (function () {
    'use strict';
    initSupabase('https://huwsmtubwulikhlmcirx.supabase.co', 'sb_publishable_hvevBST9lgIWRd5ITHtUpA_SYjiX6Ao');

    var SKILLS = [
      { key: 'listening', label: 'Listening' },
      { key: 'reading', label: 'Reading' },
      { key: 'writing', label: 'Writing' },
      { key: 'speaking', label: 'Speaking' },
    ];

    function showState(name) {
      ['loading', 'pending', 'error', 'content'].forEach(function (s) {
        var el = document.getElementById('state-' + s);
        if (el) el.classList.toggle('hidden', s !== name);
      });
    }
    function esc(s) { return (window.WC && window.WC.escapeHtml) ? window.WC.escapeHtml(s) : String(s == null ? '' : s); }

    function fmtBand(v) { return (v == null || v === '') ? '—' : Number(v).toFixed(1); }

    function render(data) {
      var fb = data.final_bands || {};
      var grid = document.getElementById('bands');
      grid.innerHTML = '';
      SKILLS.forEach(function (s) {
        var el = document.createElement('div');
        el.className = 'trf-band';
        el.innerHTML = '<div class="trf-band-label">' + s.label + '</div><div class="trf-band-val">' + fmtBand(fb[s.key]) + '</div>';
        grid.appendChild(el);
      });
      var overall = document.createElement('div');
      overall.className = 'trf-band trf-overall';
      overall.innerHTML = '<div class="trf-band-label">Overall</div><div class="trf-band-val">' + fmtBand(fb.overall) + '</div>';
      grid.appendChild(overall);

      var comment = data.examiner_comment_vi;
      if (comment) { document.getElementById('examiner-comment').textContent = comment; }
      else { document.getElementById('comment-wrap').style.display = 'none'; }

      var notes = data.per_skill_notes || {};
      var nwrap = document.getElementById('notes-wrap');
      var keys = Object.keys(notes).filter(function (k) { return notes[k]; });
      if (keys.length) {
        nwrap.innerHTML = '<h2 class="trf-h2">Ghi chú từng kỹ năng</h2>';
        keys.forEach(function (k) {
          var row = document.createElement('div');
          row.className = 'trf-note';
          row.innerHTML = '<div class="trf-note__skill">' + esc(k) + '</div><div class="trf-note__body">' + esc(notes[k]) + '</div>';
          nwrap.appendChild(row);
        });
      }

      if (data.released_at) {
        document.getElementById('released-at').textContent = 'Công bố lúc ' + new Date(data.released_at).toLocaleString('vi-VN');
      }

      // "Xem chữa bài" — only reachable once released (this page itself is
      // gated on that), links into the same detailed per-question review the
      // student would've seen right after finishing the section.
      var CHUABAI = [
        { key: 'listening', label: 'Listening', attempt: data.listening_attempt_id, href: '/pages/listening-review.html?attempt_id=' },
        { key: 'reading',   label: 'Reading',   attempt: data.reading_attempt_id,   href: '/pages/reading-review.html?attempt_id=' },
      ].filter(function (s) { return s.attempt; });
      // Writing detailed feedback (nhận xét chi tiết) — separate from L/R chữa
      // bài; the essays are delivered as part of release, so writing-result.html
      // (gated on status=='delivered') opens for the student.
      var WRITING = [
        { label: 'Task 1', id: data.essay_task1_id },
        { label: 'Task 2', id: data.essay_task2_id },
      ].filter(function (s) { return s.id; });

      var cwrap = document.getElementById('chuabai-wrap');
      var sections = '';
      if (CHUABAI.length) {
        sections += '<h2 class="trf-h2">Xem chữa bài</h2>' +
          '<div class="trf-links">' +
        sections += '<h2 style="font-size:15px;font-weight:700;color:var(--av-text-primary);margin-bottom:8px;">Xem chữa bài</h2>' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          CHUABAI.map(function (s) {
            return '<a class="av-btn" target="_blank" href="' + s.href + encodeURIComponent(s.attempt) + '">Chữa bài ' + s.label + ' ↗</a>';
          }).join('') + '</div>';
      }
      if (WRITING.length) {
        sections += '<h2 class="trf-h2" style="margin-top:var(--av-space-6)">Nhận xét chi tiết Writing</h2>' +
          '<div class="trf-links">' +
        sections += '<h2 style="font-size:15px;font-weight:700;color:var(--av-text-primary);margin:16px 0 8px;">Nhận xét chi tiết Writing</h2>' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          WRITING.map(function (s) {
            return '<a class="av-btn" target="_blank" href="/pages/writing-result.html?id=' + encodeURIComponent(s.id) + '">Nhận xét ' + s.label + ' ↗</a>';
          }).join('') + '</div>';
      }
      cwrap.innerHTML = sections;
      showState('content');
    }

    async function boot() {
      var sittingId = new URLSearchParams(location.search).get('sitting');
      if (!sittingId) { document.getElementById('state-error').textContent = 'Thiếu mã sitting.'; showState('error'); return; }
      var sb = window.getSupabase && window.getSupabase();
      if (sb) {
        var sess = await sb.auth.getSession();
        if (!sess.data.session) { location.href = '/index.html'; return; }
      }
      try {
        var data = await window.api.get('/api/mock-exams/sittings/' + encodeURIComponent(sittingId) + '/result');
        render(data);
      } catch (e) {
        // 403 = chưa released (sealed)
        if (e && (e.status === 403 || /chờ giám khảo|403/.test(String(e.message || '')))) { showState('pending'); return; }
        document.getElementById('state-error').textContent = 'Không tải được kết quả: ' + (e && e.message ? e.message : e);
        showState('error');
      }
    }
    boot();
  })();
  </script>
</body>
</html>
