<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Chữa bài — Aver Learning</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/markdown.css" />
  <!-- chuabai-refine — reuse the full-screen exam shell + palette navigator. -->
  <link rel="stylesheet" href="/css/reading-exam-mockup.css" />
  <link rel="stylesheet" href="/css/reading-review.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
  <script src="/js/markdown.js" defer></script>
  <script src="/js/components/glossary-popover.js" defer></script>
</head>
<!-- exam-chrome → the institutional full-viewport shell (top bar / split / palette). -->
<body class="exam-chrome" data-text-size="medium">

  <!-- ── TOP BAR ───────────────────────────────────────────────────── -->
  <header class="exam-topbar rr-topbar" role="banner">
    <div class="rr-topbar__left">
      <a class="rr-back" href="/pages/reading.html">← Thư viện</a>
      <span class="rr-test-label" id="rr-test-label">Chữa bài</span>
    </div>
    <div class="rr-topbar__right">
      <div class="rr-topbar-summary" id="rr-summary" aria-live="polite"></div>
      <!-- reading-header-notefill A — skills shown INLINE (no dropdown). -->
      <div class="rr-skills" id="rr-skills" aria-label="Phân bố kỹ năng"></div>
    </div>
  </header>

  <main class="exam-state-shell" id="state-loading"><p class="exam-state-msg">Đang tải chữa bài…</p></main>
  <main class="exam-state-shell" id="state-empty" hidden><p class="exam-state-msg">Không tìm thấy bài làm để chữa.</p></main>
  <main class="exam-state-shell" id="state-error" hidden><p class="exam-state-msg exam-state-msg--error" id="error-msg"></p></main>

  <!-- ── SPLIT: passage | per-question review (reuses .exam-split) ──── -->
  <main class="exam-split" id="rr-content" hidden>
    <section class="exam-passage" id="rr-passage-pane" aria-label="Đoạn văn">
      <!-- chuabai-refine #2 — original/translation toggle, top-LEFT. -->
      <div class="rr-passage-toggle" role="group" aria-label="Hiển thị đoạn văn">
        <button type="button" class="rr-passage-toggle__btn is-active" id="rr-mode-original" aria-pressed="true">Văn bản gốc</button>
        <button type="button" class="rr-passage-toggle__btn" id="rr-mode-translation" aria-pressed="false">Bài dịch</button>
      </div>
      <h2 class="rr-passage__title" id="rr-passage-title"></h2>
      <div class="rr-passage__body md-body" id="rr-passage-body"></div>
    </section>
    <div class="exam-divider" aria-hidden="true"></div>
    <section class="exam-questions rr-review" id="rr-review" aria-label="Chữa từng câu"></section>
  </main>

  <!-- ── PALETTE: 40-question navigator grouped by passage (reuses .exam-palette) ── -->
  <footer class="exam-palette" id="rr-palette" hidden role="navigation" aria-label="Chọn câu để chữa">
    <div class="exam-palette__grid" id="rr-nav-grid" role="group" aria-label="40 câu"></div>
    <div class="rr-nav-legend" aria-hidden="true">
      <span class="rr-nav-legend__item"><span class="rr-nav-legend__swatch is-correct"></span>Đúng</span>
      <span class="rr-nav-legend__item"><span class="rr-nav-legend__swatch is-incorrect"></span>Sai</span>
    </div>
  </footer>

  <script src="/js/reading-review.js" defer></script>
</body>
</html>
