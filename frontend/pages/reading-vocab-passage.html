<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Bài đọc — Aver Learning</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/markdown.css" />
  <link rel="stylesheet" href="/css/image-lightbox.css" />
  <link rel="stylesheet" href="/css/reading-vocab.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/components/aver-chrome.js"></script>

  <!-- Markdown render + lightbox + glossary popover (defer → ready before the page script). -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
  <script src="/js/markdown.js" defer></script>
  <script src="/js/image-lightbox.js" defer></script>
  <script src="/js/components/glossary-popover.js" defer></script>
  <script src="/js/components/reading-questions.js" defer></script>
  <script src="/js/components/reading-passage-panes.js" defer></script>
</head>
<body class="av-page">

  <div class="rv-progress" aria-hidden="true"><div class="rv-progress__fill" id="rv-progress-fill"></div></div>

  <aver-chrome active="reading"></aver-chrome>

  <div class="shell">
    <main class="rv-shell">
      <p class="eyebrow"><a href="/pages/reading-vocab.html" style="color: var(--av-text-secondary);">← Thư viện Vocab Reading</a></p>

      <div class="rv-empty" id="state-loading">Đang tải…</div>
      <div class="rv-empty" id="state-empty" hidden>Không tìm thấy bài đọc.</div>
      <div class="rv-error" id="state-error" hidden></div>

      <div class="rv-passage-layout" id="rv-passage" hidden>
        <article>
          <h1 class="rv-passage__title" id="rv-title"></h1>
          <div class="rv-passage__body md-body" id="rv-body"></div>
        </article>
        <aside class="rv-questions" id="rv-questions" aria-label="Câu hỏi hiểu bài"></aside>
      </div>
    </main>
  </div>

  <script src="/js/reading-vocab-passage.js" defer></script>
</body>
</html>
