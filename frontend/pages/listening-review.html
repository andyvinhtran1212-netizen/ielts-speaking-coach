<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Chữa bài Listening — Aver Learning</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/markdown.css" />
  <!-- listening-review-ui — reuse the full-screen exam shell + palette navigator. -->
  <link rel="stylesheet" href="/css/reading-exam-mockup.css" />
  <link rel="stylesheet" href="/css/listening-review.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/components/audio-player.js"></script>
</head>
<body class="exam-chrome" data-text-size="medium">

  <!-- ── TOP BAR ───────────────────────────────────────────────────── -->
  <header class="exam-topbar lr-topbar" role="banner">
    <div class="lr-topbar__left">
      <a class="lr-back" href="/pages/listening-tests.html">← Listening tests</a>
      <span class="lr-test-label" id="lr-test-label">Chữa bài</span>
    </div>
    <div class="lr-topbar__right">
      <div class="lr-summary" id="lr-summary" aria-live="polite"></div>
    </div>
  </header>

  <main class="exam-state-shell" id="state-loading"><p class="exam-state-msg">Đang tải chữa bài…</p></main>
  <main class="exam-state-shell" id="state-empty" hidden><p class="exam-state-msg">Không tìm thấy bài làm để chữa.</p></main>
  <main class="exam-state-shell" id="state-error" hidden><p class="exam-state-msg exam-state-msg--error" id="error-msg"></p></main>

  <!-- ── SPLIT: transcript | per-question review (reuses .exam-split) ── -->
  <main class="exam-split" id="lr-content" hidden>
    <section class="exam-passage" id="lr-transcript-pane" aria-label="Transcript">
      <div class="lr-section-tabs" id="lr-section-tabs" role="tablist" aria-label="Chọn section"></div>
      <h2 class="lr-transcript__title" id="lr-transcript-title"></h2>
      <div class="lr-transcript__body md-body" id="lr-transcript-body"></div>
    </section>
    <div class="exam-divider" aria-hidden="true"></div>
    <section class="exam-questions lr-review" id="lr-review" aria-label="Chữa từng câu"></section>
  </main>

  <!-- ── STICKY AUDIO PLAYER (window replay per question) ───────────── -->
  <div class="lr-player-bar" id="lr-player-bar" hidden>
    <div class="lr-player-bar__label" id="lr-player-label">🔊 Bấm timestamp ở mỗi câu để nghe lại đúng đoạn chứa đáp án.</div>
    <audio-player id="lr-player"></audio-player>
  </div>

  <!-- ── PALETTE: 40-question navigator grouped by section ──────────── -->
  <footer class="exam-palette" id="lr-palette" hidden role="navigation" aria-label="Chọn câu để chữa">
    <div class="exam-palette__grid" id="lr-nav-grid" role="group" aria-label="40 câu"></div>
    <div class="lr-nav-legend" aria-hidden="true">
      <span class="lr-nav-legend__item"><span class="lr-nav-legend__swatch is-correct"></span>Đúng</span>
      <span class="lr-nav-legend__item"><span class="lr-nav-legend__swatch is-incorrect"></span>Sai</span>
    </div>
  </footer>

  <script src="/js/listening-review.js" defer></script>
</body>
</html>
