<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Submit Essay — Writing Coach Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background: #0a1628; font-family: 'Inter', ui-sans-serif, system-ui; color: #e2e8f0; }
    .card  { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
    .input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); color: #e2e8f0; border-radius: 8px; padding: 8px 12px; width: 100%; }
    .input:focus { outline: none; border-color: #14b8a6; }
    .btn-primary { background: #14b8a6; color: #0a1628; font-weight: 600; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
    .btn-primary:hover { background: #0d9488; }
    .btn-primary:disabled { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.4); cursor: not-allowed; }
    textarea.input { font-family: ui-monospace, SFMono-Regular, monospace; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }

    /* Sprint 2.7a — tier picker */
    .tier-picker { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:0.625rem; }
    .tier-option { cursor:pointer; }
    .tier-option input { position:absolute; opacity:0; pointer-events:none; }
    .tier-card {
      display:flex; flex-direction:column; gap:0.25rem;
      padding:0.875rem 1rem; border-radius:10px;
      background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.10);
      transition:border-color 0.15s, background 0.15s;
    }
    .tier-option input:checked + .tier-card {
      border-color:#14b8a6; background:rgba(20,184,166,0.08);
    }
    .tier-option.disabled .tier-card { opacity:0.5; cursor:not-allowed; }
    .tier-option.disabled { cursor:not-allowed; }
    .tier-name { font-size:14px; font-weight:600; color:#e2e8f0; }
    .tier-meta { font-size:11px; color:#9ca3af; }
    .tier-desc { font-size:12px; color:#cbd5e1; line-height:1.45; margin-top:0.25rem; }
  </style>
</head>
<body>
  <header style="background:#0C2340;border-bottom:1px solid rgba(255,255,255,0.06);" class="sticky top-0 z-30 px-6 py-3.5 flex items-center justify-between">
    <a href="/pages/admin-writing.html" class="text-sm font-medium" style="color:rgba(255,255,255,0.45);">← Writing Coach</a>
    <span id="header-email" class="hidden text-xs" style="color:rgba(255,255,255,0.4);"></span>
  </header>

  <div id="state-loading" class="flex items-center justify-center py-32">
    <p class="text-sm" style="color:rgba(255,255,255,0.4);">Đang kiểm tra quyền truy cập…</p>
  </div>

  <div id="state-denied" class="hidden max-w-xl mx-auto px-6 py-20 text-center">
    <h2 class="text-xl font-bold" style="color:#f87171;">🔒 Admin Access Required</h2>
    <a href="/pages/dashboard.html" class="mt-4 inline-block text-sm" style="color:#14b8a6;">← Quay lại Dashboard</a>
  </div>

  <main id="state-ready" class="hidden max-w-4xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold">Submit New Essay</h1>
    <p class="mt-1 text-sm" style="color:rgba(255,255,255,0.5);">Chọn học viên, dán đề + bài viết, AI sẽ chấm trong nền.</p>

    <div id="alert-area" class="mt-4"></div>

    <form id="essay-form" class="card mt-5 p-6 space-y-5">
      <!-- Student picker -->
      <div>
        <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">Học viên *</label>
        <select id="f-student" class="input mt-1" required>
          <option value="">— Đang tải danh sách —</option>
        </select>
      </div>

      <!-- Task type + level + model -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">Task Type *</label>
          <select id="f-task-type" class="input mt-1" required>
            <option value="task2">Task 2</option>
            <option value="task1_academic">Task 1 — Academic</option>
            <option value="task1_general">Task 1 — General</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">Analysis Level *</label>
          <select id="f-level" class="input mt-1" required>
            <option value="1">Level 1 — Mistake-only</option>
            <option value="2">Level 2 — + Coherence</option>
            <option value="3" selected>Level 3 — + Idea / Counterargument</option>
            <option value="4">Level 4 — + Lexical / Sentence</option>
            <option value="5">Level 5 — Pedantic / Full</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">Model *</label>
          <select id="f-model" class="input mt-1" required>
            <option value="gemini-2.5-pro" selected>Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (rẻ hơn, nhanh hơn)</option>
          </select>
        </div>
      </div>

      <!-- Form of address -->
      <div>
        <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">Cách xưng hô (form of address)</label>
        <div class="mt-1 flex gap-2 flex-wrap">
          <label class="pill" style="background:rgba(255,255,255,0.06);cursor:pointer;"><input type="radio" name="foa" value="bạn"> bạn</label>
          <label class="pill" style="background:rgba(20,184,166,0.18);color:#5eead4;cursor:pointer;"><input type="radio" name="foa" value="em" checked> em</label>
          <label class="pill" style="background:rgba(255,255,255,0.06);cursor:pointer;"><input type="radio" name="foa" value="anh"> anh</label>
          <label class="pill" style="background:rgba(255,255,255,0.06);cursor:pointer;"><input type="radio" name="foa" value="chị"> chị</label>
        </div>
      </div>

      <!-- Sprint 2.7a — Grading depth tier (Quick removed in 2.7a.1) -->
      <div>
        <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">Grading tier</label>
        <div class="tier-picker mt-2">
          <label class="tier-option">
            <input type="radio" name="grading_tier" value="standard" checked>
            <div class="tier-card">
              <span class="tier-name">Standard</span>
              <span class="tier-meta">~30–60s · 12 sections · Pro</span>
              <span class="tier-desc">Full analysis: improved essay, lexical, counterargument.</span>
            </div>
          </label>
          <label class="tier-option disabled" title="Coming Sprint 2.7b">
            <input type="radio" name="grading_tier" value="deep" disabled>
            <div class="tier-card">
              <span class="tier-name">Deep</span>
              <span class="tier-meta">Coming Sprint 2.7b</span>
              <span class="tier-desc">Multi-pass + sentence rewrite.</span>
            </div>
          </label>
          <label class="tier-option disabled" title="Coming Sprint 2.7c">
            <input type="radio" name="grading_tier" value="instructor" disabled>
            <div class="tier-card">
              <span class="tier-name">Instructor</span>
              <span class="tier-meta">Coming Sprint 2.7c</span>
              <span class="tier-desc">AI Standard + human edit + note.</span>
            </div>
          </label>
        </div>
      </div>

      <!-- Prompt + Essay -->
      <div>
        <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">Đề bài (prompt) *</label>
        <textarea id="f-prompt" class="input mt-1" rows="4" required placeholder="Some people think that…"></textarea>
      </div>
      <div>
        <label class="text-xs font-medium" style="color:rgba(255,255,255,0.6);">
          Bài viết của học viên *
          <span id="word-count" class="ml-2" style="color:rgba(255,255,255,0.4);">0 từ</span>
        </label>
        <textarea id="f-essay" class="input mt-1" rows="14" required placeholder="Paste essay here…"></textarea>
      </div>

      <div class="flex justify-end gap-2 pt-2">
        <a href="/pages/admin-writing.html" class="px-4 py-2 text-sm" style="color:rgba(255,255,255,0.5);">Hủy</a>
        <button type="submit" id="btn-submit" class="btn-primary">Submit for grading</button>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script src="/js/writing-admin.js"></script>
  <script>
    'use strict';

    function setAlert(kind, msg) {
      var area = document.getElementById('alert-area');
      var color = kind === 'error' ? '#f87171' : kind === 'success' ? '#86efac' : '#fde68a';
      var bg    = kind === 'error' ? 'rgba(239,68,68,0.10)' : kind === 'success' ? 'rgba(134,239,172,0.08)' : 'rgba(234,179,8,0.08)';
      var border = kind === 'error' ? 'rgba(239,68,68,0.25)' : kind === 'success' ? 'rgba(134,239,172,0.25)' : 'rgba(234,179,8,0.25)';
      area.innerHTML = '<div style="background:' + bg + ';border:1px solid ' + border + ';color:' + color + ';" class="p-3 rounded-lg text-sm">' + WC.escapeHtml(msg) + '</div>';
    }

    async function loadStudents(presetId) {
      var sel = document.getElementById('f-student');
      try {
        var rows = await window.api.get('/admin/students?limit=200');
        if (!rows || !rows.length) {
          sel.innerHTML = '<option value="">— Chưa có học viên —</option>';
          setAlert('warn', 'Bạn cần tạo học viên trước. → /pages/admin-students.html');
          return;
        }
        sel.innerHTML = '<option value="">— Chọn học viên —</option>' + rows.map(function (r) {
          var label = r.student_code + ' — ' + r.full_name;
          return '<option value="' + WC.escapeHtml(r.id) + '">' + WC.escapeHtml(label) + '</option>';
        }).join('');
        if (presetId) sel.value = presetId;
      } catch (e) {
        setAlert('error', 'Không tải được học viên: ' + e.message);
      }
    }

    function updateWordCount() {
      var t = document.getElementById('f-essay').value.trim();
      var n = t === '' ? 0 : t.split(/\s+/).length;
      document.getElementById('word-count').textContent = n + ' từ';
    }

    async function handleSubmit(e) {
      e.preventDefault();
      var btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'Đang gửi…';

      var foa = document.querySelector('input[name="foa"]:checked');
      // Sprint 2.7a — tier picker. Default 'standard' if no radio is
      // selected (defensive — the form ships with one checked).
      var tier = document.querySelector('input[name="grading_tier"]:checked');
      var payload = {
        student_id:      document.getElementById('f-student').value,
        task_type:       document.getElementById('f-task-type').value,
        analysis_level:  parseInt(document.getElementById('f-level').value, 10),
        selected_model:  document.getElementById('f-model').value,
        form_of_address: foa ? foa.value : 'em',
        grading_tier:    tier ? tier.value : 'standard',
        prompt_text:     document.getElementById('f-prompt').value.trim(),
        essay_text:      document.getElementById('f-essay').value.trim(),
      };

      if (!payload.student_id) {
        setAlert('error', 'Vui lòng chọn học viên.');
        btn.disabled = false; btn.textContent = 'Submit for grading';
        return;
      }

      try {
        var res = await window.api.post('/admin/writing/essays', payload);
        // Pre-warm notification permission so the status page can notify on graded.
        WC.requestNotifyPermission();
        window.location.href = '/pages/admin-writing-status.html?essay_id=' + encodeURIComponent(res.essay_id);
      } catch (err) {
        setAlert('error', err.message);
        btn.disabled = false; btn.textContent = 'Submit for grading';
      }
    }

    WC.bootstrap({
      onReady: function () {
        var preset = new URLSearchParams(window.location.search).get('student_id');
        loadStudents(preset);
        document.getElementById('f-essay').addEventListener('input', updateWordCount);
        document.getElementById('essay-form').addEventListener('submit', handleSubmit);
      }
    });
  </script>
</body>
</html>
