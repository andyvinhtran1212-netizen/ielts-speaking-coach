<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Tìm kiếm — Grammar Wiki — IELTS Speaking Coach</title>
    <!-- Canonical anti-flash theme bootstrap (DESIGN_SYSTEM § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var theme;
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Tailwind CDN + custom navy/teal palette preserved (Sprint 6.15 Phase B
       finding — js/grammar.js renderer depends on text-teal-light, bg-teal/15,
       etc.). fontFamily key dropped; grammar-wiki.css owns font discipline. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
        },
      },
    }
  </script>

  <!-- DM Sans + Lora sub-system preserved per § 14.2 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Foundation: tokens → components → ds (Sprint 6.5.1 pattern) →
       grammar-wiki.css. admin-writing.css NOT linked (different cluster).
       writing-renderers.css NOT linked (Sprint 6.8 finding extends). -->
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/ds.css" />
  <link rel="stylesheet" href="/css/grammar-wiki.css" />
</head>
<body class="av-page min-h-screen font-sans antialiased">

  <!-- Canonical chrome (Sprint 6.17.2 — Grammar active). -->
  <div class="topnav-wrap">
    <nav class="topnav" aria-label="Primary">
      <a href="/pages/home.html" class="brand">Aver<span class="dot">.</span>Learning</a>
      <div class="nav-links">
        <a href="/pages/home.html">Trang chủ</a>
        <a href="/pages/writing-dashboard.html">Writing</a>
        <a href="/pages/speaking.html">Speaking</a>
        <a href="/grammar.html" class="active">Grammar</a>
        <a href="/pages/vocabulary.html">Vocabulary</a>
        <span class="locked" aria-disabled="true">Reading</span>
        <span class="locked" aria-disabled="true">Listening</span>
      </div>
      <div class="topnav-right">
        <button class="av-theme-toggle" id="theme-toggle" type="button" aria-label="Chuyển giao diện sáng/tối">
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <div class="user-menu">
          <button class="user-pill" id="user-pill" type="button"
                  aria-haspopup="true" aria-expanded="false" aria-label="Menu hồ sơ">
            <span class="avatar" id="user-avatar">·</span>
            <span id="user-pill-name">…</span>
          </button>
          <div class="user-menu-dropdown" role="menu" hidden>
            <a href="/pages/profile.html" class="user-menu-item" role="menuitem">Hồ sơ</a>
            <button type="button" class="user-menu-item user-menu-item--danger"
                    id="user-menu-logout" role="menuitem">Đăng xuất</button>
          </div>
        </div>
      </div>
    </nav>
  </div>

  <!-- Grammar Wiki secondary nav (editorial breadcrumb). -->
  <nav class="gw-subnav sticky top-0 z-20 border-b border-white/5" aria-label="Grammar Wiki"
       style="background: var(--av-surface-sunken); backdrop-filter: blur(12px);">
    <div class="max-w-5xl mx-auto px-4 h-12 flex items-center">
      <div id="breadcrumb" class="flex items-center text-sm text-white/40 flex-wrap gap-0">
        <a href="/grammar.html" class="hover:text-teal-light transition-colors">Grammar Wiki</a>
        <span class="mx-2 text-white/20">›</span>
        <span class="text-white/80">Tìm kiếm</span>
      </div>
    </div>
  </nav>

  <!-- Skeleton -->
  <div id="search-skeleton" class="max-w-5xl mx-auto px-4 py-8">
    <div class="skeleton h-8 w-64 rounded-lg mb-4"></div>
    <div class="skeleton h-12 w-full rounded-xl mb-8"></div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="skeleton h-28 rounded-xl"></div>
      <div class="skeleton h-28 rounded-xl"></div>
      <div class="skeleton h-28 rounded-xl"></div>
    </div>
  </div>

  <!-- Main content -->
  <div id="search-container" class="hidden max-w-5xl mx-auto px-4 py-8 ds-fadein">

    <!-- Search bar -->
    <div class="mb-8">
      <div class="relative mb-4">
        <button id="search-btn" aria-label="Tìm kiếm"
                class="absolute left-4 top-1/2 -translate-y-1/2 p-1 text-white/30 hover:text-teal-light transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
          </svg>
        </button>
        <input id="search-input" class="search-input" type="search"
               placeholder="Tìm: present perfect, conditionals, passive voice..." />
      </div>
    </div>

    <!-- Results heading -->
    <div class="flex items-baseline gap-3 mb-5">
      <h1 id="search-heading" class="text-xl font-bold text-white"></h1>
      <span id="search-count" class="text-sm text-white/35 font-normal"></span>
    </div>

    <!-- Results grid -->
    <div id="search-results-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/grammar.js"></script>
  <script>
    grammarWiki.loadGrammarSearch();
    grammarWiki.setupSearch('search-input', 'search-btn', function (q) {
      window.location.href = '?q=' + encodeURIComponent(q);
    });
  </script>

  <!-- Canonical theme-toggle + user-pill wiring (Sprint 6.17.2). -->
  <script type="module">
    import { bindToggleButton } from '/js/theme-toggle.js';
    bindToggleButton(document.getElementById('theme-toggle'));
  </script>
  <script type="module" src="/js/user-pill.js"></script>
</body>
</html>
