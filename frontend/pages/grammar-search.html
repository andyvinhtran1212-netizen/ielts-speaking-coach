<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tìm kiếm — Grammar Wiki — IELTS Speaking Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['DM Sans', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <style>
    body {
      background: #07111f;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      font-family: 'DM Sans', ui-sans-serif, system-ui;
    }

    .search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 14px 20px 14px 48px;
      color: #fff;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      width: 100%;
    }
    .search-input:focus {
      background: rgba(255,255,255,0.06);
      border-color: rgba(20,184,166,0.45);
      box-shadow: 0 0 0 4px rgba(20,184,166,0.08);
    }
    .search-input::placeholder { color: rgba(255,255,255,0.28); }

    /* Results heading */
    #search-heading { font-family: 'Lora', serif; }

    /* Section label */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .section-label::before {
      content: '';
      display: inline-block; width: 14px; height: 2px;
      background: linear-gradient(90deg, #0F766E, transparent);
      border-radius: 2px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 9999px; }
  </style>
</head>
<body class="text-white min-h-screen font-sans antialiased">

  <!-- Top nav -->
  <nav class="sticky top-0 z-30 border-b border-white/5" style="background: rgba(10,22,40,0.92); backdrop-filter: blur(12px);">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <div id="breadcrumb" class="flex items-center text-sm text-white/40 flex-wrap gap-0">
        <a href="../grammar.html" class="hover:text-teal-light transition-colors">Grammar Wiki</a>
        <span class="mx-2 text-white/20">›</span>
        <span class="text-white/80">Tìm kiếm</span>
      </div>
      <a href="../pages/dashboard.html" class="text-xs text-white/30 hover:text-white/60 transition-colors">Dashboard</a>
    </div>
  </nav>

  <!-- Skeleton -->
  <div id="search-skeleton" class="max-w-5xl mx-auto px-4 py-8">
    <div class="skeleton h-8 w-64 rounded-lg mb-4"></div>
    <div class="skeleton h-12 w-full rounded-xl mb-8"></div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="skeleton h-28 rounded-xl"></div>
      <div class="skeleton h-28 rounded-xl"></div>
      <div class="skeleton h-28 rounded-xl"></div>
    </div>
  </div>

  <!-- Main content -->
  <div id="search-container" class="hidden max-w-5xl mx-auto px-4 py-8 ds-fadein">

    <!-- Search bar -->
    <div class="mb-8">
      <div class="relative mb-4">
        <button id="search-btn" aria-label="Tìm kiếm"
                class="absolute left-4 top-1/2 -translate-y-1/2 p-1 text-white/30 hover:text-teal-light transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
          </svg>
        </button>
        <input id="search-input" class="search-input" type="search"
               placeholder="Tìm: present perfect, conditionals, passive voice..." />
      </div>
    </div>

    <!-- Results heading -->
    <div class="flex items-baseline gap-3 mb-5">
      <h1 id="search-heading" class="text-xl font-bold text-white"></h1>
      <span id="search-count" class="text-sm text-white/35 font-normal"></span>
    </div>

    <!-- Results grid -->
    <div id="search-results-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/grammar.js"></script>
  <script>
    grammarWiki.loadGrammarSearch();
    grammarWiki.setupSearch('search-input', 'search-btn', function (q) {
      window.location.href = '?q=' + encodeURIComponent(q);
    });
  </script>
</body>
</html>
