<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Tác giả Gist Listening — Aver Learning Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/components/audio-player.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); }
    .editor-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: var(--av-space-8) var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-6);
    }
    .editor-header h1 { font-size: var(--av-fs-2xl); margin-bottom: var(--av-space-2); }
    .editor-header .subtitle { color: var(--av-text-secondary); font-size: var(--av-fs-sm); }
    .field-label {
      font-size: var(--av-fs-xs); color: var(--av-text-muted);
      text-transform: uppercase; letter-spacing: var(--av-tracking-widest);
      display: block; margin-bottom: var(--av-space-2);
    }
    .text-input, .area-input {
      width: 100%;
      padding: var(--av-space-3) var(--av-space-4);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      font-family: var(--av-font-sans); font-size: var(--av-fs-base);
      background: var(--av-surface-card); color: var(--av-text-primary);
    }
    .area-input { min-height: 100px; line-height: var(--av-lh-normal); resize: vertical; }
    .area-input.tall { min-height: 160px; }
    .text-input:focus, .area-input:focus {
      outline: 2px solid var(--av-brand-teal-700);
      outline-offset: 2px;
    }
    .transcript-ref {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-sunken);
      color: var(--av-text-secondary);
      font-size: var(--av-fs-sm);
      line-height: var(--av-lh-relaxed);
      white-space: pre-wrap;
    }
    .button-row {
      display: flex; gap: var(--av-space-3); flex-wrap: wrap; align-items: center;
    }
    .btn-primary {
      padding: var(--av-space-3) var(--av-space-6);
      border-radius: var(--av-radius-md);
      background: var(--av-brand-teal-700);
      color: var(--av-text-on-primary);
      border: none; font-weight: var(--av-fw-semibold); cursor: pointer;
    }
    .btn-primary:hover { background: var(--av-brand-teal-800); }
    .btn-primary:disabled { background: var(--av-text-muted); cursor: not-allowed; }
    .btn-secondary {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: transparent; color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default); cursor: pointer;
    }
    .status-banner {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      font-size: var(--av-fs-sm);
    }
    .status-banner.is-success { background: #ECFDF5; color: var(--av-brand-teal-800); border: 1px solid var(--av-brand-teal-200); }
    .status-banner.is-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
    .status-banner.is-info    { background: var(--av-surface-sunken); color: var(--av-text-secondary); border: 1px solid var(--av-border-default); }
    [hidden] { display: none !important; }
  </style>
</head>
<body class="av-page">

  <div class="editor-shell">
    <header class="editor-header">
      <p style="margin-bottom: var(--av-space-2);">
        <a href="/admin.html" style="color: var(--av-text-secondary);">← Admin</a>
      </p>
      <h1>Tác giả bài Gist (Nghe ý chính)</h1>
      <p class="subtitle">
        Soạn câu hỏi tóm tắt + đáp án mẫu + bộ từ khóa. AI (Haiku 4.5) chấm
        semantic match cho học viên.
      </p>
    </header>

    <div class="status-banner is-info" id="status-banner" hidden></div>

    <section>
      <span class="field-label">Bài nghe</span>
      <div id="content-info" style="color: var(--av-text-primary);">Đang tải…</div>
    </section>

    <section>
      <span class="field-label">Audio</span>
      <audio-player id="player"></audio-player>
    </section>

    <section>
      <span class="field-label">Bản gỡ băng (read-only)</span>
      <div class="transcript-ref" id="transcript-ref">…</div>
    </section>

    <section>
      <label class="field-label" for="prompt-text">Câu hỏi cho học viên</label>
      <input class="text-input" id="prompt-text" type="text"
             placeholder="Vd: Người nói đang chủ yếu trình bày về điều gì?" />
    </section>

    <section>
      <label class="field-label" for="model-answer">Đáp án mẫu (ground truth, 2-4 câu)</label>
      <textarea class="area-input tall" id="model-answer"
                placeholder="Vd: Người nói trình bày về tốc độ xói mòn bờ biển..." spellcheck="false"></textarea>
    </section>

    <section>
      <label class="field-label" for="rubric-keywords">Từ khóa chấm (cách nhau bằng dấu phẩy, tối đa 10)</label>
      <input class="text-input" id="rubric-keywords" type="text"
             placeholder="coastal, erosion, climate change, sea level" />
    </section>

    <section class="button-row">
      <button class="btn-primary" id="btn-save" type="button">Lưu (Draft)</button>
      <button class="btn-primary" id="btn-publish" type="button">Lưu &amp; Xuất bản</button>
      <a class="btn-secondary" href="/admin.html">Hủy</a>
    </section>
  </div>

  <script type="module" src="/js/admin-listening-gist.js"></script>
</body>
</html>
