<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Full Tests — Aver Learning</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/reading-vocab.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/components/aver-chrome.js"></script>
</head>
<body class="av-page">

  <aver-chrome active="reading"></aver-chrome>

  <div class="shell">
    <main class="rv-shell">
      <header class="rv-header">
        <p class="eyebrow"><a href="/pages/home.html" style="color: var(--av-text-secondary);">← Trang chủ</a></p>
        <h1>Full Tests <span class="accent">·</span> <span style="color: var(--av-text-muted);">Cambridge-style</span></h1>
        <p class="subtitle">Bài thi đầy đủ 60 phút — 3 đoạn văn, 40 câu hỏi, kèm bảng điểm + band IELTS.</p>
      </header>

      <!-- Library switcher: L1 ↔ L2 ↔ L3 (Sprint 20.6 adds the Full Test entry). -->
      <nav class="rv-libnav" aria-label="Reading libraries">
        <a class="rv-libnav__link" href="/pages/reading-vocab.html">Vocab Reading</a>
        <a class="rv-libnav__link" href="/pages/reading-skill.html">Skill Practice</a>
        <a class="rv-libnav__link is-active" aria-current="page">Full Tests</a>
      </nav>

      <div class="rv-filters">
        <label>Mô-đun
          <select id="filter-module">
            <option value="">Tất cả</option>
            <option value="academic">Academic</option>
            <option value="general_training" disabled>General Training (Phase B)</option>
          </select>
        </label>
      </div>

      <div class="rv-empty" id="state-loading">Đang tải…</div>
      <div class="rv-empty" id="state-empty" hidden>Chưa có bài thi nào.</div>
      <div class="rv-error" id="state-error" hidden></div>

      <div class="rv-grid" id="rv-grid" hidden></div>
    </main>
  </div>

  <script type="module" src="/js/reading-test.js"></script>
</body>
</html>
