<!DOCTYPE html>

  <title>Từ vựng luyện thi</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme',
          (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light'));
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/tailwind.build.css" />
  <!-- Canonical site chrome (brand + skill tabs + theme + user pill). -->
  <script type="module" src="/js/components/aver-chrome.js"></script>
  <style>
    .vx-hub-title { font-size: var(--av-fs-lg); font-weight: var(--av-fw-semibold);
      letter-spacing: var(--av-tracking-tight); color: var(--av-text-primary);
      margin: var(--av-space-2) 0 var(--av-space-1); }
    .vx-hub-sub { font-size: var(--av-fs-sm); color: var(--av-text-muted);
      line-height: var(--av-lh-relaxed); margin: 0 0 var(--av-space-6); max-width: 60ch; }
    .vx-status { color: var(--av-text-muted); font-size: var(--av-fs-sm); padding: var(--av-space-8) 0; }
    .vx-status.is-error { color: var(--av-error); }
    .vx-family { margin: 0 0 var(--av-space-8); }
    .vx-family-title { font-size: var(--av-fs-md); font-weight: var(--av-fw-semibold);
      color: var(--av-text-primary); margin: 0 0 var(--av-space-4); }
    .vx-meta { display: flex; align-items: center; gap: var(--av-space-2); flex-wrap: wrap; }
    .vx-count { font-weight: var(--av-fw-semibold); color: var(--av-primary); letter-spacing: .03em; }
  </style>
</head>
<body class="av-page font-sans antialiased">

      TOEIC Core, và THPT Core. Tách riêng khỏi từ vựng theo chủ đề của bạn; học bằng flashcards.
    </p>
