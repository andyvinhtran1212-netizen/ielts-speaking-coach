<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Grading Status — Writing Coach Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background: #0a1628; font-family: 'Inter', ui-sans-serif, system-ui; color: #e2e8f0; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
    .progress-track { background: rgba(255,255,255,0.06); border-radius: 999px; height: 8px; overflow: hidden; }
    .progress-bar   { background: linear-gradient(90deg, #14b8a6, #0d9488); height: 100%; transition: width 0.4s ease; }
    .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 1.6s ease-in-out infinite; }
  </style>
</head>
<body>
  <header style="background:#0C2340;border-bottom:1px solid rgba(255,255,255,0.06);" class="sticky top-0 z-30 px-6 py-3.5 flex items-center justify-between">
    <a href="/pages/admin-writing.html" class="text-sm font-medium" style="color:rgba(255,255,255,0.45);">← Writing Coach</a>
    <span id="header-email" class="hidden text-xs" style="color:rgba(255,255,255,0.4);"></span>
  </header>

  <div id="state-loading" class="flex items-center justify-center py-32">
    <p class="text-sm" style="color:rgba(255,255,255,0.4);">Đang kiểm tra quyền truy cập…</p>
  </div>

  <div id="state-denied" class="hidden max-w-xl mx-auto px-6 py-20 text-center">
    <h2 class="text-xl font-bold" style="color:#f87171;">🔒 Admin Access Required</h2>
    <a href="/pages/home.html" class="mt-4 inline-block text-sm" style="color:#14b8a6;">← Quay lại Dashboard</a>
  </div>

  <main id="state-ready" class="hidden max-w-2xl mx-auto px-6 py-12">
    <h1 class="text-2xl font-bold">Grading in progress</h1>
    <p class="mt-1 text-sm" style="color:rgba(255,255,255,0.5);">Bạn có thể đóng tab — bài sẽ tiếp tục chấm trong nền.</p>

    <div class="card mt-8 p-6">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div class="flex items-center gap-3">
          <span id="status-pill" class="pill pulse" style="background:rgba(234,179,8,0.18);color:#fde68a;">queued</span>
          <span id="status-text" class="text-sm" style="color:rgba(255,255,255,0.6);">Đang xếp hàng…</span>
        </div>
        <span id="elapsed" class="text-xs" style="color:rgba(255,255,255,0.4);">0s</span>
      </div>

      <div class="mt-5 progress-track">
        <div id="progress-bar" class="progress-bar" style="width:5%;"></div>
      </div>

      <p id="eta-text" class="mt-3 text-xs" style="color:rgba(255,255,255,0.45);">ETA: tính toán…</p>

      <div id="error-box" class="hidden mt-5 p-3 rounded-lg" style="background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.25);color:#f87171;">
        <p class="text-sm font-medium">Có lỗi khi chấm bài</p>
        <p id="error-msg" class="mt-1 text-xs" style="opacity:0.85;"></p>
      </div>

      <div class="mt-6 flex justify-between items-center">
        <a id="link-essay" href="#" class="text-xs" style="color:rgba(255,255,255,0.4);"></a>
        <a id="btn-view" class="hidden btn-primary" style="background:#14b8a6;color:#0a1628;font-weight:600;padding:8px 16px;border-radius:8px;text-decoration:none;">→ Xem kết quả</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script src="/js/writing-admin.js"></script>
  <script>
    'use strict';

    var POLL_INTERVAL_MS = 5000;
    var TERMINAL = { graded: true, reviewed: true, delivered: true, failed: true };

    var _essayId = new URLSearchParams(window.location.search).get('essay_id');
    var _startedAt = Date.now();
    var _eta = 60;
    var _timer = null;
    var _notified = false;

    var STATUS_DISPLAY = {
      pending:   { color: '#fde68a', bg: 'rgba(234,179,8,0.18)',  text: 'Đang xếp hàng…' },
      grading:   { color: '#93c5fd', bg: 'rgba(59,130,246,0.18)', text: 'Gemini đang chấm bài…' },
      graded:    { color: '#86efac', bg: 'rgba(34,197,94,0.18)',  text: 'Đã chấm xong! 🎉' },
      reviewed:  { color: '#86efac', bg: 'rgba(34,197,94,0.18)',  text: 'Admin đã review.' },
      delivered: { color: '#86efac', bg: 'rgba(34,197,94,0.18)',  text: 'Đã giao cho học viên.' },
      failed:    { color: '#f87171', bg: 'rgba(239,68,68,0.18)',  text: 'Chấm bài thất bại.' },
    };

    // Sprint 2.7b — Deep tier runs 3 passes (~3-5 phút). Time-based
    // rotation gives the admin a sense of progress without realtime
    // events. Boundaries are heuristics matching the per-pass timeouts:
    // 0-90s = Pass 1, 90-180s = Pass 2, 180s+ = Pass 3.
    function deepGradingMessage(elapsedSeconds) {
      if (elapsedSeconds < 90)  return 'Deep tier · Pass 1 of 3 (Standard analysis)…';
      if (elapsedSeconds < 180) return 'Deep tier · Pass 2 of 3 (Refinement)…';
      return                          'Deep tier · Pass 3 of 3 (Sentence rewrite)…';
    }

    function updateUI(payload) {
      var s = payload.status || 'pending';
      var meta = STATUS_DISPLAY[s] || STATUS_DISPLAY.pending;
      var pill = document.getElementById('status-pill');
      pill.textContent = s;
      pill.style.background = meta.bg;
      pill.style.color = meta.color;
      if (TERMINAL[s]) pill.classList.remove('pulse'); else pill.classList.add('pulse');
      // Tier-aware status text. Deep tier rotates Pass 1/2/3 hints
      // while status='grading'; Standard / non-grading states use the
      // generic message from STATUS_DISPLAY.
      var tier = (payload.grading_tier || 'standard').toLowerCase();
      var elapsedSec = Math.floor((Date.now() - _startedAt) / 1000);
      if (s === 'grading' && tier === 'deep') {
        document.getElementById('status-text').textContent = deepGradingMessage(elapsedSec);
      } else {
        document.getElementById('status-text').textContent = meta.text;
      }

      _eta = payload.eta_seconds || _eta;
      var elapsed = Math.floor((Date.now() - _startedAt) / 1000);
      document.getElementById('elapsed').textContent = elapsed + 's';

      var pct;
      if (s === 'graded' || s === 'reviewed' || s === 'delivered') pct = 100;
      else if (s === 'failed') pct = 100;
      else pct = Math.min(95, Math.round((elapsed / _eta) * 100));
      document.getElementById('progress-bar').style.width = pct + '%';
      if (s === 'failed') document.getElementById('progress-bar').style.background = 'rgba(239,68,68,0.5)';

      if (!TERMINAL[s]) {
        document.getElementById('eta-text').textContent =
          'ETA: ~' + _eta + 's tổng cộng (đã trôi ' + elapsed + 's)';
      } else {
        document.getElementById('eta-text').textContent = 'Hoàn tất sau ' + elapsed + 's.';
      }

      if (s === 'failed' && payload.error_message) {
        document.getElementById('error-box').classList.remove('hidden');
        document.getElementById('error-msg').textContent = payload.error_message;
      }

      // Show "view result" CTA when graded — Sprint W3 will provide /grade page
      if (s === 'graded' || s === 'reviewed' || s === 'delivered') {
        var viewBtn = document.getElementById('btn-view');
        viewBtn.href = '/pages/admin-writing-grade.html?essay_id=' + encodeURIComponent(_essayId);
        viewBtn.classList.remove('hidden');

        if (!_notified) {
          _notified = true;
          WC.notify('Bài chấm xong', 'Essay ' + _essayId.slice(0, 8) + '… đã sẵn sàng review.');
        }
      }
    }

    async function pollOnce() {
      try {
        var data = await window.api.get('/admin/writing/essays/' + _essayId + '/status');
        updateUI(data);
        if (TERMINAL[data.status]) {
          clearInterval(_timer);
          _timer = null;
        }
      } catch (e) {
        document.getElementById('status-text').textContent = 'Polling failed: ' + e.message;
      }
    }

    WC.bootstrap({
      onReady: function () {
        if (!_essayId) {
          document.getElementById('status-text').textContent = 'Thiếu essay_id trong URL.';
          return;
        }
        document.getElementById('link-essay').textContent = 'essay_id: ' + _essayId;
        WC.requestNotifyPermission();
        pollOnce();
        _timer = setInterval(pollOnce, POLL_INTERVAL_MS);
      }
    });
  </script>
</body>
</html>
