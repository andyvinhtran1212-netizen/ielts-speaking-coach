<head>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Quick-Check</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme',
          (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light'));
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />

  <!-- Canonical site chrome (brand + skill tabs + theme + user pill). -->
  <script type="module" src="/js/components/aver-chrome.js"></script>
  <style>
    /* Focused single-column reading width, centred under the chrome. */
    .qz-shell { max-width: var(--av-width-read); margin-inline: auto;
      padding: var(--av-space-6) var(--av-space-6) var(--av-space-16); }

    /* Progress header */
    .qz-head { display: flex; justify-content: space-between; align-items: baseline;
      gap: var(--av-space-4); margin-top: var(--av-space-2); }
    .qz-head h1 { font-size: var(--av-fs-xl); font-weight: var(--av-fw-bold);
      letter-spacing: var(--av-tracking-tight); color: var(--av-text-primary); margin: 0; }
    .qz-count { color: var(--av-text-muted); font-size: var(--av-fs-sm);
      font-variant-numeric: tabular-nums; white-space: nowrap; }
    .qz-track { height: 8px; border-radius: var(--av-radius-pill);
      background: var(--av-surface-sunken); overflow: hidden; margin-top: var(--av-space-3); }
    .qz-bar { height: 100%; width: 0; background: var(--av-primary); border-radius: inherit;
      transition: width var(--av-duration-base) var(--av-easing-default); }

    /* Question card */
    .qz-card { margin-top: var(--av-space-6); }
    .qz-prompt { font-size: var(--av-fs-lg); font-weight: var(--av-fw-semibold);
      line-height: var(--av-lh-snug); color: var(--av-text-primary); margin: 0; }

    /* Answer widgets — shared option button */
    .qz-options { display: flex; flex-direction: column; gap: var(--av-space-3);
      margin-top: var(--av-space-6); }
    .qz-bool { display: flex; gap: var(--av-space-3); margin-top: var(--av-space-6); }
    .qz-bool .qz-opt { flex: 1; justify-content: center; font-weight: var(--av-fw-semibold); }
    .qz-chips { display: flex; flex-wrap: wrap; gap: var(--av-space-2); margin-top: var(--av-space-6); }
    .qz-opt {
      display: flex; align-items: center; gap: var(--av-space-3); width: 100%;
      text-align: left; padding: var(--av-space-3) var(--av-space-4);
      border: 1px solid var(--av-border-default); border-radius: var(--av-radius-md);
      background: var(--av-surface-card); color: var(--av-text-primary);
      font: inherit; cursor: pointer;
      transition: border-color var(--av-duration-fast) var(--av-easing-default),
        background var(--av-duration-fast) var(--av-easing-default),
        transform var(--av-duration-fast) var(--av-easing-default); }
    .qz-chip { width: auto; }
    .qz-opt:hover:not(:disabled) { border-color: var(--av-primary-border);
      background: var(--av-primary-soft); transform: translateY(-1px); }
    .qz-opt:focus-visible { outline: none; box-shadow: var(--av-shadow-focus); }
    .qz-opt:disabled { cursor: default; }
    .qz-opt.is-correct { border-color: var(--av-success); background: var(--av-success-soft); }
    .qz-opt.is-wrong { border-color: var(--av-error); background: var(--av-error-soft); }
    .qz-opt__mark { margin-left: auto; font-weight: var(--av-fw-bold); }
    .qz-opt.is-correct .qz-opt__mark { color: var(--av-success); }
    .qz-opt.is-wrong .qz-opt__mark { color: var(--av-error); }

    .qz-input { width: 100%; margin-top: var(--av-space-6);
      padding: var(--av-space-3) var(--av-space-4);
      border: 1px solid var(--av-border-default); border-radius: var(--av-radius-md);
      background: var(--av-surface-card); color: var(--av-text-primary); font: inherit; }
    .qz-input:focus-visible { outline: none; border-color: var(--av-primary);
      box-shadow: var(--av-shadow-focus); }
    .qz-input.is-correct { border-color: var(--av-success); background: var(--av-success-soft); }
    .qz-input.is-wrong { border-color: var(--av-error); background: var(--av-error-soft); }

    /* Feedback panel */
    .qz-fb { margin-top: var(--av-space-6); padding: var(--av-space-4);
      border-left: 3px solid var(--av-border-default); border-radius: 0 var(--av-radius-md) var(--av-radius-md) 0;
      background: var(--av-surface-sunken); }
    .qz-fb.ok { border-left-color: var(--av-success); background: var(--av-success-soft); }
    .qz-fb.no { border-left-color: var(--av-error); background: var(--av-error-soft); }
    .qz-fb__verdict { display: flex; align-items: center; gap: var(--av-space-2);
      font-weight: var(--av-fw-semibold); }
    .qz-fb.ok .qz-fb__verdict { color: var(--av-success); }
    .qz-fb.no .qz-fb__verdict { color: var(--av-error); }
    .qz-fb__detail { margin-top: var(--av-space-2); color: var(--av-text-secondary);
      font-size: var(--av-fs-sm); line-height: var(--av-lh-relaxed); }
    .qz-fb__answer { color: var(--av-text-primary); font-weight: var(--av-fw-medium); }
    .qz-fb__review { display: inline-block; margin-top: var(--av-space-2);
      color: var(--av-primary); text-decoration: underline; font-size: var(--av-fs-sm); }

    .qz-actions { display: flex; gap: var(--av-space-3); flex-wrap: wrap;
      margin-top: var(--av-space-6); }
    .qz-audio { margin-bottom: var(--av-space-3); }
    .qz-muted { color: var(--av-text-muted); font-size: var(--av-fs-sm); }
  </style>
</head>
<body class="av-page font-sans antialiased">
  <aver-chrome active="vocabulary"></aver-chrome>

  <main class="qz-shell">
    <!-- Subpage back-link to the lesson hub (set per skill_area in JS). -->
    <header class="subpage-header">
      <div class="subpage-header__lhs">
        <a id="qz-top-back" class="subpage-header__back" href="/pages/vocab-practice.html">
          <span aria-hidden="true">←</span><span id="qz-top-back-label">Luyện tập</span>
        </a>
      </div>
    </header>

    <div id="qz-loading" class="qz-muted" style="padding:2rem 0;">Đang tải bài kiểm tra…</div>

    <div id="qz-main" class="hidden">
      <div class="qz-head">
        <h1 id="qz-title"></h1>
        <span id="qz-count" class="qz-count"></span>
      </div>
      <div class="qz-track"><div id="qz-bar" class="qz-bar"></div></div>

      <div id="qz-card" class="av-card qz-card">
        <div id="qz-audio" class="qz-audio hidden"></div>
        <p id="qz-prompt" class="qz-prompt"></p>
        <div id="qz-widget"></div>
        <div id="qz-feedback" class="hidden"></div>
        <div id="qz-actions" class="qz-actions hidden"></div>
      </div>
    </div>

    <div id="qz-summary" class="hidden av-card qz-card">
      <h2 class="text-lg font-bold">🎉 Hoàn tất phiên</h2>
      <p id="qz-summary-body" class="mt-2 text-sm"></p>
      <div class="qz-actions">
        <a id="qz-back" href="/vocabulary.html" class="av-button av-button-primary">← Quay lại</a>
        <a href="/pages/quiz-progress.html" class="av-button av-button-secondary">📊 Tiến độ của tôi</a>
      </div>
    </div>

    <p id="qz-error" class="hidden qz-fb__verdict" style="color:var(--av-error);padding:2rem 0;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="/js/api.js"></script>
  <script type="module">
    import { createEngine } from '/js/quiz-engine.js';

    initSupabase('https://nqhrtqspznepmveyurzm.supabase.co',
                 'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4');

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    // Render **bold** + the ____ blank placeholder.
    const fmt = (s) => esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/_{4,}/g, '<u>&nbsp;&nbsp;&nbsp;</u>');

    const bankId = new URLSearchParams(location.search).get('bank');
    let engine = null, sessionId = null, current = null, graded = false, startMs = Date.now();
    let pending = 0;   // attempts since last flush

    function fail(msg) {
      $('qz-loading').classList.add('hidden');
      const el = $('qz-error'); el.textContent = msg; el.classList.remove('hidden');
    }

    // Outbox: always drain the engine into it (nothing is lost). All POSTs are
    // SERIALIZED through `chain` so there's never a concurrent send; on success
    // only EXACTLY what was sent is removed (entries merged during the POST
    // survive); on failure the outbox is kept for retry. A forced flush awaits the
    // in-flight POST AND loops until the outbox is empty, so finish() never marks
    // the session complete with unsent tail progress.
    let outbox = { attempts: [], word_stats: {} };   // word_stats keyed by item_key (latest wins)
    let chain = Promise.resolve();
    let authToken = null;                            // for the keepalive unload beacon

    function _mergeIntoOutbox(batch) {
      if (batch.attempts.length) outbox.attempts = outbox.attempts.concat(batch.attempts);
      (batch.word_stats || []).forEach((w) => { outbox.word_stats[w.item_key] = w; });
    }

    const MAX_BATCH = 100;   // < backend's 200/array cap; a long offline backlog is chunked

    async function _sendOnce(force) {
      _mergeIntoOutbox(engine.drainBatch());
      // Chunk so a large buffered backlog never exceeds the backend batch limit
      // (which would 413 forever). The forced flush loop keeps calling until empty.
      const sentAttempts = outbox.attempts.slice(0, MAX_BATCH);
      const keys = Object.keys(outbox.word_stats).slice(0, MAX_BATCH);
      if (!sentAttempts.length && !keys.length) return true;     // nothing to send
      if (!force && sentAttempts.length < 5) return true;         // not enough yet (no-op)
      const sentWs = {};
      keys.forEach((k) => { sentWs[k] = outbox.word_stats[k]; });
      try {
        await window.api.post('/api/quiz/sessions/' + sessionId + '/progress',
                              { attempts: sentAttempts, word_stats: Object.values(sentWs) });
      } catch (e) { return false; }                              // keep outbox, retry later
      outbox.attempts = outbox.attempts.slice(sentAttempts.length);
      keys.forEach((k) => { if (outbox.word_stats[k] === sentWs[k]) delete outbox.word_stats[k]; });
      return true;
    }

    // Returns a promise resolving to TRUE iff everything was persisted. Serialized
    // through `chain`; a forced flush awaits the in-flight POST then loops until
    // the outbox is empty (or a send fails). finish() uses the boolean to avoid
    // marking the session completed while tail progress is still unsent.
    function flush(force) {
      if (!engine || !sessionId) return Promise.resolve(true);
      _mergeIntoOutbox(engine.drainBatch());
      pending = 0;
      const run = chain.then(async () => {
        let ok = await _sendOnce(force);
        while (force && ok && (outbox.attempts.length || Object.keys(outbox.word_stats).length)) {
          ok = await _sendOnce(true);
        }
        return ok;                       // _sendOnce never throws → resolves to ok
      });
      chain = run.catch(() => {});       // keep the chain alive for ordering
      return run;
    }

    // Unload-safe save: a normal async POST is cancelled when the page goes away.
    // fetch(keepalive) lets the request outlive the page and CAN carry the auth
    // header (sendBeacon can't). Best-effort — fires on pagehide.
    function flushBeacon() {
      try {
        _mergeIntoOutbox(engine.drainBatch());
        // Cap to the backend batch limit so the beacon isn't 413'd (best-effort:
        // the most recent chunk is what matters most for resume; periodic flushes
        // have usually drained the rest already).
        const a = outbox.attempts.slice(0, MAX_BATCH);
        const ws = Object.values(outbox.word_stats).slice(0, MAX_BATCH);
        if ((!a.length && !ws.length) || !authToken || !sessionId) return;
        fetch(window.api.base + '/api/quiz/sessions/' + sessionId + '/progress', {
          method: 'POST', keepalive: true,
          headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ attempts: a, word_stats: ws }),
        });
      } catch (e) { /* best-effort */ }
    }

    // The correct answer in display form (for revealing on a wrong answer).
    function correctAnswerText(q) {
      if (q.input === 'choice') return (q.options || [])[q.answer];
      if (q.input === 'syllable') return (q.segments || [])[q.answer];
      if (q.input === 'boolean') return (q.answer === 1 || q.answer === true) ? 'Đúng' : 'Sai';
      if (q.input === 'text') return (Array.isArray(q.accept) && q.accept[0]) || '';
      return '';
    }

    function setActions(html) {
      const a = $('qz-actions');
      a.innerHTML = html; a.classList.remove('hidden');
    }
    function clearActions() { $('qz-actions').innerHTML = ''; $('qz-actions').classList.add('hidden'); }

    function renderQuestion(item) {
      current = item; graded = false;
      const q = item.question;
      $('qz-feedback').classList.add('hidden'); $('qz-feedback').innerHTML = '';
      clearActions();
      $('qz-prompt').innerHTML = fmt(q.prompt);

      // audio
      const au = $('qz-audio');
      if (q.audio_url) {
        au.innerHTML = '<button id="qz-play" type="button" class="av-button av-button-secondary av-button-sm">🔊 Nghe</button>';
        au.classList.remove('hidden');
        $('qz-play').onclick = () => { try { new Audio(q.audio_url).play(); } catch (e) {} };
      } else { au.classList.add('hidden'); au.innerHTML = ''; }

      const w = $('qz-widget'); w.innerHTML = '';

      if (q.input === 'choice' || q.input === 'syllable') {
        const list = q.input === 'choice' ? (q.options || []) : (q.segments || []);
        const box = document.createElement('div');
        box.className = q.input === 'choice' ? 'qz-options' : 'qz-chips';
        list.forEach((opt, i) => {
          const b = document.createElement('button');
          b.className = q.input === 'choice' ? 'qz-opt' : 'qz-opt qz-chip';
          b.type = 'button';
          b.innerHTML = '<span>' + fmt(String(opt)) + '</span><span class="qz-opt__mark"></span>';
          b.onclick = () => grade(i);     // instant: click = answer
          box.appendChild(b);
        });
        w.appendChild(box);
      } else if (q.input === 'boolean') {
        const box = document.createElement('div'); box.className = 'qz-bool';
        [['Đúng', true], ['Sai', false]].forEach(([label, val]) => {
          const b = document.createElement('button');
          b.className = 'qz-opt'; b.type = 'button'; b.dataset.val = String(val);
          b.innerHTML = '<span>' + label + '</span><span class="qz-opt__mark"></span>';
          b.onclick = () => grade(val);    // instant
          box.appendChild(b);
        });
        w.appendChild(box);
      } else { // text — needs typing, so a confirm button (Enter also works)
        const inp = document.createElement('input');
        inp.className = 'qz-input'; inp.id = 'qz-text'; inp.type = 'text';
        inp.autocomplete = 'off'; inp.placeholder = 'Gõ đáp án…';
        inp.oninput = () => { const btn = $('qz-check'); if (btn) btn.disabled = !inp.value.trim(); };
        inp.onkeydown = (e) => { if (e.key === 'Enter' && inp.value.trim() && !graded) grade(inp.value); };
        w.appendChild(inp);
        setActions('<button id="qz-check" type="button" class="av-button av-button-primary" disabled>Kiểm tra</button>');
        $('qz-check').onclick = () => { if (inp.value.trim()) grade(inp.value); };
        setTimeout(() => inp.focus(), 30);
      }
    }

    // Grade immediately, reveal the correct answer + explanation, then offer "Tiếp →".
    function grade(value) {
      if (graded || !current) return;
      graded = true;
      const q = current.question;
      const res = engine.submit(value);
      pending += 1;

      // Reveal on the widget itself.
      const w = $('qz-widget');
      if (q.input === 'choice' || q.input === 'syllable') {
        const btns = w.querySelectorAll('.qz-opt');
        btns.forEach((b, j) => {
          b.disabled = true;
          if (j === q.answer) { b.classList.add('is-correct'); b.querySelector('.qz-opt__mark').textContent = '✓'; }
          if (j === value && !res.correct) { b.classList.add('is-wrong'); b.querySelector('.qz-opt__mark').textContent = '✗'; }
        });
      } else if (q.input === 'boolean') {
        const correctVal = (q.answer === 1 || q.answer === true);
        w.querySelectorAll('.qz-opt').forEach((b) => {
          b.disabled = true;
          const v = b.dataset.val === 'true';
          if (v === correctVal) { b.classList.add('is-correct'); b.querySelector('.qz-opt__mark').textContent = '✓'; }
          else if (v === value && !res.correct) { b.classList.add('is-wrong'); b.querySelector('.qz-opt__mark').textContent = '✗'; }
        });
      } else { // text
        const inp = $('qz-text');
        if (inp) { inp.disabled = true; inp.classList.add(res.correct ? 'is-correct' : 'is-wrong'); }
      }

      // Feedback panel: verdict + correct answer (if wrong) + explanation + grammar review.
      const artUrl = q && q.article_url;
      const corr = correctAnswerText(q);
      const fb = $('qz-feedback');
      fb.className = 'qz-fb ' + (res.correct ? 'ok' : 'no');
      fb.innerHTML =
        '<div class="qz-fb__verdict">' + (res.correct ? '✓ Chính xác' : '✗ Chưa đúng') + '</div>'
        + ((!res.correct && corr)
            ? '<div class="qz-fb__detail">Đáp án đúng: <span class="qz-fb__answer">' + fmt(String(corr)) + '</span></div>'
            : '')
        + (res.explain ? '<div class="qz-fb__detail">' + fmt(res.explain) + '</div>' : '')
        // Grammar: on a wrong answer, link back to the Wiki article to review.
        + ((!res.correct && artUrl)
            ? '<div><a class="qz-fb__review" href="' + esc(artUrl) + '" target="_blank" rel="noopener">📖 Ôn lại bài</a></div>'
            : '');
      fb.classList.remove('hidden');

      setActions('<button id="qz-next" type="button" class="av-button av-button-primary">Tiếp →</button>');
      $('qz-next').onclick = advance;
      $('qz-next').focus();

      updateProgress();
      flush(false);
    }

    function updateProgress() {
      const p = engine.progress();
      $('qz-count').textContent = 'Đã thuộc ' + p.mastered + '/' + p.total;
      $('qz-bar').style.width = (p.total ? Math.round(p.mastered / p.total * 100) : 0) + '%';
    }

    async function advance() {
      const item = engine.next();
      if (!item) return finish();
      renderQuestion(item);
    }

    async function finish() {
      // Persist all progress BEFORE finalizing. If the final flush fails, retry
      // once; if still failing, mark the session 'paused' (not 'completed') so a
      // resume re-sends/re-tests the unsent tail instead of treating it as done.
      let ok = await flush(true);
      if (!ok) ok = await flush(true);
      const s = engine.summary();
      try {
        await window.api.patch('/api/quiz/sessions/' + sessionId, {
          duration_sec: Math.round((Date.now() - startMs) / 1000),
          total_questions: s.total_questions, total_correct: s.total_correct, total_wrong: s.total_wrong,
          words_mastered: s.mastered, words_carried_over: s.carried_over,
          ended_by: ok ? 'completed' : 'paused',
        });
      } catch (e) {}
      $('qz-main').classList.add('hidden');
      $('qz-summary').classList.remove('hidden');
      $('qz-summary-body').innerHTML =
        'Đã thuộc <strong>' + s.mastered + '/' + s.total + '</strong> từ · '
        + s.total_questions + ' câu · đúng ' + s.total_correct + ', sai ' + s.total_wrong
        + (s.carried_over ? '<br>Cần ôn lại: ' + esc(s.carried_keys.join(', ')) : '')
        + (ok ? '' : '<br><span style="color:var(--av-error);">⚠ Một phần tiến độ chưa lưu được — sẽ thử lại ở phiên sau.</span>');
    }

    async function boot() {
      if (!bankId) return fail('Thiếu tham số bank.');
      let bank;
      try { bank = await window.api.get('/api/quiz/banks/' + encodeURIComponent(bankId)); }
      catch (e) { return fail('Không tải được bài: ' + e.message); }
      if (!bank || !bank.questions || !bank.questions.length) return fail('Bài chưa có câu hỏi.');

      let start;
      try { start = await window.api.post('/api/quiz/sessions', { bank_id: bankId }); }
      catch (e) { return fail('Không tạo được phiên: ' + e.message); }
      sessionId = start.session_id;

      // Cache the access token for the keepalive unload beacon (which needs the
      // Authorization header synchronously, before the page tears down).
      try {
        const sess = await getSupabase().auth.getSession();
        authToken = sess && sess.data && sess.data.session ? sess.data.session.access_token : null;
      } catch (e) { authToken = null; }

      engine = createEngine(bank, { resume: start.resume || [] });
      $('qz-loading').classList.add('hidden');
      $('qz-main').classList.remove('hidden');
      $('qz-title').textContent = (bank.bank && (bank.bank.title || bank.bank.code)) || 'Quick-Check';

      // Chrome highlight + back links match the bank's area (grammar → Grammar
      // Wiki, else Vocabulary). Back labels are set here (never hard-coded in
      // markup) so the area is authoritative.
      const topBack = $('qz-top-back'), topLabel = $('qz-top-back-label'), back = $('qz-back');
      const chrome = document.querySelector('aver-chrome');
      if (bank.bank && bank.bank.skill_area === 'grammar') {
        if (chrome) chrome.setAttribute('active', 'grammar');
        topBack.href = '/grammar.html'; topLabel.textContent = 'Grammar';
        back.href = '/grammar.html'; back.textContent = '← Về Grammar';
      } else {
        if (chrome) chrome.setAttribute('active', 'vocabulary');
        topBack.href = '/pages/vocab-practice.html'; topLabel.textContent = 'Luyện tập';
        back.href = '/vocabulary.html'; back.textContent = '← Về Từ vựng';
      }

      updateProgress();
      advance();
      // pagehide is the reliable "leaving" signal (mobile-safe); use a keepalive
      // beacon so buffered progress survives the unload.
      window.addEventListener('pagehide', flushBeacon);
    }

    boot();
  </script>
</body>
</html>
