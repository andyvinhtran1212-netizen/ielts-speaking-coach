<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Flashcards — Aver Learning</title>

  <!-- Sprint 6.0.1 — embedded-mode toggle. See /css/embedded-mode.css. -->
  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search);
        if (p.get('embedded') === '1') {
          document.documentElement.classList.add('embedded-mode');
        }
      } catch (e) { /* noop */ }
    })();
  </script>
  <link rel="stylesheet" href="../css/embedded-mode.css" />

  <!-- Sprint 6.11b: canonical anti-flash bootstrap (DESIGN_SYSTEM.md § 13).
       Runs AFTER the Sprint 6.0.1 IIFE because embedded-mode.test.js pins
       that block as the first script in <head> across all iframe-mounted
       children. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Aver Design System foundation (tokens before components before page CSS). -->
  <link rel="stylesheet" href="../css/aver-design/tokens.css" />
  <link rel="stylesheet" href="../css/aver-design/components.css" />
  <link rel="stylesheet" href="../css/ds.css" />
  <link rel="stylesheet" href="../css/flashcards.css" />

  <!-- Lucide icons (chrome glyphs only — Sprint 6.7+ tab/badge emoji preserved). -->
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body class="av-page font-sans min-h-screen">

  <header class="fc-header px-6 py-4">
    <div class="max-w-3xl mx-auto flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <a href="home.html" class="fc-back-link text-sm font-medium flex items-center gap-1">
          <i data-lucide="chevron-left"></i>
          Trang chủ
        </a>
        <span class="fc-header__sep">|</span>
        <h1 class="fc-header__title text-base font-semibold">📚 Flashcards</h1>
      </div>
      <button class="av-theme-toggle" type="button" aria-label="Chuyển giao diện sáng/tối">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <!-- Sprint 6.0 — banner pointing at unified Vocabulary landing.
         Hidden when embedded as a tab iframe (URL ?embedded=1). -->
    <div id="vocab-moved-banner" class="fc-banner rounded-lg p-3 mb-5 text-sm flex items-center gap-3 hidden">
      <span class="fc-banner__icon" aria-hidden="true">📍</span>
      <div class="fc-banner__body">
        Flashcards giờ là một tab trong trang
        <a href="/pages/vocabulary.html#flashcards" class="fc-banner__link">Từ vựng</a>
        — quản lý vocab + ôn flashcards trong một nơi.
      </div>
    </div>
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          if (params.get('embedded') !== '1') {
            document.getElementById('vocab-moved-banner').classList.remove('hidden');
          }
        } catch (e) { /* best-effort */ }
      })();
    </script>

    <!-- flashcards.js renders into #fc-container -->
    <div id="fc-container">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- Create Stack Modal -->
  <div id="fc-modal" class="modal-backdrop">
    <div class="modal">
      <h2>Tạo stack mới</h2>

      <div class="modal-section">
        <label class="modal-label" for="m-name">Tên stack</label>
        <input id="m-name" class="modal-input" type="text" maxlength="50"
               placeholder="VD: Business words from January" />
      </div>

      <div class="modal-section">
        <label class="modal-label">Chủ đề</label>
        <div id="m-topics" class="chip-group">
          <!-- populated by flashcards.js -->
          <span class="fc-modal-loading">Đang tải…</span>
        </div>
      </div>

      <div class="modal-section">
        <label class="modal-label">Phân loại</label>
        <div class="chip-group">
          <span class="chip" data-cat="used_well">Dùng tốt</span>
          <span class="chip" data-cat="needs_review">Cần ôn lại</span>
          <span class="chip" data-cat="upgrade_suggested">Có thể nâng cấp</span>
          <span class="chip" data-cat="manual">Thêm thủ công</span>
        </div>
      </div>

      <div class="modal-section">
        <label class="modal-label" for="m-search">Tìm kiếm trong từ / định nghĩa (tuỳ chọn)</label>
        <input id="m-search" class="modal-input" type="text" placeholder="VD: implement" />
      </div>

      <div class="modal-section">
        <label class="modal-label" for="m-after">Thêm sau ngày (tuỳ chọn)</label>
        <input id="m-after" class="modal-input" type="date" />
      </div>

      <div class="modal-section">
        <label class="modal-label">Xem trước</label>
        <div id="m-preview" class="preview-box">
          <span class="fc-modal-loading">Chọn bộ lọc để xem số thẻ phù hợp.</span>
        </div>
      </div>

      <div class="modal-actions">
        <button id="m-cancel" class="btn-ghost">Hủy</button>
        <button id="m-save" class="btn-primary" disabled>Lưu</button>
      </div>
    </div>
  </div>

  <div id="fc-toast" class="toast"></div>

  <!-- order matters: supabase CDN → api.js → initSupabase → flashcards.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/api.js"></script>
  <script>
    initSupabase(
      'https://nqhrtqspznepmveyurzm.supabase.co',
      'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4'
    );
  </script>
  <script src="../js/flashcards.js"></script>

  <!-- Lucide hydration + theme toggle binding (Sprint 6.11b) -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      function bindToggleButton() {
        var btn = document.querySelector('.av-theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('av-theme', next); } catch (e) {}
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          hydrateIcons(); bindToggleButton();
        });
      } else {
        hydrateIcons(); bindToggleButton();
      }
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
</body>
</html>
