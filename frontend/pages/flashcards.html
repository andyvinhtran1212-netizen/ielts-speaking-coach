<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Flashcards — IELTS Speaking Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <style>
    body { background: #0a1628; }

    .stack-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(15,118,110,0.06) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      cursor: pointer;
      position: relative;
    }
    .stack-card:hover {
      transform: translateY(-3px);
      border-color: rgba(20,184,166,0.4);
      box-shadow: 0 12px 28px rgba(15,118,110,0.18);
    }
    .stack-card.disabled { opacity: 0.5; cursor: not-allowed; }
    .stack-card.disabled:hover { transform: none; }

    .stack-icon { font-size: 28px; }
    .stack-name { font-size: 15px; font-weight: 600; color: #fff; margin-top: 8px; }
    .stack-meta { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }

    .pill-auto {
      display: inline-block; font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
      background: rgba(99,102,241,0.15); color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.3);
    }
    .pill-manual {
      display: inline-block; font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
      background: rgba(20,184,166,0.15); color: #5eead4;
      border: 1px solid rgba(20,184,166,0.3);
    }

    .delete-btn {
      position: absolute; top: 12px; right: 12px;
      width: 26px; height: 26px; border-radius: 8px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; transition: opacity 0.15s;
    }
    .stack-card:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { background: rgba(239,68,68,0.2); }

    /* Buttons */
    .btn-primary, .btn-secondary, .btn-ghost {
      font-size: 14px; font-weight: 500; padding: 9px 16px; border-radius: 10px;
      cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
    }
    .btn-primary { background: rgba(20,184,166,0.18); border-color: rgba(20,184,166,0.4); color: #14b8a6; }
    .btn-primary:hover { background: rgba(20,184,166,0.28); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }
    .btn-ghost { background: transparent; color: rgba(255,255,255,0.5); }
    .btn-ghost:hover { color: rgba(255,255,255,0.85); }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: flex-start; justify-content: center;
      z-index: 50; padding: 5vh 16px; overflow-y: auto;
    }
    .modal-backdrop.visible { display: flex; }
    .modal {
      width: 100%; max-width: 520px;
      background: #0f1f3a; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 22px;
    }
    .modal h2 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    .modal-section { margin-bottom: 16px; }
    .modal-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 6px; display: block; }
    .modal-input, .modal-select {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 14px;
    }
    .modal-input:focus, .modal-select:focus {
      outline: none; border-color: rgba(20,184,166,0.5);
    }

    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 12px; padding: 6px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.15s;
      user-select: none;
    }
    .chip.active {
      background: rgba(20,184,166,0.18); border-color: rgba(20,184,166,0.5); color: #5eead4;
    }

    .preview-box {
      margin-top: 8px; padding: 12px; border-radius: 10px;
      background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.12);
      font-size: 13px; color: rgba(255,255,255,0.65); min-height: 56px;
    }
    .preview-count { color: #5eead4; font-weight: 600; }
    .preview-words { margin-top: 6px; color: rgba(255,255,255,0.5); font-style: italic; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* States */
    .state-msg { color: rgba(255,255,255,0.4); text-align: center; padding: 56px 16px; font-size: 14px; }
    .state-msg.error { color: #fca5a5; }
    .empty-cta {
      display: inline-block; margin-top: 18px; padding: 9px 18px;
      border-radius: 10px; background: rgba(20,184,166,0.18);
      border: 1px solid rgba(20,184,166,0.4); color: #14b8a6;
      font-size: 13px; font-weight: 500; text-decoration: none;
    }
    .empty-cta:hover { background: rgba(20,184,166,0.28); }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto;
      border: 3px solid rgba(20,184,166,0.2); border-top-color: #14b8a6;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 16px; border-radius: 10px; font-size: 13px;
      z-index: 60; pointer-events: none; opacity: 0; transition: opacity 0.2s;
    }
    .toast.visible { opacity: 1; }
    .toast.success { background: rgba(20,184,166,0.18); border: 1px solid rgba(20,184,166,0.4); color: #5eead4; }
    .toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.4);  color: #fca5a5; }
  </style>
</head>
<body class="text-slate-100 font-sans min-h-screen">

  <header style="background:#0C2340; border-bottom:1px solid rgba(255,255,255,0.06);" class="px-6 py-4">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="dashboard.html" class="text-sm font-medium flex items-center gap-1 hover:opacity-80" style="color:#14b8a6; text-decoration:none;">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          Dashboard
        </a>
        <span class="text-slate-600">|</span>
        <h1 class="text-base font-semibold text-slate-200">📚 Flashcards</h1>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <!-- flashcards.js renders into #fc-container -->
    <div id="fc-container">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- Create Stack Modal -->
  <div id="fc-modal" class="modal-backdrop">
    <div class="modal">
      <h2>Tạo stack mới</h2>

      <div class="modal-section">
        <label class="modal-label" for="m-name">Tên stack</label>
        <input id="m-name" class="modal-input" type="text" maxlength="50"
               placeholder="VD: Business words from January" />
      </div>

      <div class="modal-section">
        <label class="modal-label">Chủ đề</label>
        <div id="m-topics" class="chip-group">
          <!-- populated by flashcards.js -->
          <span class="text-xs text-slate-500">Đang tải…</span>
        </div>
      </div>

      <div class="modal-section">
        <label class="modal-label">Phân loại</label>
        <div class="chip-group">
          <span class="chip" data-cat="used_well">Dùng tốt</span>
          <span class="chip" data-cat="needs_review">Cần ôn lại</span>
          <span class="chip" data-cat="upgrade_suggested">Có thể nâng cấp</span>
          <span class="chip" data-cat="manual">Thêm thủ công</span>
        </div>
      </div>

      <div class="modal-section">
        <label class="modal-label" for="m-search">Tìm kiếm trong từ / định nghĩa (tuỳ chọn)</label>
        <input id="m-search" class="modal-input" type="text" placeholder="VD: implement" />
      </div>

      <div class="modal-section">
        <label class="modal-label" for="m-after">Thêm sau ngày (tuỳ chọn)</label>
        <input id="m-after" class="modal-input" type="date" />
      </div>

      <div class="modal-section">
        <label class="modal-label">Xem trước</label>
        <div id="m-preview" class="preview-box">
          <span class="text-xs text-slate-500">Chọn bộ lọc để xem số thẻ phù hợp.</span>
        </div>
      </div>

      <div class="modal-actions">
        <button id="m-cancel" class="btn-ghost">Hủy</button>
        <button id="m-save" class="btn-primary" disabled>Lưu</button>
      </div>
    </div>
  </div>

  <div id="fc-toast" class="toast"></div>

  <!-- order matters: supabase CDN → api.js → initSupabase → flashcards.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/api.js"></script>
  <script>
    initSupabase(
      'https://nqhrtqspznepmveyurzm.supabase.co',
      'sb_publishable_a_vDrA0c3mT-QlASPW7yhw_YZnUsfT4'
    );
  </script>
  <script src="../js/flashcards.js"></script>
</body>
</html>
