<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary — Aver Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0C2340', light: '#112d52', dark: '#081829' },
            teal: { DEFAULT: '#0F766E', light: '#14b8a6', dark: '#0d5f58' },
          },
          fontFamily: { sans: ['DM Sans', 'ui-sans-serif', 'system-ui'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ds.css" />
  <style>
    body {
      background: #07111f;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      font-family: 'DM Sans', ui-sans-serif, system-ui;
    }
    .headword-title { font-family: 'Lora', serif; }

    /* Article body typography */
    .article-body h2 {
      font-family: 'Lora', serif; font-size: 1.25rem; font-weight: 600;
      color: rgba(255,255,255,0.9); margin-top: 2rem; margin-bottom: 0.75rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .article-body p {
      color: rgba(255,255,255,0.72); line-height: 1.75; margin-bottom: 1rem; font-size: 15px;
    }
    .article-body strong { color: #14b8a6; font-weight: 600; }
    .article-body blockquote {
      border-left: 3px solid rgba(20,184,166,0.4);
      padding: 10px 16px; margin: 12px 0;
      background: rgba(20,184,166,0.04);
      border-radius: 0 8px 8px 0;
      color: rgba(255,255,255,0.65);
      font-style: italic; font-size: 14px; line-height: 1.7;
    }
    .article-body ul {
      list-style: none; margin-bottom: 1rem; padding: 0;
    }
    .article-body ul li {
      color: rgba(255,255,255,0.65); font-size: 14px; padding: 3px 0;
      padding-left: 1rem; position: relative;
    }
    .article-body ul li::before {
      content: '·'; position: absolute; left: 0; color: #14b8a6;
    }

    .tag-chip {
      display: inline-flex; align-items: center;
      background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.2);
      color: #14b8a6; border-radius: 999px;
      padding: 3px 10px; font-size: 12px; font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .tag-chip:hover { background: rgba(20,184,166,0.18); border-color: rgba(20,184,166,0.4); }

    .tts-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; padding: 6px 14px;
      color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer;
      transition: all 0.18s;
    }
    .tts-btn:hover { background: rgba(20,184,166,0.12); border-color: rgba(20,184,166,0.3); color: #14b8a6; }
    .tts-btn.speaking { border-color: rgba(20,184,166,0.5); color: #14b8a6; }

    .meta-badge {
      display: inline-flex; align-items: center;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 3px 10px;
      color: rgba(255,255,255,0.55); font-size: 12px; font-weight: 500;
    }

    .related-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      text-decoration: none; display: block;
    }
    .related-card:hover {
      border-color: rgba(20,184,166,0.3); background: rgba(20,184,166,0.05);
    }

    #loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 9999px; }
  </style>
</head>
<body class="min-h-screen text-white">

  <!-- Nav -->
  <nav class="border-b border-white/5 bg-black/20 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="../vocabulary.html" class="text-white/60 hover:text-white transition-colors text-sm font-medium">← Vocabulary Wiki</a>
      <span id="nav-breadcrumb" class="text-white/25 text-sm truncate"></span>
    </div>
  </nav>

  <!-- Loading -->
  <div id="loading-state">
    <div class="flex gap-2 items-center text-white/30 text-sm">
      <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      Đang tải...
    </div>
  </div>

  <!-- Error -->
  <div id="error-state" class="hidden text-center py-20">
    <p class="text-white/40 text-sm mb-3">Không tìm thấy từ vựng này.</p>
    <a href="../vocabulary.html" class="text-teal-light text-sm hover:underline">← Quay lại Vocabulary Wiki</a>
  </div>

  <!-- Article -->
  <article id="article-content" class="hidden max-w-4xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Main column -->
      <div class="lg:col-span-2">
        <!-- Header -->
        <header class="mb-8">
          <div class="flex flex-wrap items-center gap-2 mb-3">
            <span id="meta-category" class="meta-badge"></span>
            <span id="meta-level" class="meta-badge text-amber-300/70 border-amber-300/15"></span>
            <span id="meta-pos" class="meta-badge"></span>
          </div>
          <h1 id="headword" class="headword-title text-5xl md:text-6xl font-bold text-white mb-2"></h1>
          <div class="flex items-center gap-3 mb-4">
            <span id="pronunciation" class="text-teal-light text-lg font-mono"></span>
            <button id="tts-btn" class="tts-btn" onclick="speakHeadword()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              </svg>
              Nghe
            </button>
          </div>
        </header>

        <!-- Article body -->
        <div id="article-body" class="article-body"></div>
      </div>

      <!-- Sidebar -->
      <aside class="space-y-6">
        <!-- Synonyms -->
        <div id="synonyms-box" class="hidden">
          <div class="text-xs font-semibold uppercase tracking-widest text-white/30 mb-2">Từ đồng nghĩa</div>
          <div id="synonyms-list" class="flex flex-wrap gap-1.5"></div>
        </div>

        <!-- Antonyms -->
        <div id="antonyms-box" class="hidden">
          <div class="text-xs font-semibold uppercase tracking-widest text-white/30 mb-2">Từ trái nghĩa</div>
          <div id="antonyms-list" class="flex flex-wrap gap-1.5"></div>
        </div>

        <!-- Collocations -->
        <div id="collocations-box" class="hidden">
          <div class="text-xs font-semibold uppercase tracking-widest text-white/30 mb-2">Collocations</div>
          <div id="collocations-list" class="space-y-1"></div>
        </div>

        <!-- Related words -->
        <div id="related-box" class="hidden">
          <div class="text-xs font-semibold uppercase tracking-widest text-white/30 mb-3">Từ liên quan</div>
          <div id="related-list" class="space-y-2"></div>
        </div>
      </aside>
    </div>
  </article>

  <script src="../js/api.js"></script>
  <script src="../js/vocabulary.js"></script>
</body>
</html>
