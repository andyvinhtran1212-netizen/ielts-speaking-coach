<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Skill Practice — Aver Learning</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/reading-vocab.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2.107.0" defer></script>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/components/aver-chrome.js"></script>
</head>
<body class="av-page">

  <aver-chrome active="reading"></aver-chrome>

  <div class="shell">
    <main class="rv-shell">
      <header class="rv-header">
        <p class="eyebrow"><a href="/pages/home.html" style="color: var(--av-text-secondary);">← Trang chủ</a></p>
        <h1>Skill Practice <span class="accent">·</span> <span style="color: var(--av-text-muted);">Luyện kỹ năng</span></h1>
        <p class="subtitle">Chọn một bài luyện theo kỹ năng đọc — skimming, scanning, detail, inference… — và kiểm tra hiểu ngay sau khi đọc.</p>
      </header>

      <!-- Library switcher: L1 ↔ L2 ↔ L3 (Sprint 20.6 adds the Full Test entry). -->
      <nav class="rv-libnav" aria-label="Reading libraries">
        <a class="rv-libnav__link" href="/pages/reading-vocab.html">Vocab Reading</a>
        <a class="rv-libnav__link is-active" aria-current="page">Skill Practice</a>
        <a class="rv-libnav__link" href="/pages/reading-test.html">Full Tests</a>
        <a class="rv-libnav__link" href="/pages/reading-mini-test.html">Mini Tests</a>
      </nav>

      <div class="rv-filters">
        <label>Trình độ
          <select id="filter-difficulty">
            <option value="">Tất cả</option>
            <option value="foundation">Foundation</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </label>
        <label>Kỹ năng
          <select id="filter-skill">
            <option value="">Tất cả</option>
            <option value="skimming">Skimming</option>
            <option value="scanning">Scanning</option>
            <option value="detail">Detail</option>
            <option value="main_idea">Main idea</option>
            <option value="inference">Inference</option>
            <option value="vocabulary_in_context">Vocab in context</option>
            <option value="reference_cohesion">Reference / cohesion</option>
            <option value="writer_view_TFNG">Writer's view (T/F/NG)</option>
          </select>
        </label>
      </div>

      <div class="rv-empty" id="state-loading">Đang tải…</div>
      <div class="rv-empty" id="state-empty" hidden>Chưa có bài luyện kỹ năng nào khớp bộ lọc.</div>
      <div class="rv-error" id="state-error" hidden></div>

      <div class="rv-grid" id="rv-grid" hidden></div>
    </main>
  </div>

  <script type="module" src="/js/reading-skill.js"></script>
</body>
</html>
