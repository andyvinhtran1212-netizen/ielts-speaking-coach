<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Flashcards — Aver Learning</title>

  <!-- Sprint 7.6 — DEBT-2026-05-09-B CLOSED. The page is a standalone
       shell; the embedded path goes through /js/vocab-modules/flashcards.js
       mounted into vocabulary.html. The Sprint 6.0.1 embedded-mode IIFE
       and the matching embedded-mode.css stylesheet have been retired. -->

  <!-- Sprint 6.11b: canonical anti-flash bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Aver Design System foundation (tokens before components before page CSS). -->
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/ds.css" />
  <link rel="stylesheet" href="/css/flashcards.css" />
  <!-- P0-3 C-3.4: static Tailwind loaded LAST (after page CSS) to match the
       Play-CDN cascade — utilities/.hidden win over same-specificity page rules. -->
  <link rel="stylesheet" href="/css/tailwind.build.css" />

  <!-- Lucide icons (chrome glyphs only — Sprint 6.7+ tab/badge emoji preserved). -->
  <script src="https://unpkg.com/lucide@1.17.0" defer></script>

  <!-- Canonical chrome Web Component (Sprint 7.13). -->
  <script type="module" src="/js/components/aver-chrome.js"></script>
</head>
<body class="av-page font-sans min-h-screen">

  <!-- Canonical chrome (Sprint 7.13 — <aver-chrome>; vocabulary active). -->
  <aver-chrome active="vocabulary"></aver-chrome>
  <!-- Sprint 7.4 — module mount container. The page body (context bar,
       banner, stack list, create-stack modal, toast) lives inside the
       /js/vocab-modules/flashcards.js template and is injected here. -->
  <main id="mount" class="vocab-module-mount"></main>

  <!-- Order matters: supabase CDN → api.js → bootstrap → vocab module. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="../js/runtime-config.js"></script>
  <script src="../js/api.js"></script>
  <script>
    initSupabase(
      'https://huwsmtubwulikhlmcirx.supabase.co',
      'sb_publishable_hvevBST9lgIWRd5ITHtUpA_SYjiX6Ao'
    );
  </script>

  <!-- Lucide hydration + canonical theme/user-pill wiring (Sprint 6.17.1). -->
  <script>
    (function () {
      function hydrateIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      }
      hydrateIcons();
      var obs = new MutationObserver(function () { hydrateIcons(); });
      obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      window.addEventListener('load', hydrateIcons);
    })();
  </script>
  <!-- Sprint 7.4 — mount the flashcards module into <main id="mount">.
       embedded:false because this is the standalone shell. -->
  <script type="module">
    import { mount } from '/js/vocab-modules/flashcards.js';
    mount(document.getElementById('mount'), { embedded: false });
  </script>
</body>
</html>
