<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Vocabulary — Aver Learning</title>

  <!-- Canonical anti-flash theme bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/vocab-wiki.css" />
  <link rel="stylesheet" href="/css/markdown.css" />
  <!-- P0-3 C-3.4: static Tailwind loaded LAST. -->
  <link rel="stylesheet" href="/css/tailwind.build.css" />

  <style>
    /* Article markdown body — themed via tokens (the 20 seed words carry their
       definitions/examples in the body; structured fields are empty for them). */
    #article-body { max-width: 580px; margin-top: var(--av-space-6); }
    #article-body h2 {
      font-family: 'Fraunces', Georgia, serif; font-size: 1.2rem; font-weight: 600;
      color: var(--av-text-primary); margin: var(--av-space-8) 0 var(--av-space-3);
      padding-bottom: var(--av-space-2); border-bottom: 1px solid var(--av-border-subtle);
    }
    #article-body p { color: var(--av-text-secondary); line-height: 1.75; margin-bottom: var(--av-space-4); font-size: 15px; }
    #article-body strong { color: var(--av-primary); font-weight: 600; }
    #article-body blockquote {
      border-left: 3px solid var(--av-vocab-jade-line);
      padding: 10px 16px; margin: 12px 0; background: var(--av-vocab-jade-tint);
      border-radius: 0 var(--av-radius-md) var(--av-radius-md) 0;
      color: var(--av-text-secondary); font-style: italic; font-size: 14px; line-height: 1.7;
    }
    #article-body ul { list-style: none; margin-bottom: var(--av-space-4); padding: 0; }
    #article-body ul li { color: var(--av-text-secondary); font-size: 14px; padding: 3px 0 3px 1rem; position: relative; }
    #article-body ul li::before { content: '·'; position: absolute; left: 0; color: var(--av-vocab-jade); }

    .va-subnav { max-width: 1060px; margin: 0 auto; padding: var(--av-space-4) var(--av-space-4) 0; }
    .va-subnav a { color: var(--av-text-muted); text-decoration: none; font-size: 14px; font-family: 'Hanken Grotesk', system-ui, sans-serif; }
    .va-subnav a:hover { color: var(--av-text-primary); }
    .va-subnav .crumb { color: var(--av-text-faint); margin-left: var(--av-space-2); }
  </style>

  <script src="https://unpkg.com/lucide@1.17.0" defer></script>
  <script type="module" src="/js/components/aver-chrome.js"></script>
</head>
<body class="av-page min-h-screen">

  <!-- Canonical chrome — Vocabulary active. -->
  <aver-chrome active="vocabulary"></aver-chrome>

  <!-- Wiki sub-nav breadcrumb (mirrors grammar-article's gw-subnav). -->
  <nav class="va-subnav" aria-label="Vocabulary Wiki">
    <a href="/vocabulary.html">← Vocabulary Wiki</a>
    <span id="nav-breadcrumb" class="crumb"></span>
  </nav>

  <div class="va-wrap">
    <!-- Loading -->
    <div id="loading-state" class="va-empty">Đang tải…</div>

    <!-- Error -->
    <div id="error-state" class="hidden va-empty">
      <p>Không tìm thấy từ vựng này.</p>
      <a href="/vocabulary.html" class="va-eyebrow" style="text-transform:none;">← Quay lại Vocabulary Wiki</a>
    </div>

    <!-- Article — renderArticle() fills this with the v2 detail card + body. -->
    <article id="article-content" class="hidden"></article>
  </div>

  <!-- Supabase must initialise BEFORE any api.js request runs so a logged-in
       user's flag/analytics events carry an Authorization header (and are stored
       user-attributed, not user_id=NULL). The other vocab surfaces do this; the
       standalone article page previously skipped it. Order: supabase CDN →
       api.js → initSupabase → vocabulary.js. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0"></script>
  <script src="../js/runtime-config.js"></script>
  <script src="../js/api.js"></script>
  <script>
    var SUPABASE_URL  = 'https://huwsmtubwulikhlmcirx.supabase.co';
    var SUPABASE_ANON = 'sb_publishable_hvevBST9lgIWRd5ITHtUpA_SYjiX6Ao';
    try { initSupabase(SUPABASE_URL, SUPABASE_ANON); } catch (_) {}
  </script>
  <script src="../js/vocabulary.js"></script>
</body>
</html>
