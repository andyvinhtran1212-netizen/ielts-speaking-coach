<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Báo lỗi · Admin</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/aver-design/admin-buttons.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2.107.0" defer></script>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>

  <style>
    body.av-page { font-family: var(--av-font-sans); margin: 0; }
    .el-shell {
      max-width: 1200px; margin: 0 auto;
      padding: var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-6);
    }
    .el-header h1 { font-size: var(--av-fs-2xl); font-weight: var(--av-fw-semibold); margin-bottom: var(--av-space-1); }
    .el-header .subtitle { color: var(--av-text-secondary); font-size: var(--av-fs-sm); }

    .el-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--av-space-3);
    }
    .el-stat-card {
      padding: var(--av-space-4);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
    }
    .el-stat-card.is-warning {
      border-color: var(--av-warning, var(--av-brand-amber-400));
    }
    .el-stat-card .label {
      font-size: var(--av-fs-xs); color: var(--av-text-muted);
      text-transform: uppercase; letter-spacing: var(--av-tracking-wide);
    }
    .el-stat-card .value {
      font-size: var(--av-fs-2xl);
      font-weight: var(--av-fw-semibold);
      color: var(--av-text-primary);
      margin-top: 4px;
    }

    .el-toolbar {
      display: flex; gap: var(--av-space-3);
      align-items: flex-end; flex-wrap: wrap;
      justify-content: space-between;
    }
    .el-filter-bar { display: flex; gap: var(--av-space-3); flex-wrap: wrap; }
    .el-filter { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
    .el-filter label {
      font-size: var(--av-fs-xs); color: var(--av-text-muted);
      text-transform: uppercase; letter-spacing: var(--av-tracking-wide);
    }
    .el-filter select {
      padding: 8px 12px;
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      color: var(--av-text-primary);
      font-size: var(--av-fs-sm);
    }

    /* admin buttons → admin-buttons.css bridge (design-fix-2 B3) */
    .btn-ghost {
      padding: 4px 10px; border-radius: var(--av-radius-sm);
      background: transparent; color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default); cursor: pointer;
      font-size: var(--av-fs-xs);
    }

    .el-table-wrap {
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      overflow-x: auto;
    }
    table.el-table { width: 100%; border-collapse: collapse; }
    table.el-table th, table.el-table td {
      padding: var(--av-space-3) var(--av-space-4);
      text-align: left;
      font-size: var(--av-fs-sm);
      border-bottom: 1px solid var(--av-border-default);
      vertical-align: top;
    }
    table.el-table th {
      font-weight: var(--av-fw-semibold);
      color: var(--av-text-secondary);
      background: var(--av-surface-sunken);
      font-size: var(--av-fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--av-tracking-wide);
    }
    table.el-table tr.is-dismissed { opacity: 0.55; }

    .el-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--av-radius-pill);
      font-size: var(--av-fs-xs);
      font-weight: var(--av-fw-medium);
      background: var(--av-surface-sunken);
      color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default);
    }
    .el-chip.is-error   { border-color: #FECACA; color: #991B1B; }
    .el-chip.is-warning { border-color: var(--av-brand-amber-400); color: var(--av-text-primary); }
    .el-chip.is-info    { border-color: var(--av-brand-teal-200); color: var(--av-brand-teal-800); }

    .el-detail {
      padding: var(--av-space-3) var(--av-space-4);
      background: var(--av-surface-sunken);
      border-top: 1px dashed var(--av-border-default);
      display: flex; flex-direction: column; gap: var(--av-space-3);
    }
    .el-detail pre {
      margin: 0;
      padding: var(--av-space-3);
      background: var(--av-surface-card);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-sm);
      font-family: var(--av-font-mono);
      font-size: var(--av-fs-xs);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 280px;
      overflow-y: auto;
    }

    .el-empty, .el-loading {
      padding: var(--av-space-8);
      text-align: center;
      color: var(--av-text-muted);
      font-size: var(--av-fs-sm);
    }

    .el-status-banner {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      font-size: var(--av-fs-sm);
    }
    .el-status-banner.is-success { background: #ECFDF5; color: var(--av-brand-teal-800); border: 1px solid var(--av-brand-teal-200); }
    .el-status-banner.is-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }

    [hidden] { display: none !important; }

    @media (max-width: 768px) {
      .el-stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body class="av-page">
  <aver-admin-chrome active="error-logs">

    <main class="el-shell">
      <header class="el-header">
        <h1>Báo lỗi</h1>
        <p class="subtitle">
          Frontend + backend exception log. Đánh dấu xử lý sau khi triage.
        </p>
      </header>

      <div class="el-status-banner" id="status-banner" hidden></div>

      <section class="el-stats-grid" aria-label="Tổng quan báo lỗi">
        <div class="el-stat-card" id="stat-total">
          <div class="label">Tổng số</div>
          <div class="value" data-stat="total">—</div>
        </div>
        <div class="el-stat-card is-warning" id="stat-undismissed">
          <div class="label">Chưa xử lý</div>
          <div class="value" data-stat="undismissed">—</div>
        </div>
        <div class="el-stat-card" id="stat-24h">
          <div class="label">24 giờ qua</div>
          <div class="value" data-stat="last_24h">—</div>
        </div>
        <div class="el-stat-card" id="stat-7d">
          <div class="label">7 ngày qua</div>
          <div class="value" data-stat="last_7d">—</div>
        </div>
      </section>

      <!-- ADR-012 cutover dashboard (FE Next.js migration, Pilot Entry):
           error counts by implementation/release so a migrated route's error
           rate is comparable against legacy on the same release. Rendered by
           admin-error-logs.js from GET /admin/error-logs/migration-stats. -->
      <section class="el-stat-card el-migration-panel" id="migration-stats-panel"
               aria-label="Migration theo implementation/release">
        <div class="label">Migration (ADR-012) — lỗi 7 ngày theo implementation/release
          <span id="migration-serving"></span></div>
        <div id="migration-stats-body">—</div>
      </section>

      <div class="el-toolbar">
        <div class="el-filter-bar">
          <div class="el-filter">
            <label for="filter-dismissed">Trạng thái</label>
            <select id="filter-dismissed">
              <option value="false" selected>Chưa xử lý</option>
              <option value="true">Đã xử lý</option>
              <option value="">Tất cả</option>
            </select>
          </div>
          <div class="el-filter">
            <label for="filter-level">Mức độ</label>
            <select id="filter-level">
              <option value="">Tất cả</option>
              <option value="error">error</option>
              <option value="warning">warning</option>
              <option value="info">info</option>
            </select>
          </div>
          <div class="el-filter">
            <label for="filter-source">Nguồn</label>
            <select id="filter-source">
              <option value="">Tất cả</option>
              <option value="frontend">Frontend</option>
              <option value="backend">Backend</option>
            </select>
          </div>
          <div class="el-filter" style="justify-content:flex-end;">
            <label for="filter-hide-noise" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
              <input type="checkbox" id="filter-hide-noise" checked />
              Ẩn nhiễu (bên thứ 3 / thử nghiệm)
            </label>
          </div>
        </div>
        <div style="display:flex; gap: var(--av-space-2);">
          <button class="btn-secondary" id="btn-test-error" type="button">Tạo lỗi test</button>
          <button class="btn-primary"   id="btn-refresh"    type="button">Tải lại</button>
        </div>
      </div>

      <div class="el-loading" id="logs-loading" hidden>Đang tải…</div>
      <div class="el-empty"   id="logs-empty" hidden>
        Chưa có lỗi nào — đây là tin tốt 🎉
      </div>

      <div class="el-table-wrap" id="logs-table-wrap">
        <table class="el-table">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Mức độ</th>
              <th>Nguồn</th>
              <th>Thông báo</th>
              <th>URL</th>
              <th>User</th>
              <th>Trạng thái</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="logs-tbody"><tr><td colspan="8" class="text-center py-6 text-sm" style="color:var(--av-text-muted,#9ca3af)">Đang tải…</td></tr></tbody>
        </table>
      </div>
    </main>

  </aver-admin-chrome>

  <script type="module" src="/js/components/aver-admin-chrome.js"></script>
  <script src="/js/error-reporter.js"></script>
  <script type="module" src="/js/admin-error-logs.js"></script>
</body>
</html>
