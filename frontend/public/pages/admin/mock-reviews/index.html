<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Duyệt thi thử 4 kỹ năng — Admin</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light'));
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/aver-design/admin-components.css" />
  <link rel="stylesheet" href="/css/aver-design/admin-buttons.css" />
  <link rel="stylesheet" href="/css/aver-design/admin-status.css" />
  <style>
    .mr-wrap { max-width:1120px; margin:0 auto; padding:var(--av-space-6) var(--av-space-4) var(--av-space-16); }
    .mr-title { font-size:var(--av-fs-2xl,22px); font-weight:800; color:var(--av-text-primary); margin-bottom:var(--av-space-1); line-height:var(--av-lh-snug,1.4); }
    .mr-sub { color:var(--av-text-secondary); font-size:13px; margin-bottom:var(--av-space-2); line-height:1.55; }
    .mr-examhdr { font-weight:700; color:var(--av-text-primary); margin-bottom:var(--av-space-6); }
    .mr-card { border:1px solid var(--av-border-subtle); border-radius:var(--av-radius-lg); background:var(--av-surface-card); padding:var(--av-space-4); box-shadow:var(--av-shadow-sm); }
    .mr-toolbar { display:flex; gap:var(--av-space-2); align-items:center; margin-bottom:var(--av-space-3); }
    .mr-pill { display:inline-block; font-size:11px; padding:2px var(--av-space-2); border-radius:var(--av-radius-pill); background:var(--av-surface-sunken); border:1px solid var(--av-border-subtle); color:var(--av-text-secondary); letter-spacing:.02em; }
    .mr-tabs { display:flex; gap:var(--av-space-1); margin:var(--av-space-4) 0; flex-wrap:wrap; }
    .mr-tab { padding:var(--av-space-2) var(--av-space-3); border:1px solid var(--av-border-default); border-radius:var(--av-radius-md); background:var(--av-surface-card); cursor:pointer; font-size:13px; color:var(--av-text-primary); }
    .mr-tab.active { background:var(--av-primary); color:var(--av-text-on-primary); border-color:transparent; }
    .mr-panel { display:none; border:1px solid var(--av-border-subtle); border-radius:var(--av-radius-lg); padding:var(--av-space-4); background:var(--av-surface-card); }
    .mr-panel.active { display:block; }
    .mr-band-form { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:var(--av-space-3); margin:var(--av-space-3) 0; }
    .mr-band-form label { font-size:12px; color:var(--av-text-secondary); display:block; margin-bottom:var(--av-space-1); }
    .mr-band-form input { width:100%; padding:var(--av-space-2); border:1px solid var(--av-border-default); border-radius:var(--av-radius-md); background:var(--av-surface-card); color:var(--av-text-primary); font-family:var(--av-font-mono); font-size:16px; text-align:center; }
    .mr-essay { white-space:pre-wrap; background:var(--av-surface-sunken); border:1px solid var(--av-border-subtle); border-radius:var(--av-radius-md); padding:var(--av-space-3); line-height:1.7; color:var(--av-text-primary); max-height:360px; overflow:auto; }
    textarea.mr-input { width:100%; min-height:90px; padding:var(--av-space-3); border:1px solid var(--av-border-default); border-radius:var(--av-radius-md); background:var(--av-surface-card); color:var(--av-text-primary); font:inherit; line-height:1.6; }
    .mr-muted { color:var(--av-text-secondary); font-size:13px; }
    /* roster grid (bảng lớp) */
    .mr-bulkbar { display:flex; align-items:center; gap:var(--av-space-2); flex-wrap:wrap; padding:var(--av-space-2) var(--av-space-3); margin-bottom:var(--av-space-3); border:1px solid var(--av-border-subtle); border-radius:var(--av-radius-lg); background:var(--av-surface-sunken); }
    .mr-bulkbar select { padding:6px var(--av-space-2); border:1px solid var(--av-border-default); border-radius:var(--av-radius-md); background:var(--av-surface-card); color:var(--av-text-primary); }
    .mr-check { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--av-text-secondary); cursor:pointer; }
    .mr-roster td, .mr-roster th { white-space:nowrap; }
    .mr-roster td { font-variant-numeric:tabular-nums; }
    .mr-trow { cursor:pointer; }
    .mr-trow:hover td { background:var(--av-surface-sunken); }
    .mr-trow--wip { cursor:default; opacity:.68; }
    .mr-trow--wip:hover td { background:transparent; }
    .mr-trow--retest td { background:var(--av-warning-soft); }
    .mr-trow--retest:hover td { background:var(--av-warning-soft); }
    /* CÔNG BỐ sits apart from the grading action — it publishes to students. */
    .mr-bulkbar__sep { width:1px; align-self:stretch; background:var(--av-border-default); margin:0 var(--av-space-2); }
    /* Per-sitting release refusals — named, not just counted. */
    .mr-relskips { background:var(--av-warning-soft); border:1px solid var(--av-warning);
      border-radius:var(--av-radius-md); padding:var(--av-space-3); margin-bottom:var(--av-space-3);
      font-size:var(--av-fs-sm); color:var(--av-text-primary); }
    .mr-relskips ul { margin:var(--av-space-2) 0 0; padding-left:var(--av-space-4); }
    .mr-relskips li { margin:2px 0; color:var(--av-text-secondary); }
    .mr-relskips code { font-family:var(--av-font-mono); color:var(--av-text-primary); }
    /* Retest skill picker — a <details> popover in the roster's TEST LẠI cell. */
    .mr-retest { position:relative; display:inline-block; }
    .mr-retest__sum { list-style:none; cursor:pointer; font-size:12px; padding:2px var(--av-space-2);
      border:1px solid var(--av-border-default); border-radius:var(--av-radius-md);
      background:var(--av-surface-card); color:var(--av-text-secondary); min-width:34px; text-align:center; }
    .mr-retest__sum::-webkit-details-marker { display:none; }
    .mr-retest__sum:hover { border-color:var(--av-border-strong); color:var(--av-text-primary); }
    .mr-retest__sum:focus-visible { outline:2px solid var(--av-primary); outline-offset:1px; }
    .mr-retest__sum.is-on { background:var(--av-warning-soft); border-color:var(--av-warning);
      color:var(--av-text-primary); font-weight:var(--av-fw-semibold); }
    /* Absolute so the popover can't stretch the row; the table scrolls, hence z-index.
       The explicit display+position overrides how <details> hides its own content
       when closed (measured: the menu still laid out at 98px tall), so closing has
       to be spelled out or all 13 popovers sit open on top of the table. */
    .mr-retest:not([open]) .mr-retest__menu { display:none; }
    .mr-retest__menu { position:absolute; z-index:20; top:calc(100% + 4px); left:0;
      display:flex; flex-direction:column; gap:6px; padding:var(--av-space-3);
      background:var(--av-surface-card); border:1px solid var(--av-border-default);
      border-radius:var(--av-radius-md); box-shadow:var(--av-shadow-md); white-space:nowrap; }
    /* Bottom rows: .adm-table-wrap (overflow-x:auto → overflow-y:auto) clips the
       menu, so it opens upward instead. placeRetestMenu() measures and applies. */
    .mr-retest__menu--up { top:auto; bottom:calc(100% + 4px); }
    /* L/R result detail */
    .mr-total { font-size:14px; color:var(--av-text-primary); margin-bottom:var(--av-space-3); }
    .mr-total b { font-family:var(--av-font-mono); }
    .mr-analysis { margin:var(--av-space-3) 0; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .mr-analysis__label { font-size:12px; color:var(--av-text-secondary); margin-right:var(--av-space-1); }
    .mr-perq td, .mr-perq th { font-size:13px; }
    .mr-perq__mark { text-align:center; font-weight:700; }
    .mr-perq__mark.is-ok { color:var(--av-success); }
    .mr-perq__mark.is-bad { color:var(--av-error); }
    .hidden { display:none; }
  </style>
</head>
<body class="av-page font-sans min-h-screen">
  <div class="mr-wrap">
    <h1 class="mr-title">Duyệt thi thử 4 kỹ năng</h1>
    <p class="mr-sub">Nhận (claim) → xem 4 kỹ năng → nhập band cuối → công bố.</p>
    <p id="exam-header" class="mr-examhdr"></p>

    <div id="no-exam-view" class="hidden">
      <div class="mr-card">
        <span>Chưa chọn đề. Vào <a href="/pages/admin/mock-exams/index.html">Quản lý Full Test</a> và bấm "Duyệt bài →" trên đề cần duyệt.</span>
      </div>
    </div>

    <div id="queue-view">
      <div id="retest-summary" class="mr-card" style="margin-bottom:var(--av-space-3)"></div>
      <div class="mr-toolbar">
        <button class="av-btn" id="refresh-btn">↻ Tải lại</button>
        <span class="mr-muted" id="queue-count"></span>
      </div>
      <div id="queue-list"></div>
    </div>

    <div id="detail-view" class="hidden"></div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.107.0"></script>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/admin-mock-reviews.js"></script>
</body>
</html>
