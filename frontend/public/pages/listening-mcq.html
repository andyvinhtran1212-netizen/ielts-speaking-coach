<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Trắc nghiệm — Aver Learning</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/listening.css" />

  <!-- P0-3 C-3.4: static Tailwind (Plus-Jakarta cluster) — replaces 407KB Play-CDN. -->
  <link rel="stylesheet" href="/css/tailwind.build.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2.107.0" defer></script>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/components/aver-chrome.js"></script>
  <script type="module" src="/js/components/audio-player.js"></script>

  <style>
    .mcq-shell {
      max-width: 760px; margin: 0 auto;
      padding: 0 var(--av-space-6);
      display: flex; flex-direction: column; gap: var(--av-space-6);
    }
    .mcq-header h1 { font-size: var(--av-fs-3xl); margin-bottom: var(--av-space-2); }
    .mcq-header .accent { color: var(--av-brand-teal-700); }
    .mcq-header .subtitle {
      color: var(--av-text-secondary); font-size: var(--av-fs-base);
      line-height: var(--av-lh-normal);
    }
    .questions-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: var(--av-space-4); }
    .questions-list li {
      padding: var(--av-space-4);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      display: flex; flex-direction: column; gap: var(--av-space-3);
    }
    /* design-fix-3 B5: correct/incorrect use semantic tokens (theme-aware). */
    .questions-list li.is-correct   { border-color: var(--av-success); background: var(--av-success-soft); }
    .questions-list li.is-incorrect { border-color: var(--av-error);   background: var(--av-error-soft); }
    .mcq-stem-row { display: flex; gap: var(--av-space-3); align-items: flex-start; }
    .mcq-idx { font-family: var(--av-font-mono); color: var(--av-text-muted); min-width: 32px; }
    .mcq-stem { flex: 1; line-height: var(--av-lh-normal); font-weight: var(--av-fw-semibold); }
    .mcq-options { display: flex; flex-direction: column; gap: var(--av-space-2); padding-left: 32px; }
    .mcq-option-label {
      display: flex; align-items: flex-start; gap: var(--av-space-3);
      padding: var(--av-space-2) var(--av-space-3);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      cursor: pointer;
      font-size: var(--av-fs-base);
      line-height: var(--av-lh-normal);
    }
    .mcq-option-label:hover { border-color: var(--av-brand-teal-700); }
    .mcq-option-label input { accent-color: var(--av-brand-teal-700); margin-top: 4px; }
    .mcq-option-letter { font-family: var(--av-font-mono); color: var(--av-text-muted); font-weight: var(--av-fw-semibold); }
    .mcq-result-note {
      font-family: var(--av-font-mono);
      font-size: var(--av-fs-xs);
      color: var(--av-text-secondary);
      padding-left: 32px;
    }
    .submit-row { display: flex; gap: var(--av-space-3); align-items: center; flex-wrap: wrap; }
    .btn-primary {
      padding: var(--av-space-3) var(--av-space-6);
      border-radius: var(--av-radius-md);
      background: var(--av-brand-teal-700);
      color: var(--av-text-on-primary);
      border: none; font-weight: var(--av-fw-semibold); cursor: pointer;
    }
    .btn-primary:hover { background: var(--av-brand-teal-800); }
    .btn-primary:disabled { background: var(--av-text-muted); cursor: not-allowed; }
    .btn-secondary {
      padding: var(--av-space-3) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: transparent;
      color: var(--av-text-secondary);
      border: 1px solid var(--av-border-default); cursor: pointer;
    }
    .score-pill {
      font-family: var(--av-font-mono);
      font-weight: var(--av-fw-semibold);
      color: var(--av-text-secondary);
    }
    .score-pill.is-perfect { color: var(--av-brand-teal-700); }
    .empty-state, .error-banner {
      padding: var(--av-space-8); text-align: center;
      border: 1px dashed var(--av-border-default);
      border-radius: var(--av-radius-lg);
      color: var(--av-text-secondary);
    }
    .error-banner {
      padding: var(--av-space-3) var(--av-space-4);
      /* design-fix-3 B5: theme-aware error tokens (was hardcoded red). */
      background: var(--av-error-soft); color: var(--av-error);
      border: 1px solid color-mix(in srgb, var(--av-error) 30%, transparent); font-size: var(--av-fs-sm);
      text-align: left;
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body class="av-page">

  <aver-chrome active="listening"></aver-chrome>

  <div class="shell">
    <main class="mcq-shell">
      <header class="mcq-header">
        <p class="eyebrow"><a href="/pages/listening.html" style="color: var(--av-text-secondary);">← Quay lại</a></p>
        <h1>Trắc nghiệm <span class="accent">·</span> <span id="content-title">…</span></h1>
        <p class="subtitle">
          Nghe đoạn audio rồi chọn đáp án đúng giữa 4 lựa chọn cho mỗi câu hỏi.
        </p>
      </header>

      <div class="empty-state" id="state-empty" hidden>
        <p><strong>Chưa chọn bài nghe.</strong></p>
        <p>Gắn <code>?content_id=&lt;UUID&gt;</code> vào URL để bắt đầu.</p>
      </div>
      <div class="empty-state" id="state-loading">Đang tải…</div>
      <div class="error-banner" id="state-error" hidden></div>

      <div id="mcq-surface" hidden>
        <audio-player id="player"></audio-player>

        <ul class="questions-list" id="questions-list"></ul>

        <div class="submit-row">
          <button class="btn-primary" id="btn-submit" type="button">Kiểm tra</button>
          <button class="btn-secondary" id="btn-reset" type="button" hidden>Thử lại</button>
          <span class="score-pill" id="score-pill" hidden></span>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/js/listening-mcq.js"></script>
</body>
</html>
