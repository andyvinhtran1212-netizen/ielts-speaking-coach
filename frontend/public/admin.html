<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Admin — Đang chuyển hướng</title>

  <!-- Sprint 12.8 cluster closure — admin.html is now a pure redirect to
       the unified IA at /pages/admin/index.html. The full monolith
       (3,151 LOC) was carved across Sprints 12.2 → 12.7. Keeping the
       anti-flash IIFE + error-reporter so the redirect itself never
       flashes the wrong theme + bookmarks land cleanly. -->

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var theme;
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta http-equiv="refresh" content="0; url=/pages/admin/index.html" />
  <link rel="canonical" href="/pages/admin/index.html" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />

  <style>
    body.av-page {
      font-family: var(--av-font-sans);
      margin: 0; padding: var(--av-space-8);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .closure-card {
      max-width: 480px;
      padding: var(--av-space-6);
      border: 1px solid var(--av-border-default);
      border-radius: var(--av-radius-md);
      background: var(--av-surface-card);
      text-align: center;
    }
    .closure-card h1 { font-size: var(--av-fs-lg); margin: 0 0 var(--av-space-2); }
    .closure-card p { color: var(--av-text-secondary); font-size: var(--av-fs-sm); margin: 0 0 var(--av-space-4); }
    .closure-card a {
      display: inline-block;
      padding: var(--av-space-2) var(--av-space-4);
      border-radius: var(--av-radius-md);
      background: var(--av-brand-teal-700);
      color: var(--av-text-on-primary);
      text-decoration: none;
      font-weight: var(--av-fw-semibold);
      font-size: var(--av-fs-sm);
    }
    .closure-card .home {
      display: block; margin-top: var(--av-space-3);
      color: var(--av-text-muted); font-size: var(--av-fs-xs);
    }
  </style>
</head>
<body class="av-page text-white font-sans antialiased min-h-screen flex flex-col">
  <main class="closure-card">
    <h1>Admin đã chuyển sang IA mới</h1>
    <p>
      Toàn bộ admin panel đã carve sang
      <code>/pages/admin/</code> trong cluster
      DEBT-ADMIN-IA-REFACTOR (Sprint 12.0 → 12.8).
    </p>
    <a href="/pages/admin/index.html">Mở Tổng quan →</a>
    <a class="home" href="pages/home.html">← Về trang chủ</a>
  </main>

  <script>
    // Belt-and-suspenders: meta refresh + JS redirect. JS wins on modern
    // browsers (replace() leaves no history entry); meta refresh covers
    // JS-disabled cases.
    window.location.replace('/pages/admin/index.html');
  </script>
  <script src="/js/error-reporter.js"></script>
</body>
</html>
