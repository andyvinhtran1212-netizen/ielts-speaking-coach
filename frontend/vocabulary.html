<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Vocabulary Wiki — Aver Learning</title>

  <!-- Canonical anti-flash theme bootstrap (DESIGN_SYSTEM.md § 13). -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('av-theme');
        var prefersDark = window.matchMedia &&
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/aver-design/tokens.css" />
  <link rel="stylesheet" href="/css/aver-design/components.css" />
  <link rel="stylesheet" href="/css/vocab-wiki.css" />
  <!-- P0-3 C-3.4: static Tailwind loaded LAST (after page CSS) to match the
       Play-CDN cascade — utilities/.hidden win over same-specificity page rules. -->
  <link rel="stylesheet" href="/css/tailwind.build.css" />

  <script src="https://unpkg.com/lucide@1.17.0" defer></script>
  <script type="module" src="/js/components/aver-chrome.js"></script>
</head>
<body class="av-page min-h-screen">

  <!-- Canonical chrome — Vocabulary active (replaces the legacy dark wiki nav). -->
  <aver-chrome active="vocabulary"></aver-chrome>

  <div class="va-wrap">
    <header class="va-masthead va-reveal">
      <span class="va-eyebrow">📚 Vocabulary Wiki</span>
      <h1>Từ vựng IELTS theo chủ đề</h1>
      <p>Từ vựng Band 7–8 biên soạn theo ngữ cảnh Speaking thực tế — phát âm có trọng âm, nghĩa Anh–Việt, ví dụ, collocations. Bấm ▶ để nghe.</p>

      <!-- Search -->
      <div class="va-search-wrap" style="margin-top: var(--av-space-6);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" class="va-search" type="text"
               placeholder="Tìm từ vựng… (vd: mitigate, sustainable)"
               aria-label="Tìm từ vựng" autocomplete="off" />
      </div>
    </header>

    <!-- Search / category results (hidden until type or ?cat=) -->
    <section id="search-section" class="hidden">
      <div class="va-section-label" id="results-label">Kết quả tìm kiếm</div>
      <div id="search-results" class="va-grid"></div>
      <p id="search-empty" class="hidden va-empty">Không tìm thấy từ nào phù hợp.</p>
    </section>

    <!-- Category grid -->
    <main>
      <div class="va-section-label" id="cat-section-head">Chủ đề</div>
      <div id="category-grid" class="va-grid">
        <p class="va-empty">Đang tải chủ đề…</p>
      </div>
      <div id="error-state" class="hidden va-empty">
        <p>Không thể tải danh sách chủ đề.</p>
        <button onclick="loadCategories()" class="va-add" style="margin-top: var(--av-space-3);">Thử lại</button>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/vocabulary.js"></script>
</body>
</html>
