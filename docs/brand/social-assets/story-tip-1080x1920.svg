<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <rect width="1080" height="1920" fill="#FAFAF9"/>
  <!-- brand -->
  <g transform="translate(90,300)">
    <g transform="scale(0.55)"><path d="M18 66 L48 20 L78 66" fill="none" stroke="#0F766E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><circle cx="48" cy="11" r="8" fill="#F59E0B"/></g>
    <text x="60" y="38" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="34" letter-spacing="-1"><tspan font-weight="800" fill="#1A1A16">Aver</tspan><tspan font-weight="600" fill="#0F766E"> Learning</tspan></text>
  </g>
  <text x="90" y="500" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="30" font-weight="700" letter-spacing="5" fill="#B45309">MẸO NGỮ PHÁP</text>
  <text x="90" y="600" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="66" font-weight="800" letter-spacing="-2" fill="#1A1A16">Present Perfect</text>
  <text x="90" y="680" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="66" font-weight="800" letter-spacing="-2" fill="#1A1A16">vs Past Simple</text>
  <g font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="46">
    <text x="90" y="880" font-weight="800" fill="#047857">✓</text>
    <text x="160" y="880" fill="rgba(15,23,42,0.85)">I <tspan font-weight="700">have lived</tspan> here</text>
    <text x="160" y="945" fill="rgba(15,23,42,0.85)">since 2020.</text>
    <text x="90" y="1075" font-weight="800" fill="#B91C1C">✗</text>
    <text x="160" y="1075" fill="rgba(15,23,42,0.85)">I <tspan font-weight="700">lived</tspan> here since 2020.</text>
  </g>
  <rect x="90" y="1200" width="900" height="220" rx="24" fill="#ECFDF5"/>
  <text x="130" y="1285" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="40" font-weight="600" fill="rgba(15,23,42,0.7)"><tspan font-weight="800" fill="#0F766E">since</tspan> + mốc thời gian →</text>
  <text x="130" y="1345" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="40" font-weight="600" fill="rgba(15,23,42,0.7)">dùng Present Perfect.</text>
  <!-- CTA bottom (trong vùng an toàn) -->
  <g transform="translate(0,1560)">
    <rect x="90" y="0" width="900" height="96" rx="48" fill="#0F766E"/>
    <text x="540" y="62" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="40" font-weight="700" fill="#fff">Học trọn chủ đề trong app ↑</text>
