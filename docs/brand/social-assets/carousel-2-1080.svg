  <text x="90" y="720" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="42" font-weight="500" fill="rgba(15,23,42,0.66)">Giám khảo nhận ra câu học vẹt ngay —</text>
  <text x="90" y="778" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="42" font-weight="500" fill="rgba(15,23,42,0.66)">và trừ điểm mạch lạc. Thay vào đó,</text>
  <text x="90" y="836" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="42" font-weight="500" fill="rgba(15,23,42,0.66)">luyện phản xạ nói theo <tspan font-weight="700" fill="#0F766E">ý</tspan>, không theo chữ.</text>
