  <rect width="1080" height="1080" fill="#FAFAF9"/>
  <g transform="translate(90,110)"><g transform="scale(0.44)"><path d="M18 66 L48 20 L78 66" fill="none" stroke="#0F766E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><circle cx="48" cy="11" r="8" fill="#F59E0B"/></g><text x="48" y="30" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="26" letter-spacing="-1"><tspan font-weight="800" fill="#1A1A16">Aver</tspan><tspan font-weight="600" fill="#0F766E"> Learning</tspan></text></g>
  <text x="90" y="400" font-family="'JetBrains Mono',monospace" font-size="150" font-weight="700" fill="#0F766E" opacity="0.16">01</text>
  <text x="90" y="530" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="60" font-weight="800" letter-spacing="-1.5" fill="#1A1A16">Đừng học thuộc</text>
