    <text x="54" y="34" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="30" letter-spacing="-1"><tspan font-weight="800" fill="#1A1A16">Aver</tspan><tspan font-weight="600" fill="#0F766E"> Learning</tspan></text>
